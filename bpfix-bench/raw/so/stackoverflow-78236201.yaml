    body_text: 'You are using bpf_trace_printk incorrectly, you typically stack allocate
      the fmt, then take the sizeof the char array and pass it as the second argument.

      I recommend you switch all usages to bpf_printk from bpf/bpf_helpers.h, since
      it does work exactly like you are invoking it right now. This macro does all
      of the heavy lifting for you.'
