    body_text: 'I fixed it. Looks like have to use bpf_probe_read to read any memeber
      in sk_buff.

      #define member_address(source_struct, source_member) \

      ({ \

      void *__ret; \

      __ret = (void *)(((char *)source_struct) + offsetof(typeof(*source_struct),
      source_member)); \

      __ret; \

      })

      #define member_read(destination, source_struct, source_member) \

      do \

      { \

      bpf_probe_read( \

      destination, \

      sizeof(source_struct->source_member), \

      member_address(source_struct, source_member)); \

      } while (0)

      SEC("kprobe/nf_hook_slow")

      int BPF_KPROBE(nf_hook_slow, struct sk_buff *skb, struct nf_hook_state *state)

      {

      char *head;

      __u16 mac_header, nw_header, tcp_header, eth_proto;

      if (skb)

      {

      member_read(&head, skb, head);

      member_read(&mac_header, skb, mac_header);

      member_read(&nw_header, skb, network_header);

      char *eth_head = head + mac_header;

      bpf_probe_read(&eth_proto, sizeof(u16), &eth_head[12]);

      }

      }'
    fix_description: I fixed it. Looks like have to use bpf_probe_read to read any
      memeber in sk_buff.

