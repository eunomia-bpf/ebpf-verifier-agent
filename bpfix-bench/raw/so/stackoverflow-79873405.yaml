  question_body_text: |-
    I am trying to replicate the behavior of a bpftrace script I recently made (I reckon the bpftrace code itself is not very important, but rather the fact it works proves that eBPF and NFSDv4 are properly set on my Linux 5.14 machine):
    fentry:nfsd:nfsd4_write {
    $dentry = args->cstate->current_fh.fh_dentry;
    $ino = $dentry->d_inode->i_ino;
    $uid = args->rqstp->rq_cred.cr_uid.val;
    printf("UID: %u, Write to Inode: %lu, Filename: %s/%s\n",
    $uid,
    $ino,
    str($dentry->d_parent->d_name.name),
    str($dentry->d_name.name),
    );
    }
    I am rewriting it using ebpf-go. However, I keep getting Loading eBPF objects:field WriteOps: program write_ops: load program: permission denied: 0: (bf) r3 = r2: R2 !read_ok (3 line(s) omitted) which I am interpreting as the verifier not accepting my program. As in, R2 !read_ok means that it could not verify that reading from the second argument is safe?
    The following is the C code skeleton I am trying, and I'll describe the weird behavior I am seeing.
    #include "nfsd-btf.h"
    #include "vmlinux.h"
    #include <bpf/bpf_core_read.h>
    #include <bpf/bpf_helpers.h>
    SEC("fentry/nfsd4_write")
    int write_ops(struct svc_rqst *rqstp, struct nfsd4_compound_state *cstate,
    union nfsd4_op_u *u) {
    ....
    }
    Note: I generate vmlinux.h through bpftool btf dump file /sys/kernel/btf/vmlinux format c > vmlinux.h and I generate nfsd-btf.h through bpftool btf dump file /sys/kernel/btf/nfsd format c > nfsd-btf.h
    Here's what I am observing:
    If I do nothing with the arguments, then it loads without issues
    If I try accessing rqstp, then it loads without issues, though on a closer inspection I might be getting trash values (?). For example, the verifier doesn't complain attaching with this code in write_ops
    bpf_printk("nfs write %u\n", BPF_CORE_READ(rqstp, rq_cred.cr_uid.val));
    but the printed value is not my actual uid (it gives me 3243852586, regardless of user or even root)
    If I try accessing cstate, I get the permission denied: 0: (bf) r3 = r2: R2 !read_ok error (or similar errors). For example, I have tried inside the write_ops function:
    struct dentry *dentry_ptr = BPF_CORE_READ(cstate, current_fh.fh_dentry);
    bpf_printk("%p\n", cstate);
    if (!cstate) {
    bpf_printk("cstate NULL");
    return 0;
    } else {
    bpf_printk("cstate valid");
    }
    For reference, this is the main.go program
    import (
    "log"
    "time"
    "github.com/cilium/ebpf/link"
    )
    func main() {
    // Load eBPF objects to the objs struct (not the kernel yet!)
    var objs collectorObjects
    if err := loadCollectorObjects(&objs, nil); err != nil {
    log.Fatal("Loading eBPF objects:", err)
    }
    defer objs.Close()
    link, err := link.AttachTracing(link.TracingOptions{
    Program: objs.WriteOps,
    })
    if err != nil {
    log.Fatal("Attaching Fentry:", err)
    }
    defer link.Close()
    log.Printf("Program Loaded!\n")
    time.Sleep(10*time.Seconds)
    }
    As to what is going wrong, I am inferring it has to do with how nfsd-btf.h is being loaded (since that's where nfsd4_compound_state and nfsd4_op_u live) or the kernel not recognizing the BTF in the arguments. Is this the reason? I have tried removing "nfsd-btf.h", but then go generate complains. Is there an usual way to load programs that attach to functions, when the function arguments structures are not in vmlinux.h?
