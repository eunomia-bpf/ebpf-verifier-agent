    cur += sizeof(struct ipv6hdr);

    } else {

    return XDP_PASS;

    }

    if (cur > 100)

    return XDP_PASS;

    if (h_proto != IPPROTO_TCP)

    return XDP_PASS;

    if (data + cur + sizeof(*tcph) > data_end)

    return XDP_PASS;

    tcph = data + cur;

    if (tcph->doff > 10)

    return XDP_PASS;

    if (data + cur + tcph->doff * 4 > data_end)

    return XDP_PASS;

    cur += tcph->doff * 4;

    if (tcph->dest != 4420)

    return XDP_PASS;

    if (cur > total || cur > 100)

    return XDP_PASS;

    nbzeros = 0;

    for (i = cur; data+i < data_end; i++) {

    if (*((uint8_t*)(data+i)) == 0 && !found) {

    nbzeros++;

    } else {

    found = true;

    break;

    }

    }

    if (found && nbzeros > 50) {

    bpf_printk("found nvme pdu tail seq=%u\n", bpf_ntohs(tcph->seq));

    }

    return XDP_PASS;

    }

    char _license[] SEC("license") = "GPL";

