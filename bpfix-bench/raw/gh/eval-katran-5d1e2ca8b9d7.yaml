  diff_summary: 'katran/lib/bpf/pckt_parsing.h:

    - Made `parse_hdr_opt()` `__always_inline__` unless explicitly configured otherwise
    and tied loop unrolling to the new flag.

    - Avoided older-kernel verifier rejection of stack-passed parser state and bounded
    loops compiled on newer hosts.'

