  fixed_code: |-
    // FILE: katran/lib/bpf/balancer_consts.h
    // offset of remote encaped packets counters
    #define REMOTE_ENCAP_CNTRS 6
    // offset of QUIC routing related stats
    #define QUIC_ROUTE_STATS 7
    // QUIC CID versions
    #define QUIC_CID_VERSION_STATS 8
    // QUIC CID drops stats
    #define QUIC_CID_DROP_STATS 9
    // offset of stats for server_id based routing of TCP packets (TPR)
    #define TCP_SERVER_ID_ROUTE_STATS 10
    // offset of stats for global LRU
    #define GLOBAL_LRU_CNTR 11
    // offset of stats for packets dropped during consistent hashing
    #define CH_DROP_STATS 12
    // offset of stats for decap packets
    #define DECAP_CNTR 13

    // max ammount of new connections per seconda per core for lru update
    // if we go beyond this value - we will bypass lru update.
    #ifndef MAX_CONN_RATE
    #define MAX_CONN_RATE 125000
    #endif

    #ifndef IPIP_V4_PREFIX
    // RFC1918: we are going to use 172.16/10 as our src (4268 is 172.16 in BE)
    // for ipip header

    // FILE: katran/lib/bpf/balancer_kern.c
    // CONTEXT: __attribute__((__always_inline__)) static inline bool is_under_flood(
        conn_rate_stats->v2 = *cur_time;
      } else {
        conn_rate_stats->v1 += 1;
        if (conn_rate_stats->v1 > MAX_CONN_RATE) {
          // we are exceding max connections rate. bypasing lru update and
          // source routing lookup
          return true;
        }
      }
      return false;
    }

    __attribute__((__always_inline__)) static inline void
    increment_ch_drop_no_real() {
      __u32 ch_drop_stats_key = MAX_VIPS + CH_DROP_STATS;
      struct lb_stats* ch_drop_stats =
          bpf_map_lookup_elem(&stats, &ch_drop_stats_key);
      if (!ch_drop_stats) {
        return;
      }
      ch_drop_stats->v1 += 1;
    }

    __attribute__((__always_inline__)) static inline void
    increment_ch_drop_real_0() {
      __u32 ch_drop_stats_key = MAX_VIPS + CH_DROP_STATS;
      struct lb_stats* ch_drop_stats =
          bpf_map_lookup_elem(&stats, &ch_drop_stats_key);
      if (!ch_drop_stats) {
        return;
      }
      ch_drop_stats->v2 += 1;
    }

    __attribute__((__always_inline__)) static inline bool get_packet_dst(
        struct real_definition** real,
        struct packet_description* pckt,
        struct vip_meta* vip_info,
        bool is_ipv6,
        void* lru_map) {
      // to update lru w/ new connection
      struct real_pos_lru new_dst_lru = {};
      bool under_flood = false;
      bool src_found = false;
      __u32* real_pos;
      __u64 cur_time = 0;

    // CONTEXT: __attribute__((__always_inline__)) static inline bool get_packet_dst(
          // usually VoIP related services.
          pckt->flow.port16[0] = pckt->flow.port16[1];
          memset(pckt->flow.srcv6, 0, 16);
        }
        hash = get_packet_hash(pckt, hash_16bytes) % RING_SIZE;
        key = RING_SIZE * (vip_info->vip_num) + hash;

        real_pos = bpf_map_lookup_elem(&ch_rings, &key);
        if (!real_pos) {
          return false;
        }
        key = *real_pos;
        if (key == 0) {
          // Real ids start from 1, so we don't map the id 0 to any real. This
          // is likely to happen if the ch ring for a vip is uninitialized.
          increment_ch_drop_real_0();
        }
      }
      pckt->real_index = key;
      *real = bpf_map_lookup_elem(&reals, &key);
      if (!(*real)) {
        // The id we retrieved from the hash ring is out of bounds in the reals
        // array.
        increment_ch_drop_no_real();
        return false;
      }
      if (lru_map && !(vip_info->flags & F_LRU_BYPASS) && !under_flood) {
        if (pckt->flow.proto == IPPROTO_UDP) {
          new_dst_lru.atime = cur_time;
        }
        new_dst_lru.pos = key;
        bpf_map_update_elem(lru_map, &pckt->flow, &new_dst_lru, BPF_ANY);
      }
      return true;
    }
