  buggy_code: "// FILE: bpf/lib/lb.h\n// CONTEXT: lb6_fill_key(struct lb6_key *key,\
    \ struct ipv6_ct_tuple *tuple)\n */\nstatic __always_inline int\nlb6_extract_tuple(struct\
    \ __ctx_buff *ctx, struct ipv6hdr *ip6, int l3_off,\n                  int *l4_off,\
    \ struct ipv6_ct_tuple *tuple)\n{\n        int ret;\n\n        tuple->nexthdr\
    \ = ip6->nexthdr;\n        ipv6_addr_copy(&tuple->daddr, (union v6addr *)&ip6->daddr);\n\
    \        ipv6_addr_copy(&tuple->saddr, (union v6addr *)&ip6->saddr);\n\n     \
    \   ret = ipv6_hdrlen_offset(ctx, &tuple->nexthdr, l3_off);\n        if (ret <\
    \ 0)\n                return ret;\n\n        *l4_off = l3_off + ret;\n\n     \
    \   switch (tuple->nexthdr) {\n        case IPPROTO_TCP:\n        case IPPROTO_UDP:\n\
    #ifdef ENABLE_SCTP\n        case IPPROTO_SCTP:\n#endif  /* ENABLE_SCTP */\n  \
    \              if (l4_load_ports(ctx, *l4_off, &tuple->dport) < 0)\n         \
    \               return DROP_CT_INVALID_HDR;\n                return 0;"
  fixed_code: "// FILE: bpf/lib/lb.h\n// CONTEXT: lb6_fill_key(struct lb6_key *key,\
    \ struct ipv6_ct_tuple *tuple)\n */\nstatic __always_inline int\nlb6_extract_tuple(struct\
    \ __ctx_buff *ctx, struct ipv6hdr *ip6, int l3_off,\n                  int *l4_off,\
    \ struct ipv6_ct_tuple *tuple)\n{\n        int ret;\n\n        tuple->nexthdr\
    \ = ip6->nexthdr;\n        ipv6_addr_copy(&tuple->daddr, (union v6addr *)&ip6->daddr);\n\
    \        ipv6_addr_copy(&tuple->saddr, (union v6addr *)&ip6->saddr);\n\n     \
    \   ret = ipv6_hdrlen_offset(ctx, &tuple->nexthdr, l3_off);\n        if (ret <\
    \ 0) {\n                /* Make sure *l4_off is always initialized on return,\
    \ because\n                 * Clang can spill it from a register to the stack\
    \ even in error\n                 * flows where this value is no longer used,\
    \ and this pattern is\n                 * rejected by the verifier.\n        \
    \         * Use a prominent value (-1) to highlight any potential misuse.\n  \
    \               */\n                *l4_off = -1;\n                return ret;\n\
    \        }\n\n        *l4_off = l3_off + ret;\n\n        switch (tuple->nexthdr)\
    \ {\n        case IPPROTO_TCP:\n        case IPPROTO_UDP:\n#ifdef ENABLE_SCTP\n\
    \        case IPPROTO_SCTP:\n#endif  /* ENABLE_SCTP */\n                if (l4_load_ports(ctx,\
    \ *l4_off, &tuple->dport) < 0)\n                        return DROP_CT_INVALID_HDR;\n\
    \                return 0;"
  diff_summary: 'bpf/lib/lb.h:

    - Initialized `*l4_off = -1` on the `ipv6_hdrlen_offset()` error path in `lb6_extract_tuple()`.

    - Kept Clang 17 spills verifier-safe by ensuring the would-be spilled value is
    always initialized.'

