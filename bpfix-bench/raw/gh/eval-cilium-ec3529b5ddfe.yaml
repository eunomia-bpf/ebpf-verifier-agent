  diff_summary: 'bpf/bpf_sock.c, bpf/lib/icmp6.h, bpf/lib/ipv6.h, bpf/lib/lxc.h, bpf/lib/nat.h,
    bpf/lib/nat_46x64.h, bpf/tests/tc_nodeport_lb6_dsr_backend.c, bpf/tests/tc_nodeport_lb6_dsr_lb.c,
    bpf/tests/xdp_nodeport_lb6_dsr_lb.c:

    - Replaced subtraction-based `ipv6_addrcmp()` with boolean `ipv6_addr_equals()`.

    - Removed arithmetic patterns that verifier treated as pointer/math with unbounded
    values across the IPv6 datapath and tests.'

