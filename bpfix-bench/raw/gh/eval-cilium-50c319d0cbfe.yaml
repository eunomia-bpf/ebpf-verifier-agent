    \  /* ENABLE_SCTP */"
  diff_summary: 'bpf/lib/nat.h:

    - Inserted `asm volatile("" :: "r"(&tuple));` after building the IPv6 tuple.

    - Forced Clang to materialize the tuple on the stack instead of re-reading packet
