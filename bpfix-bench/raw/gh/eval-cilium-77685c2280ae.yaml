  fixed_code: "// FILE: bpf/tests/tc_nodeport_lb4_nat_lb.c\n// CONTEXT: struct {\n\
    \        __uint(value_size, sizeof(struct mock_settings));\n        __uint(max_entries,\
    \ 1);\n} settings_map __section_maps_btf;\n\n#define fib_lookup mock_fib_lookup\n\
    \nlong mock_fib_lookup(__maybe_unused struct __ctx_buff *ctx, struct bpf_fib_lookup\
    \ *params,\n                     __maybe_unused int plen, __maybe_unused __u32\
    \ flags)\n{\n        __u32 key = 0;\n        struct mock_settings *settings =\
    \ map_lookup_elem(&settings_map, &key);\n\n        /* Verifier doesn't know that\
