  - url: https://github.com/iovisor/bcc/issues/2463#issuecomment-718800510
    author: FedeParola
    author_association: CONTRIBUTOR
    created_at: '2020-10-29T14:44:23Z'
    body_text: "Hi @Rayoluo, if you need to compute the checksum from scratch you\
      \ can use a bounded loop:\r\n```\r\n#define MAX_UDP_LENGTH 1480\r\n\r\n[...]\r\
      \n\r\nu32 csum_buffer = 0;\r\nu16 *buf = (void *)udp;\r\n\r\n// Compute pseudo-header\
      \ checksum\r\ncsum_buffer += (u16)ip->saddr;\r\ncsum_buffer += (u16)(ip->saddr\
      \ >> 16);\r\ncsum_buffer += (u16)ip->daddr;\r\ncsum_buffer += (u16)(ip->daddr\
      \ >> 16);\r\ncsum_buffer += (u16)ip->protocol << 8;\r\ncsum_buffer += udp->len;\r\
      \n\r\n// Compute checksum on udp header + payload\r\nfor (int i = 0; i < MAX_UDP_LENGTH;\
      \ i += 2) {\r\n  if ((void *)(buf + 1) > data_end) {\r\n    break;\r\n  }\r\n\
      \  csum_buffer += *buf;\r\n  buf++;\r\n}\r\nif ((void *)buf + 1 <= data_end)\
      \ {\r\n  // In case payload is not 2 bytes aligned\r\n  csum_buffer += *(u8\
      \ *)buf;\r\n}\r\n\r\nu16 csum = (u16)csum_buffer + (u16)(csum_buffer >> 16);\r\
      \ncsum = ~csum;\r\n```\r\n____\r\nEdit: I just figured out the algorithm wasn't\
      \ correct, I was performing a simple sum on the packet instead of the one's\
      \ complement sum, fixed it."
