    body_text: |-
      The bounds check here is not correct. You are checking if you can access up to struct ethhdr of bytes, but you should check for struct ethhdr + struct iphdr since you will be reading from the iphdr next.
      struct iphdr *iph;
      if (end >= data + sizeof(struct ethhdr)) {
      iph = data + sizeof(struct ethhdr);
      } else {
      return XDP_ABORTED;
      }
      A more typical way to do bounds checking is:
      struct iphdr *iph = data + sizeof(struct ethhdr);
      if ((void *) iphdr + sizeof(struct iphdr) >= end)
      return XDP_ABORTED;
      We first calculate the start of the IP header and make a pointer. (this is save since we are not accessing its fields or dereferencing it). Then we take the start of our header, add its size and check that its less then end. After this we know we can access all fields of iph without overrunning bounds.
    fix_description: The bounds check here is not correct. You are checking if you
      can access up to struct ethhdr of bytes, but you should check for struct ethhdr
      + struct iphdr since you will be reading from the iphdr next.
