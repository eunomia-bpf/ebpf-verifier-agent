  issue_body_text: |-
    Hallo,
    I tried to adapt the example for tc-egress to work also with IPv6. Thus, I adapted the PackageLog structure to be the following:
    However, when running the program, I get a similar error to the following that happens when loading the eBPF program:
    I can though do to the following and it runs:
    It is just a minor thing (for me) as I have a workaround, but I wonder if it is intended to work only with u32/i32 for PerfEventArray, if this is a missing feature or some limitation in the Linux Kernel itself?
    Thanks a lot!
  fix:
