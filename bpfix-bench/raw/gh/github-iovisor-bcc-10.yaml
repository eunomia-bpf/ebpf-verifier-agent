    \ r1 could be map_value or null,\nalthough instruction \"97\" checks \"r0\" for\
    \ null.\n\nThe compiler ought to generate better code. The instruction \"r1 =\
    \ r0\" is not necessary.\n\nI dumped IR (change py program debug=0 to debug=1),\
    \ and feed the IR to llc.\n`llc -march=bpf -filetype=asm -O3 b.ll``\n\nllc also\
    \ generates similar code:\n\n```\nLBB8_16:                                # %if.else20\n\
    \        mov     r9, 0\n        stw     -56(r10), r9\n        ld_pseudo      \
    \ r1, 1, 6\n        mov     r2, r10\n        addi    r2, -56\n        call   \
    \ 1\n        mov     r1, r0\n        jeqi    r0, 0 goto LBB8_12\n        jmp \
    \    LBB8_18\nLBB8_18:                                # %onvalid.then25\n    \
    \    stw     -64(r10), r9\n        mov     r2, r1\n        std     -72(r10), r2\n\
    \        ldw     r1, 0(r2)\n        stw     -64(r10), r1\n```\n\n-O2 generates\
    \ similar code.\n\nStudying the LLVM optimization passes, there is a path in LLVM\
