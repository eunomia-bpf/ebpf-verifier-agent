    answer_id: 77772990
    url: https://stackoverflow.com/questions/77762365/ebpf-value-is-outside-of-the-allowed-memory-range-when-reading-data-into-arra#77772990
    is_accepted: false
    score: 1
    body_text: 'TL;DR. The verifier is not yet smart enough to use event->len + read
      < MAX_READ_CONTENT_LENGTH.

      Explanation

      For the verifier to confirm that bpf_probe_read_user(&event->content[A], B,
      ...); is safe, it would need to remember that A + B < value_size. That''s what
      you are trying to guarantee with:

      if (event->len + read < MAX_READ_CONTENT_LENGTH)

      Unfortunately, the verifier is currently unable to understand and retain such
      relations between variables (A and B or event->len and read in this example).
      The only exception is a special case for the pointer to the packet''s end (ctx->data_end)
      in case of networking BPF programs.'
