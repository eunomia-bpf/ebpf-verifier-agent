    \ Helper macro to manipulate data structures\n */\n#ifndef offsetof\n#define offsetof(TYPE,\
    \ MEMBER)\t((unsigned long)&((TYPE *)0)->MEMBER)\n#endif\n#ifndef container_of\n\
    #define container_of(ptr, type, member)\t\t\t\t\\\n\t({\t\t\t\t\t\t\t\\\n\t\t\
    void *__mptr = (void *)(ptr);\t\t\t\\\n\t\t((type *)(__mptr - offsetof(type, member)));\t\
    \\\n\t})\n#endif"
  fixed_code: "// FILE: src/bpf_helpers.h\n\n/* Avoid 'linux/stddef.h' definition\
    \ of '__always_inline'. */\n#undef __always_inline\n#define __always_inline inline\
    \ __attribute__((always_inline))\n\n#ifndef __noinline\n#define __noinline __attribute__((noinline))\n\
    #endif\n#ifndef __weak\n#define __weak __attribute__((weak))\n#endif\n\n/* When\
    \ utilizing vmlinux.h with BPF CO-RE, user BPF programs can't include\n * any\
    \ system-level headers (such as stddef.h, linux/version.h, etc), and\n * commonly-used\
    \ macros like NULL and KERNEL_VERSION aren't available through\n * vmlinux.h.\
    \ This just adds unnecessary hurdles and forces users to re-define\n * them on\
    \ their own. So as a convenience, provide such definitions here.\n */\n#ifndef\
    \ NULL\n#define NULL ((void *)0)\n#endif\n\n#ifndef KERNEL_VERSION\n#define KERNEL_VERSION(a,b,c)\
    \ (((a) << 16) + ((b) << 8) + ((c) > 255 ? 255 : (c))\n#endif\n\n/*\n * Helper\
    \ macros to manipulate data structures\n */\n#ifndef offsetof\n#define offsetof(TYPE,\
    \ MEMBER)\t((unsigned long)&((TYPE *)0)->MEMBER)\n#endif\n#ifndef container_of\n\
    #define container_of(ptr, type, member)\t\t\t\t\\\n\t({\t\t\t\t\t\t\t\\\n\t\t\
    void *__mptr = (void *)(ptr);\t\t\t\\\n\t\t((type *)(__mptr - offsetof(type, member)));\t\
    \\\n\t})\n#endif"
  diff_summary: |-
    src/bpf_helpers.h:
    - Changed inlining annotations so verifier-visible state stays in a form older kernels accept.
