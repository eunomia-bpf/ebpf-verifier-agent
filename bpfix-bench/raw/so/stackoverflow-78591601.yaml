    body_text: 'TL;DR. Your first error happens because your bound check doesn''t
      include the access size. The second error likely happens because you''re trying
      to compare a map value against the packet''s end.

      First Error: Explanation

      (61) r3 = *(u32 *)(r2 +0)

      invalid access to packet, off=74 size=4, R2(id=6,off=74,r=0)

      R2 offset is outside of the packet

      The verifier is telling you that you are trying to access the packet at offset
      74 with an access size of 4 bytes; yet your packet is only known to have 74
      bytes minimum.

      First Error: Potential Solution

      Changing the code to the following should fix the first error:

      if ((void*)(payload + i + sizeof(__u32)) > data_end) return;

      if ((void*)(agg_result + i + sizeof(__u32)) > data_end) return;

      Note I also switched the >= to a >.

      Second Error: Explanation

      (61) r3 = *(u32 *)(r2 +0)

      R2 unbounded memory access, make sure to bounds check any such access

      In this case, assuming it''s for the same C statements, the verifier seems to
      have no information on the checked bounds.

      And indeed, you haven''t really bound checked agg_result+i:

      if ((void*)(agg_result + i) >= data_end) return;

      Here, you are comparing agg_result+i to the packet''s end. But agg_result+i
      isn''t a packet pointer from the verifier''s point of view. So this comparison
      won''t count as a bound check.

      Second Error: Potential Solution

      Instead, you will need to compare it against the size of the value in the BPF
      map. And of course adjust for the first error as well. For example:

      if ((void*)(agg_result + i + sizeof(__u32)) > sizeof(__u32) * MAX_ARRAY_LEN)

      return;'
