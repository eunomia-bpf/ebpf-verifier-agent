  selected_answer:
    answer_id: 71579680
    url: https://stackoverflow.com/questions/71529801/ebpf-bpf-map-update-returns-the-invalid-indirect-read-from-stack-error#71579680
    is_accepted: true
    score: 5
    body_text: 'The verifier complains because your code is trying to read uninitialised
      data from the stack, in particular in your variable val.

      If we look at your code:

      struct client_port_addr {

      __u32 client_ip;

      __u8 dmac[6];

      __u16 pad[3];

      };

      struct client_port_addr val;

      [...]

      val.client_ip = iph->saddr; // val.client_ip

      memcpy (val.dmac, eth->h_source, 6 * sizeof(__u8)); // val.dmac

      // val.pad where??

      bpf_map_update_elem(&client_addrs, &key, &val, BPF_ANY);

      You initialised val.client_ip, and val.dmac, but val.pad is never initialised.
      When you pass val to bpf_map_update_elem(), the eBPF verifier realises that
      the helper function might read this variable which contains uninitialised memory
      from kernel space. This is a security risk, therefore, the verifier rejects
      the program.

      To fix the issue, make sure you initialise the memory before using it. You have
      at least three ways to do so:

      You could initialise val when declaring it, like for your key:

      struct client_port_addr val = {0};

      This should work in your case, but is not generally recommended, because this
      will set all fields to 0 but if your struct contains padding that was not explicitely
      added, it may remain uninitialised.

      In your case, you could fill val.pad with zeroes with memcpy(). Same as the
      first option, this won''t help if the compiler pads your struct.

      The safest option would be to memset() the struct after declaring it:

      struct client_port_addr val;

      memset(&val, 0, sizeof(val));

      Then you can fill the relevant fields of the struct, and pass it to the map
      update helper.'
