    body_text: 'This still tells me that / is not equal to /, when I set the size
      to 1 then / does equal /, so there is something else in the 254 bytes that doesn''t
      line up?

      Yes, there could be anything in that buffer after your string (unless you zeroed
      the buffer first, but that doesn''t seem to be the case).

      Strncmp Solution

      As @0___________ noted, strcmp would be a better match than memcmp here, to
      take the \0 into account when comparing strings. Unfortunately, that isn''t
      available in eBPF programs.

      Instead, if your kernel and program type support it, you may be able to use
      the bpf_strncmp helper:

      long bpf_strncmp(const char *s1, u32 s1_sz, const char *s2)

      Description Do strncmp() between s1 and s2. s1 doesn''t need to be null-terminated
      and s1_sz is the maximum storage size of s1. s2 must be a read-only string.

      Return An integer less than, equal to, or greater than zero if the first s1_sz
      bytes of s1 is found to be less than, to match, or be greater than s2.

      As stated above, s2 must be a read-only string. That means you will need to:

      Set the BPF_F_RDONLY_PROG flag at creation time.

      Freeze the map from userspace after updating it, with the BPF_MAP_FREEZE bpf(2)
      command.

      Native eBPF Solution

      If that helper isn''t supported in your case or if you can''t freeze the map,
      you will then have to re-implement it in BPF with a loop.

      Depending on your kernel version, there are several options available to implement
      loops in eBPF, from bpf_loop to bpf_for and cond_break. I''d recommend to check
      the kernel samples and selftests for examples.'
