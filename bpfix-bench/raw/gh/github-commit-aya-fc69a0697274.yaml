  diff_summary: |-
    aya/src/sys/bpf.rs:
    - Changed the probe program in `is_probe_read_kernel_supported()` from `BPF_SUB 8` to the verifier-accepted `BPF_ADD -8` form.
    - Stopped the feature-detection probe from being rejected early on aarch64 5.5 kernels.
