  issue_body_text: "I filed this issue based on some old discussions in iovisor-dev\
    \ mailing list.\r\nhttps://lists.iovisor.org/g/iovisor-dev/topic/30285987\r\n\r\
    \nI finally got some time to explore the solution for this and created a standalone\
    \ example.\r\nJust to recap, the following is a simplified program.\r\n```\r\n\
    -bash-4.4$ cat xdp_simple.c\r\n#include <linux/bpf.h>\r\n#include <stdio.h>\r\n\
    #include <string.h>\r\n#include <linux/icmp.h>\r\n#include <linux/if_ether.h>\r\
    \n#include <linux/if_vlan.h>\r\n#include <linux/in.h>\r\n#include <linux/ip.h>\r\
    \n#include <linux/tcp.h>\r\n#include <linux/udp.h>\r\n#include <linux/perf_event.h>\r\
    \n\r\n#include \"bpf_helpers.h\"\r\n#include \"bpf_endian.h\"\r\n\r\n/* 0x3FFF\
    \ mask to check for fragment offset field */\r\n#define IP_FRAGMENTED 65343\r\n\
    \r\n// MAC address\r\ntypedef unsigned char mac[6];\r\n\r\n// Real Server structure\
    \ (MAC address + IP address)\r\nstruct server {\r\n    __be32 ipAddr;\r\n    unsigned\
    \ char macAddr[ETH_ALEN];\r\n};\r\n\r\n// packet structure to log load balancing\r\
    \nstruct packet {\r\n    unsigned char dmac[ETH_ALEN];\r\n    unsigned char smac[ETH_ALEN];\r\
    \n    __be32 daddr;\r\n    __be32 saddr;\r\n};\r\n\r\nstruct {\r\n        __uint(type,\
    \ BPF_MAP_TYPE_PERF_EVENT_ARRAY);\r\n        __uint(key_size, sizeof(int));\r\n\
    \        __uint(value_size, sizeof(int));\r\n} events SEC(\".maps\");\r\n\r\n\
    // A map which contains port to redirect\r\nstruct {\r\n        __uint(type, BPF_MAP_TYPE_HASH);\r\
    \n        __uint(max_entries, 10);\r\n        __type(key, __be16);\r\n       \
    \ __type(value, int);\r\n} ports SEC(\".maps\");\r\n\r\n// A map which contains\
    \ real server \r\nstruct {\r\n        __uint(type, BPF_MAP_TYPE_HASH);\r\n   \
    \     __uint(max_entries, 10);\r\n        __type(key, int);\r\n        __type(value,\
    \ struct server);\r\n} realServers SEC(\".maps\");\r\n// Virtual IP is accessible\
    \ via the '0x5' constant\r\n\r\nSEC(\"xdpclient\")\r\nint xdp_prog(struct xdp_md\
    \ *ctx) {\r\n    void *data_end = (void *)(long)ctx->data_end;\r\n    void *data\
    \ = (void *)(long)ctx->data;\r\n\r\n    struct ethhdr * eth = data;\r\n    if\
    \ (eth + 1 > data_end)\r\n        return XDP_DROP;\r\n\r\n    if (eth->h_proto\
    \ != bpf_htons(ETH_P_IP)){\r\n        return XDP_PASS;\r\n    }\r\n\r\n    struct\
    \ iphdr *iph;\r\n    iph = eth + 1;\r\n    if (iph + 1 > data_end)\r\n       \
    \ return XDP_DROP;\r\n\r\n    if (iph->ihl < 5)\r\n        return XDP_DROP;\r\n\
    \    if (iph->ihl != 5) \r\n        return XDP_PASS;\r\n\r\n    if (iph->protocol\
    \ != IPPROTO_UDP) {\r\n        return XDP_PASS;\r\n    }\r\n\r\n    struct udphdr\
    \ *udp;\r\n    udp = iph + 1;\r\n    if (udp + 1 > data_end)\r\n        return\
    \ XDP_DROP;\r\n    __u16 udp_len = bpf_ntohs(udp->len);\r\n    if (udp_len < 8\
    \ || udp_len >= 512)\r\n        return XDP_DROP;\r\n    udp_len &= 0x1ff;\r\n\
    \    if ((void *) udp + udp_len > data_end)\r\n        return XDP_DROP;\r\n\r\n\
    \    // Update UDP checksum\r\n    __u64 cs = 0;\r\n    udp->check = 0;\r\n  \
    \  cs = bpf_csum_diff(0, 0, udp, udp_len, cs);\r\n    udp->check = cs;\r\n\r\n\
    \    // Log packet after\r\n    struct packet pkt = {};\r\n    memcpy(&pkt, data,\
    \ sizeof(pkt)); // crappy\r\n    pkt.daddr = iph->daddr;\r\n    pkt.saddr = iph->saddr;\r\
    \n    bpf_perf_event_output(ctx, &events, BPF_F_CURRENT_CPU, &pkt,sizeof(pkt));\r\
    \n\r\n    return XDP_TX;\r\n}\r\n\r\nchar _license[] SEC(\"license\") = \"GPL\"\
    ;\r\n```\r\n\r\nThe compilation command line looks like\r\n```\r\nclang -target\
    \ bpf -O2 -c -I/home/yhs/work/linux/tools/include/uapi -I. -g xdp_simple.c\r\n\
    ```\r\nwhere the above include path pointing to linux repo for two helper header\
    \ files.\r\n\r\nUsing bpftool (linux/tools/bpf/bpftool) to load and can reproduce\
    \ the verifier issue:\r\n```\r\n./bpftool -d prog load ./xdp_simple.o /sys/fs/bpf/xdp_example\
    \ type xdp\r\n```\r\n```\r\n45: R0_w=inv1 R1_w=inv0 R2_w=pkt(id=1,off=34,r=34,umax_value=511,var_off=(0x0;\
    \ 0x1ff)) R3=pkt(id=0,off=34,r=42,imm=0) R4_w=invP(id=0,umax_value=511,var_off=(0x0;\
    \ 0x1ff)\r\n) R6=ctx(id=0,off=0,imm=0) R7=pkt(id=0,off=0,r=42,imm=0) R10=fp0\r\
    \n; udp->check = 0;\r\n45: (6b) *(u16 *)(r7 +40) = r1\r\n46: R0_w=inv1 R1_w=inv0\
    \ R2_w=pkt(id=1,off=34,r=34,umax_value=511,var_off=(0x0; 0x1ff)) R3=pkt(id=0,off=34,r=42,imm=0)\
    \ R4_w=invP(id=0,umax_value=511,var_off=(0x0; 0x1ff)\r\n) R6=ctx(id=0,off=0,imm=0)\
    \ R7=pkt(id=0,off=0,r=42,imm=0) R10=fp0\r\n; cs = bpf_csum_diff(0, 0, udp, udp_len,\
    \ cs);\r\n46: (b7) r1 = 0\r\n47: R0_w=inv1 R1_w=inv0 R2_w=pkt(id=1,off=34,r=34,umax_value=511,var_off=(0x0;\
    \ 0x1ff)) R3=pkt(id=0,off=34,r=42,imm=0) R4_w=invP(id=0,umax_value=511,var_off=(0x0;\
    \ 0x1ff)\r\n) R6=ctx(id=0,off=0,imm=0) R7=pkt(id=0,off=0,r=42,imm=0) R10=fp0\r\
    \n47: (b7) r2 = 0\r\n48: R0_w=inv1 R1_w=inv0 R2_w=inv0 R3=pkt(id=0,off=34,r=42,imm=0)\
    \ R4_w=invP(id=0,umax_value=511,var_off=(0x0; 0x1ff)) R6=ctx(id=0,off=0,imm=0)\
    \ R7=pkt(id=0,off=0,r=42,imm\r\n=0) R10=fp0\r\n48: (b7) r5 = 0\r\n49: R0_w=inv1\
    \ R1_w=inv0 R2_w=inv0 R3=pkt(id=0,off=34,r=42,imm=0) R4_w=invP(id=0,umax_value=511,var_off=(0x0;\
    \ 0x1ff)) R5_w=inv0 R6=ctx(id=0,off=0,imm=0) R7=pkt(id=0,off=\r\n0,r=42,imm=0)\
