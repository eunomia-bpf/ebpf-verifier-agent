  selected_answer:
    answer_id: 79099398
    url: https://stackoverflow.com/questions/79095876/bpf-probe-read-user-permission-denied-invalid-access-to-map-value-in-an-ebp#79099398
    is_accepted: false
    score: 0
    body_text: "TL;DR. You're hitting a limitation of the Linux eBPF verifier which\
      \ can't track relations between variables. One solution may be to replace to_read\
      \ with a constant.\nVerifier Error Explanation\ninvalid access to map value,\
      \ value_size=2016 off=2015 size=2000\nR1 max value is outside of the allowed\
      \ memory range\nYour program is rejected because the verifier detected that\
      \ you may read past the map value bounds using bpf_probe_read_user. More specifically,\
      \ it detected a potential map value access at offset 2015 (total_len's max value\
      \ + offsetof(ip_event_t, payload)) with access size 2000 (to_read's value).\
      \ The map value has size 2016 so that would be out-of-bounds.\nWhy was the bounds\
      \ check ineffective?\nAs you noted, the bounds check should have prevented that.\
      \ However, as we can see in the bytecode returned by the verifier, the bounds\
      \ check happened on register r8 (instructions 191\u2013193). That register holds\
      \ the addition of r2 (to_read) and r7 (total_len). The map access via bpf_probe_read_user\
      \ however didn't use r8, but r2 and r7 directly.\nYou may be wondering why the\
      \ verifier can't deduce information on r2 and r7 from the r8 bounds check. It\
      \ could realize that r8 < Z means r2 + r7 < Z. The verifier unfortunately unable\
      \ to track such conditions between variables. Tracking relations between variables\
      \ comes with a high cost, as shown by the Windows eBPF verifier which does support\
      \ it.\nSolution\nI noticed that the value of to_read is constant at runtime\
      \ (according to the verifier). One solution may be to replace the to_read variable\
      \ with a constant holding value 2000. The compiler would then optimize r2 out\
      \ of the bytecode and it may be good enough to pass the verifier."
