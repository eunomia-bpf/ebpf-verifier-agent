  - static inline void update_csum(__u64 *csum, __be32 old_addr,__be32 new_addr )
    {
  - "fundamentally, for bpf_csum_diff(), the verifier needs to verify the udp + udp_size.\
    \ but\r\nudp has definite range (42, up to end of udp header, and optional max\
    \ range to 511)\r\nand udp_size has maximum length to 511. But all these variable\
    \ length won't play well\r\nin verifier, it is possible actual udp_len = 100 and\
    \ packet range is 50. This will cause\r\nissues."
