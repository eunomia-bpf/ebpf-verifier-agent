    What happened?
    Comes from this Talos issue.
    Cluster network **completely goes down** after an upgrade to kernel 6.18.5.
    How can we reproduce the issue?
    Talos: v1.12.2
    Cilium: v1.19.0 or v1.18.6
    Kernel: 6.18.5-talos
    And set any of these to true
    Cilium Version
    Reproduced on both v1.19.0 or v1.18.6
    Kernel Version
    6.18.5-talos
    Kubernetes Version
    v1.34.3
    Regression
    Kernel bug, I think.
    Sysdump
