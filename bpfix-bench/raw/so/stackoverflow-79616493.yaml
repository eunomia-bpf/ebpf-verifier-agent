  question_body_text: |-
    I'm writing an eBPF program using the aya framework in Rust. I'm attaching a fentry hook to the filp_close function and trying to obtain the file path using bpf_d_path. Here's a simplified version of the eBPF code:
    const INIT_ENENT: Event = Event {
    pid: 0,
    path: [0; 1024],
    };
    #[map]
    pub static TT: LruHashMap<u64, Event> = LruHashMap::with_max_entries(16, 0);
    fn try_ff(ctx: &FEntryContext) -> Result<(), i64> {
    let file_ptr: *const file = unsafe { ctx.arg(0) };
    let addr = file_ptr as u64;
    TT.insert(&addr, &INIT_ENENT, 0).map_err(|_| -6)?;
    let event = unsafe { &mut *TT.get_ptr_mut(&addr).ok_or(-7)? };
    // let file_ptr = file_addr as *const file;
    let file_val = unsafe { bpf_probe_read_kernel::<file>(file_ptr).map_err(|_| -8)? };
    let mut path_ptr = file_val.f_path;
    unsafe {
    bpf_d_path(
    &mut path_ptr as *mut bindgen::path as *mut aya_ebpf::bindings::path,
    event.path.as_mut_ptr() as *mut i8,
    0,
    );
    info!(ctx, "bpf_d_path");
    };
    info!(ctx, "function filp_close called");
    Ok(())
    }
    The idea is to read the file struct using bpf_probe_read_kernel, extract the f_path, and then pass it to bpf_d_path to resolve the file path. However, loading the program fails with the following verifier error:
    Error: the BPF_PROG_LOAD syscall failed. Verifier output: 0: R1=ctx() R10=fp0
    0: (7b) *(u64 *)(r10 -256) = r1 ; R1=ctx() R10=fp0 fp-256_w=ctx()
    1: (79) r8 = *(u64 *)(r1 +0)
    func 'filp_close' arg0 has btf_id 659 type STRUCT 'file'
    2: R1=ctx() R8_w=ptr_file()
    ...
    37: (bf) r2 = r9 ; R2_w=map_value(map=TT,ks=8,vs=1048,off=8) R9_w=map_value(map=TT,ks=8,vs=1048,off=8)
    38: (b7) r3 = 0 ; R3_w=0
    39: (85) call bpf_d_path#147
    R1 type=fp expected=ptr_, trusted_ptr_, rcu_ptr_
    verification time 130 usec
    stack depth 256+0+0
    processed 37 insns (limit 1000000) max_states_per_insn 0 total_states 2 peak_states 2 mark_read 2
    Caused by:
    Permission denied (os error 13)
    It looks like the verifier is rejecting the first argument to bpf_d_path, saying that it must be a trusted pointer and not a frame pointer (fp). I'm not sure how to fix this in aya.
    My questions:
    What is the correct way to call bpf_d_path in an aya fentry program?
    Is bpf_d_path only usable in certain hook types like LSM or kprobe instead of fentry?
    Is there a better/allowed way to get the full path from a file pointer in an fentry hook?
    Environment:
    Kernel: 6.x
    Rust: aya 0.12
    Hook: fentry(filp_close)
