  issue_body_text: 'Trying to use the various AYA macros (EG: info!(), trace!(), etc)
    within a probe. Everything works as intended until I try to surface strings to
    userspace.

    which can be produced by a simple BPF probe

    I believe this has to do with the BPF verifier needing the size of the values

    Anyway I will keep trying to come up with a pattern to do this -- my next attempt
    will be trying to build a map directly and pass the data in its raw form to userspace.

    Any help or suggestion would be great -- maybe this is just a completely invalid
    approach to getting names out of the kernel.'
  fix:
    summary: Nope it doesn't, you need to create a str out of it, for example see
      https://github.com/alessandrod/aya-echo-tracepoint/blob/598c78f1e9ad4317096397bc3cfea5f930d6c10c/echo-ebpf/src/main.rs#L45
      Also the verifier still needs to be able to see an upper bound for the string
      length, so unless you're creating a string from a fixed array or something,
      you'll have to write some code to make the bound explicit (this is the point
      of the if in the example above)
    selected_comment:
      kind: comment
      url: https://github.com/aya-rs/aya/issues/546#issuecomment-1475034017
      author: alessandrod
      author_association: COLLABORATOR
      body_text: 'In the bindings.rs file the type is defined:

        so maybe a better question is:

        > Does the AYA BPF logger support logging type aya_bpf::cty::c_char

        Nope it doesn''t, you need to create a str out of it, for example see https://github.com/alessandrod/aya-echo-tracepoint/blob/598c78f1e9ad4317096397bc3cfea5f930d6c10c/echo-ebpf/src/main.rs#L45

        Also the verifier still needs to be able to see an upper bound for the string
        length, so unless you''re creating a string from a fixed array or something,
        you''ll have to write some code to make the bound explicit (this is the point
        of the if in the example above)'

