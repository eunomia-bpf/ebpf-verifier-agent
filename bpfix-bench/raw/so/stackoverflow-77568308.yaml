    body_text: 'Here is a working example for raw_tracepoint/sys_enter using cilium/ebpf
      (including all necessary files):

      https://github.com/mozillazg/hello-libbpfgo/tree/develop/12-raw-tracepoint-args/cilium-ebpf

      For PT_REGS_PARM3_CORE: The header file is missing some defines. You can try
      using header files from libbpf, similar to the example project.

      For PT_REGS_PARM3: We need the full verifier error message for debugging. You
      can get the full verifier error log via:

      var ve *VerifierError

      if errors.As(err, &ve) {

      // Using %+v will print the whole verifier error, not just the last

      // few lines.

      fmt.Printf("Verifier error: %+v\n", ve)

      }'
