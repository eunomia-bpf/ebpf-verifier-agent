  selected_answer:
    answer_id: 79348591
    url: https://stackoverflow.com/questions/79348306/bpf-verifier-rejects-the-use-of-path-pointer-as-argument-to-the-bpf-d-path-helpe#79348591
    is_accepted: true
    score: 3
    body_text: 'TL;DR. BPF_CORE_READ_INTO is unnecessary and causes the verifier to
      lose track of the variable''s type.

      Verifier Error Explanation

      12: (85) call bpf_d_path#147

      R1 type=fp expected=ptr_, trusted_ptr_, rcu_ptr_

      The verifier complains that the type for R1 when calling bpf_d_path is not as
      it expects. Since it''s R1, we''re talking about the first argument of bpf_d_path,
      file_path.

      And when it says type, it means verifier types. So the verifier expected one
      of the listed types (ptr_ aka PTR_TO_BTF_ID, with trusted and RCU variants,
      see reg_type_str for the mappings). Instead it got a pointer to the stack (fp
      aka PTR_TO_STACK).

      Root Cause

      Reading up, we can see that R1 points to the offset -16 in the stack (R1_w=fp-16).
      And before that, we can see that that offset was written by bpf_probe_read_kernel.
      As expected and shown by the annotated verifier output, bpf_probe_read_kernel
      comes from the compilation of BPF_CORE_READ_INTO. So BPF_CORE_READ_INTO is copying
      your file->f_path pointer to the stack.

      Looking at verifier examples upstream (ex., tools/testing/selftests/bpf/progs/bpf_iter_task_vmas.c),
      we can see the call to BPF_CORE_READ_INTO isn''t needed. And the copy to the
      stack probably confuses the verifier here.

      Solution

      Your code can be rewritten to:

      SEC("lsm/file_open")

      int BPF_PROG(test_prog, struct file *file, int ret)

      {

      unsigned int f_flags;

      char path_buffer[MAX_SIZE];

      long err = bpf_d_path(&file->f_path, path_buffer, sizeof(path_buffer));

      return 0;

      }

      and it loads!'
    fix_description: Root Cause Solution

