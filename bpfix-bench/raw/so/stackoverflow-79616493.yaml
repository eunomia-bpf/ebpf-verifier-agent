    body_text: |-
      It looks like the verifier is rejecting the first argument to bpf_d_path, saying that it must be a trusted pointer and not a frame pointer (fp). I'm not sure how to fix this in aya.
      The idea behind a trusted pointer is that the verifier can track the data type of a pointer using BTF. Program types such as fentry and LSM programs which attach to known function signatures can make use of this. (so no kprobes since they can attach to any instruction, not just the start of a function, and without BTF)
      Essentially, any pointer passed into an fentry program can be used directly, without bpf_probe_read_kernel as long as what you are doing aligns with the type info the verifier has. So you are allowed to de-reference a pointer, as long as the verifier can track that its a valid pointer. And ironically using bpf_probe_read_kernel causes the verifier to lose track of the true type.
      That is what this line of the verifier log means: func 'filp_close' arg0 has btf_id 659 type STRUCT 'file' it is aware that the first argument is a trusted pointer to type file and when you access a field on that struct it will keep tracking.
      The following is a test from the kernel, its an LSM program, but the idea is the same for fentry.
      SEC("lsm.s/file_open")
      __success
      int BPF_PROG(path_d_path_from_file_argument, struct file *file)
      {
      int ret;
      struct path *path;
      /* The f_path member is a path which is embedded directly within a
      * file. Therefore, a pointer to such embedded members are still
      * recognized by the BPF verifier as being PTR_TRUSTED as it's
      * essentially PTR_TRUSTED w/ a non-zero fixed offset.
      */
      path = &file->f_path;
      ret = bpf_path_d_path(path, buf, sizeof(buf));
      __sink(ret);
      return 0;
      }
      So you should be able to pass file_ptr.f_path directly to bpf_path_d_path. I think this (not a rust user, not sure if its 100% right):
      const INIT_ENENT: Event = Event {
      pid: 0,
      path: [0; 1024],
      };
      #[map]
      pub static TT: LruHashMap<u64, Event> = LruHashMap::with_max_entries(16, 0);
      fn try_ff(ctx: &FEntryContext) -> Result<(), i64> {
      let file_ptr: *const file = unsafe { ctx.arg(0) };
      let addr = file_ptr as u64;
      TT.insert(&addr, &INIT_ENENT, 0).map_err(|_| -6)?;
      let event = unsafe { &mut *TT.get_ptr_mut(&addr).ok_or(-7)? };
      unsafe {
      bpf_d_path(
      &mut file_val.f_path as *mut bindgen::path as *mut aya_ebpf::bindings::path,
      event.path.as_mut_ptr() as *mut i8,
      0,
      );
      info!(ctx, "bpf_d_path");
      };
      info!(ctx, "function filp_close called");
      Ok(())
      }
    fix_description: It looks like the verifier is rejecting the first argument to
      bpf_d_path, saying that it must be a trusted pointer and not a frame pointer
      (fp). I'm not sure how to fix this in aya. The idea behind a trusted pointer
      is that the verifier can track the data type of a pointer using BTF. Program
      types such as fentry and LSM programs which attach to known function signatures
      can make use of this. (so no kprobes since they can attach to any instruction,
      not just the start of a function, and without BTF) essentially PTR_TRUSTED w/
      a non-zero fixed offset.
