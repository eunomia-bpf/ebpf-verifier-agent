  issue_body_text: "I've seen #4612 with similar problem, if this is not right repo,\
    \ please point where to report this. Essentially this is a repost of [my mail](https://www.spinics.net/lists/xdp-newbies/msg02527.html)\
    \ to xdp-newbies@vger.kernel.org\r\n\r\nI am going via https://github.com/xdp-project/xdp-tutorial\
    \ and after 3rd lesson trying to create a simple program for searching TCP timestamp\
    \ option and incrementing it by one. However, after two dozen tries eBPF verifier\
    \ still doesn't accept my code. I was digging into verifier sources and found\
