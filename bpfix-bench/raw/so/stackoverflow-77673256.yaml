    body_text: |-
      I think you can find some processing in Aya's implementation. During the process of loading eBPF program, Aya will first parse the ELF file and find the .rodata section, .bss section, .data section and so on. After this, Aya will create map for these sections. The type of these maps is usually BPF_MAP_TYPE_ARRAY. After this step is completed, the instructions in the program that access the contents of these sections need to be relocated.The core relocation logic is as follows:
      if !map.data().is_empty() {
      instructions[ins_index].set_src_reg(BPF_PSEUDO_MAP_VALUE as u8);
      instructions[ins_index + 1].imm = instructions[ins_index].imm + sym.address as i32;
      } else {
      instructions[ins_index].set_src_reg(BPF_PSEUDO_MAP_FD as u8);
      }
      instructions[ins_index].imm = *fd;
      You can see why this is needed in the kernel documentation.
