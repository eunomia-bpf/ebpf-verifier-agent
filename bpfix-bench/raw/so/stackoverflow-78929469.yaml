    int id = bpf_get_current_pid_tgid();
    // Stash arguments.
    struct data_args_t read_args = {};
    read_args.fd = fd;
    read_args.buf = buf;
    bpf_map_update_elem(&active_read_args_map, &id, &read_args, BPF_NOEXIST);
    return 0;
    }
