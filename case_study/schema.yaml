---
# Benchmark Case Schema for OBLIGE
# Each case represents one verifier failure instance.
schema_name: benchmark_case
schema_version: 0.1.0
title: Benchmark Case Schema for OBLIGE
description: |
  Canonical schema for a single benchmark case in the OBLIGE corpus.
  The unit of data is one reproducible verifier failure paired with enough
  context to re-run the failure, classify it, explain it, and validate a fix.
required:
  - case_id
  - source
  - title
  - failure_class
  - source_code
  - compile_args
  - target_kernel
  - verifier_log
  - root_cause
  - fix_patch
  - semantic_test
  - tags
  - difficulty
fields:
  case_id:
    type: string
    required: true
    description: Unique stable identifier for the case.
    examples:
      - so-12345
      - selftest-neg-001
      - aya-fix-007
  source:
    type: enum
    required: true
    values:
      - stackoverflow
      - selftest
      - cilium
      - aya
      - katran
      - synthetic
    description: Provenance bucket used for dataset accounting and sampling.
  title:
    type: string
    required: true
    description: Short human-readable title describing the failing program.
  url:
    type: string
    format: uri
    required: false
    description: Optional upstream URL for the original report, commit, or discussion.
  failure_class:
    type: enum
    required: true
    values:
      - source_bug
      - lowering_artifact
      - verifier_limit
      - env_mismatch
      - verifier_bug
    description: Primary taxonomy label assigned after manual review.
  source_code:
    type: string
    required: true
    description: Repository-relative path to the failing `.bpf.c` source file.
  compile_args:
    type: string
    required: true
    description: Exact clang flags needed to reproduce the bytecode fed to the verifier.
  target_kernel:
    type: string
    required: true
    description: Kernel version or release family under which the failure is canonical.
    examples:
      - 6.8.0
      - 6.6.y
      - bpf-next-2026-02-15
  verifier_log:
    type: string
    required: true
    description: Repository-relative path to the raw verifier log captured during reproduction.
  root_cause:
    type: string
    required: true
    description: Human-written explanation of the true reason the verifier rejected the program.
  fix_patch:
    type: string
    required: true
    description: Repository-relative path to the patch that resolves the failure.
  semantic_test:
    type: string
    required: true
    description: Path to the oracle or regression test proving semantic correctness after repair.
  tags:
    type: list[string]
    required: true
    description: Free-form retrieval and slicing tags such as `map_value`, `ptr_arith`, or `ringbuf`.
  difficulty:
    type: enum
    required: true
    values:
      - easy
      - medium
      - hard
    description: Rough estimate of repair difficulty for humans or agents.
validation_notes:
  - "`case_id` should remain stable even if file paths or metadata are later normalized."
  - "`compile_args` should preserve ordering because clang flag order can affect emitted bytecode."
  - "`root_cause` should describe semantics, not merely repeat the verifier's free-text message."
  - "`semantic_test` is required because verifier acceptance alone is not a correctness oracle."
example:
  case_id: so-12345
  source: stackoverflow
  title: Missing bounds guard before packet access
  url: https://stackoverflow.com/questions/example
  failure_class: source_bug
  source_code: case_study/cases/so-12345/prog.bpf.c
  compile_args: -O2 -g -target bpf -D__TARGET_ARCH_x86
  target_kernel: 6.8.0
  verifier_log: case_study/cases/so-12345/verifier.log
  root_cause: Packet cursor is advanced without proving room for the subsequent load.
  fix_patch: case_study/cases/so-12345/fix.patch
  semantic_test: case_study/cases/so-12345/test.sh
  tags:
    - packet
    - bounds
    - direct_packet_access
  difficulty: easy
