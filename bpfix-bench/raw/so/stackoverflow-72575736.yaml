    4 mark_read 2

    As I understand the issue, the verifier of the 5.10 kernel rejects the dereferencing
    of the packet pointer, claiming that we don''t have validated that it is always
    within bounds (reading at offset 14 while r is 13). We do in fact check this just
    above.

    Interestingly, if I oversize the bounds check above to something like this, both
    the 5.10 and 5.13 kernel verifiers accept the program:

    [snip]

    for i in 0..500 {

    address = start + off + i;

    // Checking 2 bytes ahead makes 5.10 verifier happy

    if address <= start || (address + 2) >= end {

    break;

    }

    // Works on both 5.10 and 5.13

    let byte = *(address as *const u8);

    // Just so the packet read above doesn''t get optimized away

    printk!("%u", byte as u32);

    }

    Ok(XdpAction::Pass)

    }

    But the above is not what I want, because this causes the bounded loop to abort
    too early - I want the loop to run fully, if the packet is large enough. I have
    tried the usual tricks I do when I run into verifier issues, but so far to no
    avail. I don''t quite understand why the 5.10 verifier is unhappy with the first
    example. Usually this is related to some unbounded registers, but as far as I
    can see all bounds should be satisfied.

    I have tried looking at a diff of the kernel verifier between the two versions,
    but couldn''t see any obvious change that causes this.'
