  question_body_text: 'I''m trying to load an eBPF object in the kernel with libbpf,
    with no success, getting the error specified in the title. But let me show how
    simple my BPF *_kern.c is.

    SEC("entry_point_prog")

    int entry_point(struct xdp_md *ctx)

    {

    int act = XDP_DROP;

    int rc, i = 0;

    struct global_vars *globals;

    struct ip_addr addr = {};

    struct some_key key = {};

    void *temp;

    globals = bpf_map_lookup_elem(&globals_map, &i);

    if (!globals)

    return XDP_ABORTED;

    rc = some_inlined_func(ctx, &key);

    addr = key.dst_ip;

    temp = bpf_map_lookup_elem(&some_map, &addr);

    switch(rc)

    {

    case 0:

    if(temp)

    {

    // no rocket science here ...

    } else

    act = XDP_PASS;

    break;

    default:

    break;

    }

    return act; // this gives the error

    //return XDP_<whatever>; // this works fine

    }

    More precisely, the libbpf error log is the following:

    105: (bf) r4 = r0

    106: (07) r4 += 8

    107: (b7) r8 = 1

    108: (2d) if r4 > r3 goto pc+4

    R0=inv40 R1=inv0 R2=inv(id=0,umax_value=4294967295,var_off=(0x0; 0xffffffff))
    R3=pkt_end(id=0,off=0,imm=0) R4=inv48 R5=inv512 R6=inv1 R7=inv17 R8=inv1 R10=fp0,call_-1
    fp-16=0 fp-32=0 fp-40=0

    109: (69) r3 = *(u16 *)(r0 +2)

    R0 invalid mem access ''inv''

    I really don''t see any problem here. I mean, this is so so simple, and yet it
    breaks. Why shouldn''t this work? What am I missing? Either the verifier went
    crazy, or I''m doing something very stupid.'
