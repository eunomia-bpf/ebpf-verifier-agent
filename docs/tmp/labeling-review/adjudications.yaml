cases:
  - case_id: github-aya-rs-aya-1062
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E005
    fix_type: type_cast
    root_cause_description: >-
      Using `ctx.ret().unwrap()` as the read length lowers into verifier-hostile
      signed arithmetic, so the safe runtime length loses its non-negative bound
      before `bpf_probe_read_user()`.
    fix_direction: >-
      Cast or clamp the return value into a simple unsigned bounded length and
      avoid panic-style `unwrap()` paths inside eBPF code.
    adjudication_reasoning: >-
      The verifier log is a pure scalar-range failure (`R2 min value is
      negative`) and the same call passes when the length is hard-coded. That is
      stronger evidence for proof loss after lowering than for a source-level
      memory-safety bug.
    close_call: false

  - case_id: github-cilium-cilium-41412
    kind: disagreement
    final_class: verifier_limit
    error_id: BPFIX-E018
    fix_type: loop_rewrite
    root_cause_description: >-
      The builtins memmove test expands into a verifier proof shape with very
      high instruction and state counts, and `bpf_jit_harden=2` pushes that
      proof over the verifier's practical complexity budget.
    fix_direction: >-
      Backport the simplification that removes the exponential complexity
      growth, or otherwise reduce the generated proof shape so the test stays
      under verifier complexity limits.
    adjudication_reasoning: >-
      The decisive evidence is the load log itself: nearly 500k processed
      instructions and a fix discussion centered on reducing exponential
      complexity growth. The environment setting changes whether the limit is
      hit, but the failure mode is still verifier-budget exhaustion rather than
      a missing helper capability.
    close_call: false

  - case_id: github-cilium-cilium-41522
    kind: disagreement
    final_class: verifier_bug
    error_id: BPFIX-E010
    fix_type: other
    root_cause_description: >-
      A node-specific verifier regression rejects a long-standing Cilium
      packet-access pattern after upgrade even though the same logical program
      still loads elsewhere.
    fix_direction: >-
      Compare the failing node's exact kernel, BTF, and build inputs against a
      working node and reduce the failing path to a minimal reproducer before
      deciding whether to rewrite the program or upgrade the kernel.
    adjudication_reasoning: >-
      The issue report is explicitly node-specific and regression-shaped, and
      the available case data does not show a concrete source-level check
      omission that would explain acceptance on the other nodes. That makes
      verifier-side regression the better fit, but the evidence is incomplete.
    close_call: true

  - case_id: kernel-selftest-dynptr-fail-invalid-slice-rdwr-rdonly-cgroup-skb-ingress-61688196
    kind: disagreement
    final_class: env_mismatch
    error_id: BPFIX-E016
    fix_type: env_fix
    root_cause_description: >-
      The program asks for a writable dynptr slice from packet data in
      `cgroup_skb/ingress`, but that program type does not permit packet writes
      in this context.
    fix_direction: >-
      Use a read-only slice API in this program type, or move the logic to a
      program context that actually allows packet-data writes.
    adjudication_reasoning: >-
      The selftest source and the verifier log both point to a context
      restriction, not to a missing proof in the code. The code is intentionally
      invoking an operation that this program type forbids.
    close_call: false

  - case_id: stackoverflow-53136145
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E006
    fix_type: inline
    root_cause_description: >-
      The parser merges IPv4 and IPv6-derived pointers through a conditional
      expression, and the emitted bytecode loses the verifier's proof about
      which checked packet base the merged UDP pointer came from.
    fix_direction: >-
      Keep the IPv4 and IPv6 pointer derivations in separate verifier-visible
      branches, or recompute the UDP pointer from the checked base inside each
      branch before dereferencing it.
    adjudication_reasoning: >-
      The accepted fix is to restructure the pointer merge rather than to add a
      new packet-length check. That means the source already had the essential
      safety checks, but the verifier lost the proof after the control-flow
      merge.
    close_call: false

  - case_id: stackoverflow-70729664
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E005
    fix_type: reorder
    root_cause_description: >-
      The SCTP parser already bounds `size`, but once the larger unrolled loop
      forces the value through stack spill and reload, the verifier loses that
      tighter range and packet-pointer arithmetic exceeds the `MAX_PACKET_OFF`
      proof limit.
    fix_direction: >-
      Reorder the code so the narrowed size is preserved at the use site, or
      add an explicit `MAX_PACKET_OFF` clamp immediately after advancing the
      cursor.
    adjudication_reasoning: >-
      The failure is not an explicit complexity-limit rejection. The stronger
      evidence is the accepted explanation that the bounded `size` proof is lost
      after spill/reload when the loop gets large, which fits proof loss after
      lowering better than either `source_bug` or `verifier_limit`.
    close_call: true

  - case_id: stackoverflow-70750259
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E005
    fix_type: type_cast
    root_cause_description: >-
      The TLS extension length is assembled from packet bytes in a way that
      causes the verifier to lose its non-negative bounded interpretation before
      the packet-pointer addition.
    fix_direction: >-
      Force the extension length into a verifier-friendly unsigned or clamped
      form before adding it to a packet pointer.
    adjudication_reasoning: >-
      The source uses an unsigned length, but the verifier log shows the bound
      disappearing only after the lowered byte assembly and endian conversion.
      That is classic scalar-range proof loss rather than the absence of a
      bounds intent in source.
    close_call: false

  - case_id: stackoverflow-70760516
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E005
    fix_type: reorder
    root_cause_description: >-
      The TLS parser checks each extension step, but after the cursor is
      advanced through the loop the verifier no longer associates the earlier
      packet bound with the `ext` pointer load.
    fix_direction: >-
      Keep the checked cursor in a dedicated local, add hard bounds that keep
      the total packet cursor below verifier packet-offset limits, and
      dereference the exact checked pointer before mutating the main cursor.
    adjudication_reasoning: >-
      The source already has packet-end checks around the extension parsing, yet
      the verifier loses the proof once the cursor's worst-case offset grows
      across iterations. That is a verifier-proof-shape problem, not a missing
      source check.
    close_call: false

  - case_id: stackoverflow-72074115
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E005
    fix_type: clamp
    root_cause_description: >-
      The source guards `shift < 64`, but the emitted code for the cubic lookup
      still loses the verifier's index proof before the table access.
    fix_direction: >-
      Rewrite the lookup as a simple verifier-friendly clamp or constant-sized
      table access so the checked index survives lowering.
    adjudication_reasoning: >-
      The source contains an explicit range check for the table index, so there
      is already a valid safety condition. The rejection comes from the verifier
      not retaining that proof at the array access site.
    close_call: false

  - case_id: stackoverflow-72560675
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E005
    fix_type: clamp
    root_cause_description: >-
      The code clamps the copy size with `MIN()`, but the older 4.14 verifier
      loses that bound and still treats the helper length as too wide unless it
      is rewritten into a simpler form.
    fix_direction: >-
      Rewrite the size cap into a verifier-friendly constant clamp that the
      older kernel can track directly, or carry a kernel-version-specific
      workaround.
    adjudication_reasoning: >-
      The failure is version-sensitive, but the source can be rewritten into an
      equivalent verifier-friendly form without changing the intended safety
      policy. That makes this closer to proof loss in an older verifier than to
      a pure verifier-bug label.
    close_call: true

  - case_id: stackoverflow-74531552
    kind: disagreement
    final_class: source_bug
    error_id: BPFIX-E023
    fix_type: clamp
    root_cause_description: >-
      The automaton state value is used as a stack or table index before being
      proven to lie within the valid state range.
    fix_direction: >-
      Validate or clamp `*curr_state` before indexing the transition table, and
      reject impossible negative or oversized states first.
    adjudication_reasoning: >-
      The accepted fix is to add an explicit source-level bounds check on
      `*curr_state`. That is direct evidence that the original source was
      missing a necessary verifier-visible range proof.
    close_call: false

  - case_id: stackoverflow-75643912
    kind: disagreement
    final_class: source_bug
    error_id: BPFIX-E001
    fix_type: bounds_check
    root_cause_description: >-
      The loop condition uses `tcp_data + i <= data_end`, which is not a
      dominating one-byte packet-access proof for the subsequent `tcp_data[i]`
      load on every iteration.
    fix_direction: >-
      Move the one-byte packet bound check into the loop body and express it as
      a direct `loop_ptr + 1 <= data_end` guard immediately before the byte
      load.
    adjudication_reasoning: >-
      This source-level condition is genuinely too weak for a one-byte
      dereference at the equality boundary, and the accepted rewrite fixes the
      check itself rather than only changing code shape. That is stronger
      evidence for a real packet-bounds bug than for a lowering artifact.
    close_call: true

  - case_id: stackoverflow-76160985
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E006
    fix_type: inline
    root_cause_description: >-
      Passing the fixed-size packet buffer through a separate helper subprogram
      erases the verifier's knowledge of its size, so later indexed reads are
      validated without the caller-side allocation proof.
    fix_direction: >-
      Mark the helper `__always_inline` or otherwise keep the bounded object and
      its length proof in the same verifier-visible function.
    adjudication_reasoning: >-
      The selected fix is pure inlining, and the verifier log shows the helper
      subprogram being validated in isolation. That is a textbook cross-function
      proof-loss case, not a missing safety check in the original logic.
    close_call: false

  - case_id: stackoverflow-76637174
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E005
    fix_type: reorder
    root_cause_description: >-
      The payload scan is guarded in source, but after several variable-offset
      packet steps the verifier loses the range on the recomputed scan cursor
      inside the loop body.
    fix_direction: >-
      Rewrite the scan as a cursor-based loop with an explicit maximum iteration
      bound, and perform the packet-end check on the exact pointer that is
      dereferenced.
    adjudication_reasoning: >-
      The accepted answer points to loop rewrite and explicit verifier-friendly
      cursor checks, not to a fundamentally missing source safety condition. The
      rejection comes from proof shape and looped packet-pointer reconstruction.
    close_call: true

  - case_id: stackoverflow-79485758
    kind: disagreement
    final_class: lowering_artifact
    error_id: BPFIX-E005
    fix_type: type_cast
    root_cause_description: >-
      The packet field offset is checked in source, but the verifier loses the
      pointer-range proof because the offset can grow to the verifier's maximum
      packet-offset limit and is also mixed with signed byte arithmetic in the
      loop.
    fix_direction: >-
      Keep the field offset in an unsigned bounded type, add an explicit
      packet-offset clamp below `MAX_PACKET_OFF`, and restate the checked cursor
      directly at the read site.
    adjudication_reasoning: >-
      The failing dereference already has a bounds check immediately above it.
      The selected explanation in the case data is a verifier corner case around
      packet-offset maxima, which is stronger evidence for lowering-induced
      proof loss than for a missing source guard.
    close_call: true

  - case_id: stackoverflow-76441958
    kind: manual_override
    final_class: env_mismatch
    error_id: unmatched
    fix_type: env_fix
    root_cause_description: >-
      The atomic compare-and-swap depends on target-architecture alignment
      guarantees for user-space memory, so the failure is driven by an ABI and
      execution-environment mismatch rather than by a missing verifier proof in
      the BPF logic itself.
    fix_direction: >-
      Align the user-space data or struct layout for the target architecture, or
      move the state into a verifier-supported kernel or BPF object instead of
      doing direct atomics on raw user memory.
    adjudication_reasoning: >-
      This case is a calibration override against the manual labels. The source
      and log surface a scalar-pointer misuse, but the accepted explanation is
      architecture-dependent alignment behavior for atomic operations on user
      memory, which is better modeled as an environment mismatch.
    close_call: true
