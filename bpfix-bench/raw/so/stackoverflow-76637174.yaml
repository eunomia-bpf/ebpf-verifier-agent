  question_body_text: 'I''m trying force the retransmission of certain TCP packet
    to test some feature.

    I would like to drop RX TCP packets (dst port 4420) whose payload is all zeros
    except for the last 4 bytes which should have at least a non-null byte.

    Unfortunately I cannot get around the eBPF verifier :(

    I''m trying to compromise with "starts with at least 50 zero bytes followed by
    a non-zero byte" but still no luck.

    #define KBUILD_MODNAME "xdp_nvme_drop"

    #include <linux/bpf.h>

    #include <linux/in.h>

    #include <linux/if_ether.h>

    #include <linux/if_packet.h>

