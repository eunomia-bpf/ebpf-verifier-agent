  fixed_code: "// FILE: src/libbpf.c\n// CONTEXT: struct avail_kallsyms_data {\nstatic\
    \ int avail_func_cmp(const void *a, const void *b)\n{\n\treturn strcmp(*(const\
    \ char **)a, *(const char **)b);\n}\n\nstatic int avail_kallsyms_cb(unsigned long\
    \ long sym_addr, char sym_type,\n\t\t\t     const char *sym_name, void *ctx)\n\
    {\n\tstruct avail_kallsyms_data *data = ctx;\n\tstruct kprobe_multi_resolve *res\
    \ = data->res;\n\tint err;\n\n\tif (!glob_match(sym_name, res->pattern))\n\t\t\
    return 0;\n\n\tif (!bsearch(&sym_name, data->syms, data->cnt, sizeof(*data->syms),\
    \ avail_func_cmp)) {\n\t\t/* Some versions of kernel strip out .llvm.<hash> suffix\
    \ from\n\t\t * function names reported in available_filter_functions, but\n\t\t\
    \ * don't do so for kallsyms. While this is clearly a kernel\n\t\t * bug (fixed\
    \ by [0]) we try to accommodate that in libbpf to\n\t\t * make multi-kprobe usability\
    \ a bit better: if no match is\n\t\t * found, we will strip .llvm. suffix and\
    \ try one more time.\n\t\t *\n\t\t *   [0] fb6a421fb615 (\"kallsyms: Match symbols\
    \ exactly with CONFIG_LTO_CLANG\")\n\t\t */\n\t\tchar sym_trim[256], *psym_trim\
