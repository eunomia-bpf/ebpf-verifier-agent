  fixed_code: |-
    // FILE: katran/lib/bpf/pckt_parsing.h
    // CONTEXT: __attribute__((__always_inline__)) int parse_hdr_opt_raw(
        return -1;
      }

      if (kind == TCP_HDR_OPT_KIND_TPR) {
        if (hdr_len != TCP_HDR_OPT_LEN_TPR) {
          return -1;
        }

        if (tcp_opt + TCP_HDR_OPT_LEN_TPR > data_end) {
          return -1;
        }

        // TPR wire format is little-endian. Read the value and convert to host
        // byte order if needed for cross-architecture compatibility.
        state->server_id = *(__u32*)&tcp_opt[2];
    #if __BYTE_ORDER__ == __ORDER_BIG_ENDIAN__
        // TODO (T244373617): Add stats for this case
        state->server_id = __builtin_bswap32(state->server_id);
    #endif
        return 1;
      }

      state->hdr_bytes_remaining -= hdr_len;
      state->byte_offset += hdr_len;
      return 0;
    }

