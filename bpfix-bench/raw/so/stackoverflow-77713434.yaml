  question_body_text: 'In the kretprobe/sys_read probe, I am trying to read the request
    buffer (user space) in a BPF_MAP_TYPE_ARRAY. The eBPF verifier is throwing the
    following error:

    {"error": "field SyscallProbeRetRead: program syscall__probe_ret_read: load program:
    permission denied: invalid access to map value, value_size=70 off=0 size=16383:
    R1 min value is outside of the allowed memory range (truncated, 73 line(s) omitted)"}

    LOGIC: If the buf_size is greater than MAX_MSG_SIZE, then we will read TRACE_PARENT_SIZE
    or less (depending on the size of the buffer) into seventy_bytes_array->data,
    otherwise, we will not read anything.

    #define MAX_MSG_SIZE 16383

    #define TRACE_PARENT_SIZE 70

    SEC("kretprobe/sys_read")

    int syscall__probe_ret_read(struct pt_regs *ctx)

    {

    size_t buf_size = PT_REGS_RC(ctx);

    u64 id = bpf_get_current_pid_tgid();

    struct data_args_t *read_args = bpf_map_lookup_elem(&active_read_args_map, &id);

    if (read_args)

    {

    char *buf = read_args->buf;

    const u32 keyOne = 0;

    struct char_array_value *seventy_bytes_array = bpf_map_lookup_elem(&leftover_buf,
    &keyOne);

    unsigned int overrided_bytes = (buf_size - MAX_MSG_SIZE) > TRACE_PARENT_SIZE ?
    TRACE_PARENT_SIZE : ((buf_size - MAX_MSG_SIZE) > 0 ? (buf_size - MAX_MSG_SIZE)
    : 0);

    if (overrided_bytes > 0 && buf + MAX_MSG_SIZE && seventy_bytes_array)

    {

    asm volatile("%[overrided_bytes] &= 0x3fff;\n" ::[overrided_bytes] "+r"(overrided_bytes)
    :);

    bpf_probe_read_user(&seventy_bytes_array, overrided_bytes & 0x3fff, buf + MAX_MSG_SIZE);

    }

    }

    return 0;

    }

