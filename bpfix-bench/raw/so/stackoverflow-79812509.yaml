    url: https://stackoverflow.com/questions/79812509/bpf-lsm-bpf-task-storage-get-expects-a-trusted-pointer#79813194
    is_accepted: true
    score: 2
    body_text: 'TL;DR. This is happening because the bpf_get_current_task helper doesn''t
      preserve the type of the returned pointer. Instead, you''ll want to use bpf_get_current_task_btf.

      Verifier Error Explanation

      ; struct task_struct *s_task = (void *)bpf_get_current_task(); @ provenance_tracing_programs.bpf.c:139

      0: (85) call bpf_get_current_task#35 ; R0_w=scalar()

      [...]

      3: (bf) r2 = r0 ; R0_w=scalar(id=1) R2_w=scalar(id=1)

      [...]

      6: (85) call bpf_task_storage_get#156

      R2 type=scalar expected=ptr_, trusted_ptr_, rcu_ptr_

      processed 6 insns (limit 1000000) max_states_per_insn 0 total_states 0 peak_states
      0 mark_read 0

      The verifier complains that R2, the second argument to your bpf_task_storage_get
      call, contains a scalar instead of a trusted pointer. We can see that this is
      coherent with the verifier type infered for s_task: at instruction 0, R0 contains
      the return value from bpf_get_current_task and is identified as a scalar. That
      is then copied to R2 at instruction 3.

      That is also coherent with the prototype information provided to the verifier
      for bpf_get_current_task:

      const struct bpf_func_proto bpf_get_current_task_proto = {

      .func = bpf_get_current_task,

      .gpl_only = true,

      .ret_type = RET_INTEGER,

      };

      Hence, bpf_get_current_task returns a scalar from the verifier''s point of view.

      Solutions

      There is fortunately an easy solution to this. You can use a newer BPF helper
      instead, bpf_get_current_task_btf which allows the verifier to preserve the
      type information via BTF.

      That is a direct replacement for bpf_get_current_task and, after that, your
      program will run.

      Another solution could be to use the bpf_task_from_pid kfunc to retrieve a pointer
      to a refcounted struct task_struct. You would then need to release this refcounted
      object with kfunc bpf_task_release. I don''t believe this slightly more complex
      solution is required in your case.'
    fix_description: TL;DR. This is happening because the bpf_get_current_task helper
      doesn't preserve the type of the returned pointer. Instead, you'll want to use
      bpf_get_current_task_btf. Solutions There is fortunately an easy solution to
