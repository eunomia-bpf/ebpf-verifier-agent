  question_body_text: "I'm working on an LSM BPF program and running into an issue\
    \ with bpf_task_storage_get. Here\u2019s a minimal example that works:\nstruct\
    \ provenance_structure {\n__u8 to_trace;\nstruct bpf_spin_lock lock;\n};\nstruct\
    \ {\n__uint(type, BPF_MAP_TYPE_TASK_STORAGE);\n__uint(map_flags, BPF_F_NO_PREALLOC);\n\
    __type(key, int);\n__type(value, struct provenance_structure);\n} provenance_structure_map_task\
    \ SEC(\".maps\");\nSEC(\"lsm/task_alloc\")\nint BPF_PROG(task_allocation, struct\
    \ task_struct *p, u64 clone_flags) {\nstruct provenance_structure *prov;\nprov\
    \ = bpf_task_storage_get(&provenance_structure_map_task, p, NULL, 0);\nif(prov){\n\
    bpf_spin_lock(&prov->lock);\nprov->to_trace = 1;\nbpf_spin_unlock(&prov->lock);\n\
    }\nreturn 0;\n}\nHowever, if I try to get the BPF storage for the current task\
    \ instead of the p argument, it fails to attach:\nSEC(\"lsm/task_alloc\")\nint\
    \ BPF_PROG(task_allocation, struct task_struct *p, u64 clone_flags) {\n// casting\
    \ the task to (struct task_struct *) yields the same error\nstruct task_struct\
    \ *s_task = (void *)bpf_get_current_task();\nstruct provenance_structure *prov;\n\
    prov = bpf_task_storage_get(&provenance_structure_map_task, s_task, NULL, 0);\n\
    if(prov){\nbpf_spin_lock(&prov->lock);\n// store a provenance_structure to the\
    \ inode, with the to_trace flag set to True\nprov->to_trace = 1; // true\nbpf_spin_unlock(&prov->lock);\n\
    }\nreturn 0;\n}\nThe verifier log shows that, the function bpf_task_storage_get\
    \ expects as second argument a pointer or a trusted pointer, instead it perceives\
    \ s_task as a scalar:\nlibbpf: prog 'task_allocation': -- BEGIN PROG LOAD LOG\
    \ --\n0: R1=ctx() R10=fp0\n; struct task_struct *s_task = (void *)bpf_get_current_task();\
    \ @ provenance_tracing_programs.bpf.c:139\n0: (85) call bpf_get_current_task#35\
    \ ; R0_w=scalar()\n; prov = bpf_task_storage_get(&provenance_structure_map_task,\
    \ s_task, NULL, 0); @ provenance_tracing_programs.bpf.c:141\n1: (18) r1 = 0xffff9a96d1220200\
    \ ; R1_w=map_ptr(map=provenance_stru,ks=4,vs=272)\n3: (bf) r2 = r0 ; R0_w=scalar(id=1)\
    \ R2_w=scalar(id=1)\n4: (b7) r3 = 0 ; R3_w=0\n5: (b7) r4 = 0 ; R4_w=0\n6: (85)\
    \ call bpf_task_storage_get#156\nR2 type=scalar expected=ptr_, trusted_ptr_, rcu_ptr_\n\
    processed 6 insns (limit 1000000) max_states_per_insn 0 total_states 0 peak_states\
    \ 0 mark_read 0\n-- END PROG LOAD LOG --\nlibbpf: prog 'task_allocation': failed\
    \ to load: -13\nlibbpf: failed to load object 'provenance_tracing_programs_bpf'\n\
    failed to load BPF object: -13"
