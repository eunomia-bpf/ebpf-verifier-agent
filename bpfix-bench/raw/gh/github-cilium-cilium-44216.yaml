  fix:
    summary: These warnings are a known issue upstream. They were reported by syzkaller
      several times (cf. BPF mailing list), but were thought to be hard to hit in
      real-world programs. We're working on a long-term solution but since this is
      hitting Cilium now, we may also need a shorter-term solution. These warnings
      should however be guarded by CONFIG_DEBUG_KERNEL. Does that mean debugging mode
      is enabled in your kernel? (Even without the warning, the program rejection
      would still happen, so we'll need a fix either way.)
    selected_comment:
      kind: comment
      url: https://github.com/cilium/cilium/issues/44216#issuecomment-3861624758
      author: pchaigno
      author_association: MEMBER
      body_text: |-
        Thanks for the reports!
        These warnings are a known issue upstream. They were reported by syzkaller several times (cf. BPF mailing list), but were thought to be hard to hit in real-world programs. We're working on a long-term solution but since this is hitting Cilium now, we may also need a shorter-term solution.
        These warnings should however be guarded by CONFIG_DEBUG_KERNEL. Does that mean debugging mode is enabled in your kernel? (Even without the warning, the program rejection would still happen, so we'll need a fix either way.)
