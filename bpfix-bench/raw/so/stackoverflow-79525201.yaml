    body_text: 'You''re using bpf_xdp_adjust_tail to add room after the packet, then
      trying to move the transport header and payload back. Instead, you should use
      bpf_xdp_adjust_head to add room before the packet, then moving the Ethernet
      and IP headers forward.

      You can do this as follows:

      /* Adds space before your packet. */

      if (bpf_xdp_adjust_head(ctx, 0 - sizeof(*entry)))

      return XDP_PASS;

      /* Perform bounds check again. */

      void *new_eth = (void *)(long)xdp->data;

      void *old_eth = new_eth + sizeof(struct CustomIPEntry);

      void *data_end = (void *)(long)xdp->data_end;

      size_t headers_to_move = sizeof(struct ethhdr) + sizeof(struct iphdr);

      if (old_eth + headers_to_move + sizeof(*entry) > data_end)

      return XDP_PASS;

      /* Move the Ethernet and IP headers forward. */

      memcpy(new_eth, old_eth, headers_to_move);

      /* Write your IP option. */

      memcpy(new_eth + headers_to_move, entry, sizeof(*entry));

      Notice the negative second argument for bpf_xdp_adjust_head, as described in
      the documentation:

      Note that it is possible to use a negative value for delta. This helper can
      be used to prepare the packet for pushing or popping headers.'
    fix_description: You're using bpf_xdp_adjust_tail to add room after the packet,
      then trying to move the transport header and payload back. Instead, you should
      use bpf_xdp_adjust_head to add room before the packet, then moving the Ethernet
      and IP headers forward. Note that it is possible to use a negative value for
      delta. This helper can be used to prepare the packet for pushing or popping
      headers.

