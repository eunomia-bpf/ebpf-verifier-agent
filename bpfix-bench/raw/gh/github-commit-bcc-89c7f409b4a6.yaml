  buggy_code: "// FILE: libbpf-tools/ksnoop.bpf.c\n#include \"ksnoop.h\"\n\n/* For\
    \ kretprobes, the instruction pointer in the struct pt_regs context\n * is the\
    \ kretprobe_trampoline.  We derive the instruction pointer\n * by pushing it onto\
    \ a function stack on entry and popping it on return.\n *\n * We could use bpf_get_func_ip(),\
    \ but \"stack mode\" - where we\n * specify functions \"a\", \"b and \"c\" and\
    \ only want to see a trace if \"a\"\n * calls \"b\" and \"b\" calls \"c\" - utilizes\
    \ this stack to determine if trace\n * data should be collected.\n */\n#define\
    \ FUNC_MAX_STACK_DEPTH\t16\n\n#ifndef ENOSPC\n#define ENOSPC\t\t\t28\n#endif\n\
    \nstruct func_stack {\n\t__u64 task;\n\t__u64 ips[FUNC_MAX_STACK_DEPTH];\n\t__u8\
    \ stack_depth;\n};\n\n#define MAX_TASKS\t\t2048\n\n// CONTEXT: static struct trace\
    \ *get_trace(struct pt_regs *ctx, bool entry)\n\t\tip = KSNOOP_IP_FIX(PT_REGS_IP_CORE(ctx));\n\
    \t\tif (stack_depth >= FUNC_MAX_STACK_DEPTH - 1)\n\t\t\treturn NULL;\n\t\t/* verifier\
    \ doesn't like using \"stack_depth - 1\" as array index\n\t\t * directly.\n\t\t\
    \ */\n\t\tlast_stack_depth = stack_depth - 1;\n\t\t/* get address of last function\
    \ we called */\n\t\tif (last_stack_depth >= 0 &&\n\t\t    last_stack_depth < FUNC_MAX_STACK_DEPTH)\n\
    \t\t\tlast_ip = func_stack->ips[last_stack_depth];\n\t\t/* push ip onto stack.\
    \ return will pop it. */\n\t\tfunc_stack->ips[stack_depth++] = ip;\n\t\tfunc_stack->stack_depth\
    \ = stack_depth;\n\t\t/* rather than zero stack entries on popping, we zero the\n\
    \t\t * (stack_depth + 1)'th entry when pushing the current\n\t\t * entry.  The\
    \ reason we take this approach is that\n\t\t * when tracking the set of functions\
    \ we returned from,\n\t\t * we want the history of functions we returned from\
    \ to\n\t\t * be preserved.\n\t\t */\n\t\tif (stack_depth < FUNC_MAX_STACK_DEPTH)\n\
    \t\t\tfunc_stack->ips[stack_depth] = 0;\n\t} else {\n\t\tif (stack_depth == 0\
    \ || stack_depth >= FUNC_MAX_STACK_DEPTH)\n\t\t\treturn NULL;\n\t\tlast_stack_depth\
    \ = stack_depth;\n\t\t/* get address of last function we returned from */\n\t\t\
    if (last_stack_depth >= 0 &&\n\t\t    last_stack_depth < FUNC_MAX_STACK_DEPTH)\n\
    \t\t\tlast_ip = func_stack->ips[last_stack_depth];\n\t\tif (stack_depth > 0)\n\
    \t\t\tstack_depth = stack_depth - 1;\n\t\t/* retrieve ip from stack as IP in pt_regs\
    \ is\n\t\t * bpf kretprobe trampoline address.\n\t\t */\n\t\tif (stack_depth >=\
    \ 0 && stack_depth < FUNC_MAX_STACK_DEPTH)\n\t\t\tip = func_stack->ips[stack_depth];\n\
    \t\tif (stack_depth >= 0 && stack_depth < FUNC_MAX_STACK_DEPTH)\n\t\t\tfunc_stack->stack_depth\
    \ = stack_depth;\n\t}\n\n\ttrace = bpf_map_lookup_elem(&ksnoop_func_map, &ip);\n\
    \tif (!trace)\n\t\treturn NULL;"
