  selected_answer:
    answer_id: 78271287
    url: https://stackoverflow.com/questions/78266602/using-a-program-of-type-raw-tracepoint-to-trace-sched-wakeup-bpf-verifies-that-t#78271287
    is_accepted: true
    score: 0
    body_text: 'The task_struct *p is not empty. The error is caused by p->pid.

      You can''t directly read it, try to change it to:

      r_p_data.pid = BPF_CORE_READ(p, pid);

      or

      bpf_probe_read_kernel(&r_p_data.pid, sizeof(r_p_data.pid), &p->pid);'
    fix_description: 'The task_struct *p is not empty. The error is caused by p->pid.
      You can''t directly read it, try to change it to: r_p_data.pid = BPF_CORE_READ(p,
      pid);'

