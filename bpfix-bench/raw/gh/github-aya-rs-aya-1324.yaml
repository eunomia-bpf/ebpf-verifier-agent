  issue_body_text: 'I''m learning Aya by writing a tracepoint that will look for calls
    to execve and just log some information about the call. I have the following:

    When I try to run it with my userspace program:

    I get:

    But if I comment out the EbpfLogger::init(&mut bpf)? I don''t get that error and
    the program runs just fine.

    Running on Fedora.'
  fix:
    summary: 'Also your code has the same problem as OP''s. You are not actually consuming
      the logs. For posterity your init call is here: https://github.com/firezone/firezone/blob/683a190855509df8776f3ff8d37cc638dc272e8c/rust/relay/server/src/ebpf/linux.rs#L47
      but you drop the returned Logger which is almost certainly what''s leading to
      your (and OP''s) problems. See https://github.com/aya-rs/aya/tree/main/aya-log#user-space-code.
      With that, closing this. Please let me know if this doesn''t solve the problem.'
