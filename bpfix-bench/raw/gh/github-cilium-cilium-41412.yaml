  fix:
    summary: '@msune had a fix that fixed the reason of exponential complexity growth
      in memmove tests. So, we should backport this commit (or the entire pull request)
      to 1.18 to reduce the complexity and have more room before it overflows.'
    selected_comment:
      kind: comment
      url: https://github.com/cilium/cilium/issues/41412#issuecomment-3233882324
      author: gentoo-root
      author_association: CONTRIBUTOR
      body_text: 'Cc @msune who recently extended memmove tests in https://github.com/cilium/cilium/pull/41017.
        But I don''t think your Cilium version has these commits yet.

        memmove tests were tightly packed in terms of complexity. Any new change would
        overflow the instruction limit. Apparently, setting net.core.bpf_jit_harden
        = 2 (which is non-default at least on Arch Linux) affects the complexity,
        and it overflows.

        @msune had a fix that fixed the reason of exponential complexity growth in
        memmove tests. So, we should backport this commit (or the entire pull request)
        to 1.18 to reduce the complexity and have more room before it overflows.'

