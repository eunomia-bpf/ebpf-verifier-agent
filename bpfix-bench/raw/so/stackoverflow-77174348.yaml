    \ it.\nMy current solution fails on the line where I try to copy the TCP payload\
    \ from the skb to a reserved space in the ringbuffer. I can't convince the verifier\
    \ that the memory where I want to copy is valid.\nThe error I get:\ninvalid access\
    \ to memory, mem_size=1528 off=0 size=0\nR3 min value is outside of the allowed\
