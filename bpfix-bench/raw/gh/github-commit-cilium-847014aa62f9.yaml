    // FILE: bpf/include/bpf/ctx/common.h
    #ifndef __BPF_CTX_COMMON_H_
    #define __BPF_CTX_COMMON_H_

    #include <linux/types.h>
    #include <linux/bpf.h>

    #include "../compiler.h"
    #include "../errno.h"

    #define __ctx_skb               1
    #define __ctx_xdp               2

    static __always_inline bool ctx_no_room(const void *needed, const void *limit)
    {
            return unlikely(needed > limit);
    }

    #endif /* __BPF_CTX_COMMON_H_ */

    // FILE: bpf/include/bpf/ctx/skb.h

    #define ctx_event_output        skb_event_output

    #define ctx_adjust_meta         ({ -ENOTSUPP; })

    /* Avoid expensive calls into the kernel flow dissector if it's not an L4
     * hash. We currently only use the hash for debugging. If needed later, we
     * can map it to BPF_FUNC(get_hash_recalc) to get the L4 hash.
     */
    #define get_hash(ctx)           ctx->hash
    #define get_hash_recalc(ctx)    get_hash(ctx)

    #define DEFINE_FUNC_CTX_POINTER(FIELD)                                          \
    static __always_inline void *                                                   \
    ctx_ ## FIELD(const struct __sk_buff *ctx)                                      \
    {                                                                               \
            void *ptr;                                                              \
                                                                                    \
            /* LLVM may generate u32 assignments of ctx->{data,data_end,data_meta}. \
             * With this inline asm, LLVM loses track of the fact this field is on  \
             * 32 bits.                                                             \
             */                                                                     \
            asm volatile("%0 = *(u32 *)(%1 + %2)"                                   \
                         : "=r"(ptr)                                                \
                         : "r"(ctx), "i"(offsetof(struct __sk_buff, FIELD)));       \
            return ptr;                                                             \
    }
    /* This defines ctx_data(). */
    DEFINE_FUNC_CTX_POINTER(data)
    /* This defines ctx_data_end(). */
    DEFINE_FUNC_CTX_POINTER(data_end)
    /* This defines ctx_data_meta(). */
    DEFINE_FUNC_CTX_POINTER(data_meta)
    #undef DEFINE_FUNC_CTX_POINTER

    static __always_inline __maybe_unused int
    ctx_redirect(const struct __sk_buff *ctx __maybe_unused, int ifindex, __u32 flags)
    {
            return redirect(ifindex, flags);
    }

    static __always_inline __maybe_unused int
    ctx_redirect_peer(const struct __sk_buff *ctx __maybe_unused, int ifindex, __u32 flags)
    {
            return redirect_peer(ifindex, flags);
    }

    // FILE: bpf/include/bpf/ctx/xdp.h
    // CONTEXT: xdp_store_bytes(const struct xdp_md *ctx, __u64 off, const void *from,
    #define ctx_set_tunnel_key              xdp_set_tunnel_key__stub

    #define ctx_get_tunnel_opt              xdp_get_tunnel_opt__stub
    #define ctx_set_tunnel_opt              xdp_set_tunnel_opt__stub

    #define ctx_event_output                xdp_event_output

    #define ctx_adjust_meta                 xdp_adjust_meta

    #define get_hash(ctx)                   ({ 0; })
    #define get_hash_recalc(ctx)            get_hash(ctx)

    #define DEFINE_FUNC_CTX_POINTER(FIELD)                                          \
    static __always_inline void *                                                   \
    ctx_ ## FIELD(const struct xdp_md *ctx)                                         \
    {                                                                               \
            void *ptr;                                                              \
                                                                                    \
            /* LLVM may generate u32 assignments of ctx->{data,data_end,data_meta}. \
             * With this inline asm, LLVM loses track of the fact this field is on  \
             * 32 bits.                                                             \
             */                                                                     \
            asm volatile("%0 = *(u32 *)(%1 + %2)"                                   \
                         : "=r"(ptr)                                                \
                         : "r"(ctx), "i"(offsetof(struct xdp_md, FIELD)));          \
            return ptr;                                                             \
    }
    /* This defines ctx_data(). */
    DEFINE_FUNC_CTX_POINTER(data)
    /* This defines ctx_data_end(). */
    DEFINE_FUNC_CTX_POINTER(data_end)
    /* This defines ctx_data_meta(). */
    DEFINE_FUNC_CTX_POINTER(data_meta)
    #undef DEFINE_FUNC_CTX_POINTER

    static __always_inline __maybe_unused void
    __csum_replace_by_diff(__sum16 *sum, __wsum diff)
    {
            *sum = csum_fold(csum_add(diff, ~csum_unfold(*sum)));
    }

    static __always_inline __maybe_unused void
    __csum_replace_by_4(__sum16 *sum, __wsum from, __wsum to)
    {
            __csum_replace_by_diff(sum, csum_add(~from, to));
    }
  diff_summary: |-
    bpf/include/bpf/ctx/common.h, bpf/include/bpf/ctx/skb.h, bpf/include/bpf/ctx/xdp.h:
    - Replaced the generic ctx pointer helpers with inline-asm field loads in the skb/xdp backends.
    - Prevented LLVM from lowering packet-pointer reads into 32-bit assignments that the verifier could no longer track as packet pointers.
