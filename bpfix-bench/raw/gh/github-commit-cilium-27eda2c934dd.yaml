  commit_message: Remove NEEDS_RELAX_VERIFIER
  commit_date: '2021-04-08'
  fix_type: inline_hint
  buggy_code: |-
    // FILE: bpf/include/bpf/verifier.h

    #ifndef __BPF_VERIFIER__
    #define __BPF_VERIFIER__

    #include "compiler.h"

    /* relax_verifier is a dummy helper call to introduce a pruning checkpoint
     * to help relax the verifier to avoid reaching complexity limits on older
     * kernels.
     */
    static __always_inline void relax_verifier(void)
    {
    #ifdef NEEDS_RELAX_VERIFIER
           volatile int __maybe_unused id = get_smp_processor_id();
    #endif
    }

    #endif /* __BPF_VERIFIER__ */
  fixed_code: |-
    // FILE: bpf/include/bpf/verifier.h

    #ifndef __BPF_VERIFIER__
    #define __BPF_VERIFIER__

    #include "compiler.h"

    /* relax_verifier is a dummy helper call to introduce a pruning checkpoint
     * to help relax the verifier to avoid reaching complexity limits on older
     * kernels.
     */
    static __always_inline void relax_verifier(void)
    {
    #ifndef HAVE_LARGE_INSN_LIMIT
           volatile int __maybe_unused id = get_smp_processor_id();
    #endif
    }

    #endif /* __BPF_VERIFIER__ */
  diff_summary: |-
    bpf/include/bpf/verifier.h:
    - Changed inlining annotations so verifier-visible state stays in a form older kernels accept.
    - Affected context: the touched section.
    - Commit subject: Remove NEEDS_RELAX_VERIFIER.
