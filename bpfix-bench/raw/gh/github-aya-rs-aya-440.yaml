  - |-
    use aya_bpf::maps::perf::PerfEventByteArray;
    use aya_bpf::{bindings::xdp_action, macros::map, macros::xdp, programs::XdpContext};
  - |-
    #[xdp(name = "xdp")]
    pub fn xdp(ctx: XdpContext) -> u32 {
        let start = ctx.data();
        let end = ctx.data_end();
        if end <= start {
            return xdp_action::XDP_PASS;
        }
  - |-
    unsafe {
            let packet = core::slice::from_raw_parts(start as *const u8, end - start);
            PACKET.output(&ctx, packet, 0);
        }
        return xdp_action::XDP_PASS;
    }
  - |-
    use anyhow::Context;
    use aya::maps::perf::AsyncPerfEventArray;
    use aya::programs::{Xdp, XdpFlags};
    use aya::util::online_cpus;
    use aya::{include_bytes_aligned, Bpf};
    use aya_log::BpfLogger;
    use bytes::BytesMut;
    use clap::Parser;
    use log::{info, warn};
    use tokio::signal;
  - |-
    #[derive(Debug, Parser)]
    struct Opt {
        #[clap(short, long, default_value = "eth0")]
        iface: String,
    }
  - |-
    // This will include your eBPF object file as raw bytes at compile-time and load it at
        // runtime. This approach is recommended for most real-world use cases. If you would
        // like to specify the eBPF program at runtime rather than at compile-time, you can
        // reach for `Bpf::load_file` instead.
        #[cfg(debug_assertions)]
        let mut bpf = Bpf::load(include_bytes_aligned!(
            "../../target/bpfel-unknown-none/debug/xdp"
        ))?;
        #[cfg(not(debug_assertions))]
        let mut bpf = Bpf::load(include_bytes_aligned!(
            "../../target/bpfel-unknown-none/release/xdp"
        ))?;
        if let Err(e) = BpfLogger::init(&mut bpf) {
            // This can happen if you remove all log statements from your eBPF program.
            warn!("failed to initialize eBPF logger: {}", e);
        }
  - |-
    for idx in online_cpus()? {
            let mut buffer = packet.open(idx, None)?;
            tokio::spawn(async move {
                let idx = idx.clone();
                let mut buffers = (0..128)
                    .map(|_| BytesMut::with_capacity(2408))
                    .collect::<Vec<_>>();
  - |-
    loop {
                    let events = buffer.read_events(&mut buffers).await.unwrap();
                    for i in 0..events.read {
                        let buf = &mut buffers[i];
                        let size = buf.len();
                        let data = unsafe { core::slice::from_raw_parts(buf.as_ptr(), size) };
                        println!("index:{} {:?}", idx, data);
                    }
                }
            });
        }
        let program: &mut Xdp = bpf.program_mut("xdp").unwrap().try_into()?;
        program.load()?;
        program.attach(&opt.iface, XdpFlags::default())
            .context("failed to attach the XDP program with default flags - try changing XdpFlags::default() to XdpFlags::SKB_MODE")?;
  - |-
    info!("Waiting for Ctrl-C...");
        signal::ctrl_c().await?;
        info!("Exiting...");
