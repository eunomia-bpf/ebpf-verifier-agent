      accordingly) to the verifier when you load your program. log_buf, of size log_size,
      is the buffer filled by the verifier. You don't usually set up these parameters
      yourself, how you should do it depends on what you use to load your program.
      Most loaders rely on libbpf, and in recent versions, they should automatically
