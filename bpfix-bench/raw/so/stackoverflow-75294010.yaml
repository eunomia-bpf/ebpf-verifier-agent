  question_body_text: 'I am trying to dump the contents of the user space buffer in
    write() system call by running ebpf programs on tracepoint/syscalls/sys_enter_write.

    I want to copy data with a maximum length of 1024, so I use BPF_MAP_TYPE_PERCPU_ARRAY
    to temporarily store the expected data structure, but when reading data through
    bpf_probe_read, I get an error from the verifier: load program: permission denied:
    11: (63) *(u32 *) (r2 +0) = r1: R2 invalid mem access ''inv'' (21 line(s) omitted).

    kernel: 5.4.119

    #include "vmlinux.h"

    #include "common.h"

    #include "bpf_tracing.h"

    #include "bpf_helpers.h"

    char __license[] SEC("license") = "Dual MIT/GPL";

    struct {

    __uint(type, BPF_MAP_TYPE_PERCPU_ARRAY);

    __uint(max_entries, 1);

    __type(key, __u32);

    __type(value, struct syscall_write_event_t);

    } write_buffer_heap SEC(".maps");

    struct {

    __uint(type, BPF_MAP_TYPE_PERF_EVENT_ARRAY);

    } syscall_write_events SEC(".maps");

    #define MAX_MSG_SIZE 1024

    // This needs to match exactly with the Go version of the struct.

    struct syscall_write_event_t {

    struct attr_t {

    int event_type;

    int fd;

    int bytes;

    // Care needs to be taken as only msg_size bytes of msg are guaranteed

    // to be valid.

    int msg_size;

    } attr;

    char msg[MAX_MSG_SIZE];

    };

    struct sys_enter_read_write_ctx {

    __u64 __unused_syscall_header;

    __u32 __unused_syscall_nr;

    __u64 fd;

    const char * buf;

    size_t count;

    };

    enum {

    kEventTypeSyscallAddrEvent = 1,

    kEventTypeSyscallWriteEvent = 2,

    kEventTypeSyscallCloseEvent = 3,

    };

    SEC("tracepoint/syscalls/sys_enter_write")

    int syscall__probe_write(struct sys_enter_read_write_ctx *ctx) {

    int zero = 0;

    struct syscall_write_event_t *event = bpf_map_lookup_elem(&write_buffer_heap,
    &zero);

    if (!event) {

    return 0;

    }

    __builtin_memset(&event, 0, sizeof(event));

    event->attr.fd = ctx->fd;

    event->attr.bytes = ctx->count;

    // size_t buf_size = ctx->count < sizeof(event->msg) ? ctx->count : sizeof(event->msg);

    // size_t buf_size = ctx->count < 0x400 ? ctx->count : 0x3ff;

    size_t buf_size = ctx->count & 0x3ff;

    // asm volatile("%[buf_size] &= 0xfff;\n" ::[buf_size] "+r"(buf_size) :);

    bpf_probe_read(&event->msg, buf_size, ctx->buf);

    event->attr.msg_size = buf_size;

    event->attr.event_type = kEventTypeSyscallWriteEvent;

    bpf_perf_event_output(ctx, &syscall_write_events, BPF_F_CURRENT_CPU, &event, sizeof(event->attr)
    + buf_size);

    return 0;

    }

