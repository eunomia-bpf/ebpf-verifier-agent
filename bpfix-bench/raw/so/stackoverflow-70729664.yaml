  question_body_text: 'I have written a XDP program that looks at the incoming SCTP
    packets.

    A SCTP packets can have multiple chunks into it. I am specifically interested
    in DATA chunks that contain the application layer payload. Now, the thing is there
    can many DATA chunks into a single SCTP message. Below is a wireshark capture
    and represents what I am dealing with.

    I need to look at every DATA chunk and run some logic. As for my usecase, I have
    noticed that the number of total chunks bundled into one SCTP packet never exceeds
    32.

    So, accordingly I have used a loop in XDP program hard coded to 32. The program
    compiles fine. But when I try to load the XDP program into the kernel in Native
    mode, it says "R7 offset is outside of the packet".

    So, I tried reducing the number of iterations to 16 and again the programs compiles
    fine but this time it successfully loads as well.

    Tried going back again to 32 (just this change and nothing else) and it fails.
    Can''t really figure out why.

    Any help in this regard will be appreciated.

    I should also mention that logic I need to process every chunk is bit lengthy.
    Maybe that is the cause for the issue?

    Following is the code:

    #define AMF_CPUS 4

    #define INV_RET_U32 4294967295

    #define INV_RET_U16 65535

    #define INV_RET_U8 255

    #define DATA_CHUNK 0

    /* Header cursor to keep track of current parsing position */

    struct hdr_cursor {

    void *pos;

    };

    // Return the chunk type of the corresponding sctp chunk

    static __always_inline __u8 parse_sctp_chunk_type(void *data, void *data_end)
    {

    if (data + 1 > data_end)

    return INV_RET_U8;

    return *(__u8 *)data;

    }

    // Return the chunk size of the corresponding sctp chunk

    static __always_inline __u16 parse_sctp_chunk_size(void *data, void *data_end)
    {

    if (data + 4 > data_end)

    return INV_RET_U16;

    __u16 size = bpf_ntohs(*(__u16 *)(data + 2));

    return size;

    }

    static __always_inline __u32 parse_sctp_hdr(struct hdr_cursor *nh,

    void *data_end) {

    struct sctphdr *sctph = nh->pos;

    int hdrsize = sizeof(*sctph);

    if (sctph + 1 > data_end)

    return INV_RET_U32;

    nh->pos += hdrsize;

    #pragma clang loop unroll(full)

    for (int i = 0; i < 16; ++i) {

    __u8 type = parse_sctp_chunk_type(nh->pos, data_end);

    if (type == INV_RET_U8)

    return INV_RET_U32;

    __u16 size = parse_sctp_chunk_size(nh->pos, data_end);

    if (size > 512)

    return INV_RET_U32;

    //Adjust for padding

    size += (size % 4) == 0 ? 0 : 4 - size % 4;

    if (type == DATA_CHUNK) {

    // Run logic

    }

    if (nh->pos + size < data_end)

    nh->pos += size;

    else

    return INV_RET_U32;

    }

    return INV_RET_U32;

    }

    SEC("parse_sctp")

    int xdp_parse_sctp(struct xdp_md *ctx) {

    void *data_end = (void *)(long)ctx->data_end;

    void *data = (void *)(long)ctx->data;

    /* These keep track of the next header type and iterator pointer */

    struct hdr_cursor nh;

    __u32 nh_type, ip_type;

    /* Start next header cursor position at data start */

    nh.pos = data;

    nh_type = parse_ethhdr(&nh, data_end);

    if (bpf_ntohs(nh_type) != ETH_P_IP)

    return XDP_PASS;

    ip_type = parse_iphdr(&nh, data_end);

    if (ip_type != IPPROTO_SCTP)

    return XDP_PASS;

    parse_sctp_hdr(&nh, data_end);

    return XDP_PASS;

    }

    char _license[] SEC("license") = "GPL";

