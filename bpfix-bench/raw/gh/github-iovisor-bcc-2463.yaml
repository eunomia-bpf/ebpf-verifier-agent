  - url: https://github.com/iovisor/bcc/issues/2463#issuecomment-526232285
    author: sbernard31
    author_association: NONE
    created_at: '2019-08-29T15:15:36Z'
    body_text: "To support loop it seems they enhanced verifier :\r\n\r\n> The compiler\
      \ often puts variables on the stack (or \"spills\" them) when it needs to free\
      \ up some registers. The verifier should be able to track such variables, since\
      \ it may need to make decisions based on their contents. Until now it did not\
      \ do so, resulting in certain programs being incorrectly rejected.\r\n\r\nand\r\
      \n\r\n> Comparisons involving variable values are clearly harder, which is why,\
      \ until now, the verifier supported only comparisons of a register with a constant.\
      \ In this patch set, Starovoitov added support for tests comparing two registers\
      \ as well. This enhancement was necessary to be able to simulate the execution\
      \ of loop tests."
  - url: https://github.com/iovisor/bcc/issues/2463#issuecomment-526262354
    author: yonghong-song
    author_association: COLLABORATOR
    created_at: '2019-08-29T16:27:18Z'
    body_text: "I see. Currently verifier only tracks spilled register with 'constant'\
      \ values. In the udp load balancer case, the variable udp_len has a variable\
      \ range, 0 <= udp_len <= 511. So the current verifier did not track that.\r\n\
      \r\nOn the other hand, it is not too hard to add tracking for registers with\
      \ non-constant range. I actually have tried to add this support to verifier.\
      \ But this alone won't solve the ulb issue. The big issue is, as I stated in\
      \ one of my earlier comment, with\r\n```\r\nfundamentally, for bpf_csum_diff(),\
      \ the verifier needs to verify the udp + udp_size. but\r\nudp has definite range\
      \ (42, up to end of udp header, and optional max range to 511)\r\nand udp_size\
      \ has maximum length to 511. But all these variable length won't play well\r\
      \nin verifier, it is possible actual udp_len = 100 and packet range is 50. This\
      \ will cause\r\nissues.\r\n```\r\nSo I did not even try to upstream the patch\
      \ to check register with non-constant range. Note that it may have some side\
      \ effects on verifier performance, which needs to be measured."
