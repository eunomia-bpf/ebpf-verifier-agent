    score: 1
    body_text: 'TL;DR. The issue is that you''re making an out-of-bound access to
      the packet from the verifier''s point of view. You need to check the packet
      is long enough to actually contain the IP header first.

      Reading the verifier error message.

      ; memcpy(&me.dest_ip,ip,sizeof(struct iphdr));

      6: (61) r2 = *(u32 *)(r1 +16)

      invalid access to packet, off=30 size=4, R1(id=0,off=30,r=14)

      R1 offset is outside of the packet

      The verifier errors on instruction 6, which corresponds to the memcpy statement.
      It states that you are making an invalid access to the packet, with the offset
      hold in R1 being outside the known bounds of the packet.

      You checked that the packet is at least long enough to hold the Ethernet header,
      but you never checked that it''s long enough to hold the IP header. So the verifier
      sees you trying to access bytes beyond the Ethernet header (up to offset 30)
      and errors.

      Updating the packet bounds check.

      If you already know from the start you''ll need to read both the Ethernet and
      IP headers, you can update your check from:

      if ((void *)eth + sizeof(*eth) <= data_end)

      to:

      if ((void *)eth + sizeof(*eth) + sizeof(struct iphdr) <= data_end)'
