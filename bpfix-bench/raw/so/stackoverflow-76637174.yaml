      struct iphdr *iph;

      struct ipv6hdr *ip6h;

      struct tcphdr *tcph;

      uint16_t h_proto;

      uint8_t *tcp_data;

      int nbzeros = 0;

      int i = 0;

      bool found = false;

      eth = head;

      if ((void *)eth + sizeof(struct ethhdr) >= data_end)

      return XDP_PASS;

      head += sizeof(struct ethhdr);

      h_proto = eth->h_proto;

      switch (h_proto)

      {

      case bpf_htons(ETH_P_IP):

      iph = head;

      if ((void *)iph + sizeof(struct iphdr) >= data_end)

      return XDP_PASS;

      h_proto = iph->protocol;

      head += iph->ihl * 4;

      break;

      case bpf_htons(ETH_P_IPV6):

      ip6h = head;

      if ((void *)ip6h + sizeof(struct ipv6hdr) >= data_end)

      return XDP_PASS;

      h_proto = ip6h->nexthdr;

      head += sizeof(struct ipv6hdr);

      break;

      default:

      return XDP_PASS;

      }

      if (h_proto != IPPROTO_TCP)

      return XDP_PASS;

      tcph = head;

      if ((void *)tcph + sizeof(*tcph) > data_end)

      return XDP_PASS;

      head += sizeof(*tcph);

      if (head + tcph->doff * 4 > data_end)

      return XDP_PASS;

      head += tcph->doff * 4;

      if (tcph->dest != 4420)

      return XDP_PASS;

      tcp_data = head;

