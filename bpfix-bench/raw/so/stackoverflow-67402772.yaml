      accesses that are present in your bytecode only when you call bpf_trace_printk().
      Accessing skb->local_ip4 and skb->remote_ip4 is not allowed for programs of
      types BPF_PROG_TYPE_LWT_OUT, that you use. See kernel code: The function that
      checks for valid access for this type returns false for certain offsets or range
      in skb:'
