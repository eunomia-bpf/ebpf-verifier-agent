  selected_answer:
    answer_id: 75309149
    url: https://stackoverflow.com/questions/75294010/how-to-use-bpf-probe-read-to-copy-large-length-data-in-ebpf-program#75309149
    is_accepted: true
    score: 1
    body_text: 'TL;DR. You want to pass a pointer to bpf_perf_event_output, not a
      pointer to a pointer.

      Verifier Error Explanation

      41: R0_w=inv(id=0,umin_value=16,umax_value=1039,var_off=(0x0; 0x7ff)) R1_w=ctx(id=0,off=0,imm=0)
      R2_w=map_ptr(id=0,off=0,ks=4,vs=4,imm=0) R3_w=inv4294967295 R4_w=fp-24 R5_w=inv(id=0,umin_value=16,umax_value=1039,var_off=(0x0;
      0x7ff)) R6=ctx(id=0,off=0,imm=0) R7=inv(id=0,umax_value=1023,var_off=(0x0; 0x3ff))
      R10=fp0 fp-8=mmmm???? fp-16=mmmmmmmm fp-24=map_value

      41: (85) call bpf_perf_event_output#25

      invalid stack type R4 off=-24 access_size=1039

      Here the verifier complains that the fourth argument to bpf_perf_event_output
      is pointing to the stack with an access size that is way beyond the actual stack
      size. The fourth argument is &event.

      Root Cause

      The fourth argument to bpf_perf_event_output should be a pointer to the data
      to post on the ring buffer. Hence, you want to pass event as the argument, not
      &event.'
    fix_description: Root Cause The fourth argument to bpf_perf_event_output should
      be a pointer to the data to post on the ring buffer. Hence, you want to pass
      event as the argument, not &event.

