  question_body_text: "I am new to eBPF and currently trying to send all the executed\
    \ commands with arguments in the userspace using a perf map.\nI manage to send\
    \ most of my data, but not the one accessed with bpf_probe_read_str. Print the\
    \ output in console works, but i don't know where to look for to forward ctx->argv\
    \ to the userspace after reading it from kernel.\nMaybe am i supposed to this\
    \ solution but copy all argv item manually ?\nMy code is based on liz's chapter\
    \ 7 tuto\nstruct sys_enter_execve\n{\n// ...\nchar **argv;\n};\nstruct data_t\n\
    {\n// ...\nchar **argv;\n};\nSEC(\"tp/syscalls/sys_enter_execve\")\nint tp_sys_enter_execve(struct\
    \ sys_enter_execve *ctx)\n{\nstruct data_t data = {};\n// ...\nfor (int i = 0;\
    \ i < sizeof(ctx->argv); i++)\n{\nchar *arg = NULL;\nbpf_probe_read_user_str(&arg,\
    \ sizeof(arg), &ctx->argv[i]);\ndata.argv[i] = arg; // Lead to the below error\n\
    // bpf_map_update_elem(&argv, &i, &arg, BPF_ANY); // Another solution that lead\
    \ to infinite loop for the verifier\nbpf_printk(\"arg%d: %s \", i, arg); // Works\
    \ and print the correct sting\n}\nbpf_perf_event_output(ctx, &output, BPF_F_CURRENT_CPU,\
    \ &data, sizeof(data));\nreturn 0;\n}\nBelow is the error from data.argv[i] =\
    \ arg;\n42: (85) call bpf_probe_read_user_str#114 ; R0=scalar(smin=-4095,smax=8)\
    \ fp-72=mmmmmmmm\n; data.argv[i] = arg;\n43: (79) r1 = *(u64 *)(r10 -72) ; R1_w=scalar()\
    \ R10=fp0 fp-72=mmmmmmmm\n; data.argv[i] = arg;\n44: (79) r2 = *(u64 *)(r10 -8)\
    \ ; R2_w=P0 R10=fp0 fp-8=00000000\n; data.argv[i] = arg;\n45: (7b) *(u64 *)(r2\
    \ +0) = r1\nR2 invalid mem access 'scalar'\nprocessed 43 insns (limit 1000000)\
    \ max_states_per_insn 0 total_states 3 peak_states 3 mark_read 3\nFailed to load\
    \ BPF object\nI tried the alternantive solution to manually copy all args into\
    \ an hashmap with bpf_map_update_elem(&argv, &i, &arg, BPF_ANY); but the verifier\
    \ can't load the program and send the below error\n62: (85) call bpf_trace_printk#6\n\
    ; for (int i = 0; i < sizeof(ctx->argv); i++)\ninfinite loop detected at insn\
    \ 63\nprocessed 97 insns (limit 1000000) max_states_per_insn 1 total_states 6\
    \ peak_states 6 mark_read 4\nWhat did i miss in the documentation ?\nThanks \u270C\
    \uFE0F"
  selected_answer:
    answer_id: 77620707
    url: https://stackoverflow.com/questions/77613784/how-to-bpf-probe-read-str-all-ctx-argv-elements-in-kernel-space-and-forward-it#77620707
