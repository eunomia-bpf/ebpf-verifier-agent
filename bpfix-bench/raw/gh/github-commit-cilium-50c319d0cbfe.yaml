  fixed_code: |-
    // FILE: bpf/lib/nat.h
    // CONTEXT: snat_v6_rev_nat_handle_icmp_pkt_toobig(struct __ctx_buff *ctx,
                    return DROP_INVALID;

            /* From the embedded IP headers we should be able
             * to determine corresponding protocol, IP src/dst
             * of the packet sent to resolve the NAT session.
             */

            tuple.nexthdr = iphdr.nexthdr;
            ipv6_addr_copy(&tuple.saddr, (union v6addr *)&iphdr.daddr);
            ipv6_addr_copy(&tuple.daddr, (union v6addr *)&iphdr.saddr);
            tuple.flags = NAT_DIR_INGRESS;

            /* Force tuple to be on the stack, a fix for a odd compiler bug
             * where the above assignment would be optimized to be reads
             * from the ctx->data pointer instead.
             */
            asm volatile ("" ::"r"(&tuple));

            hdrlen = ipv6_hdrlen_offset(ctx, inner_l3_off, &tuple.nexthdr, &fraginfo);
            if (hdrlen < 0)
                    return hdrlen;

            icmpoff = inner_l3_off + hdrlen;

            switch (tuple.nexthdr) {
            case IPPROTO_TCP:
            case IPPROTO_UDP:
    #ifdef ENABLE_SCTP
            case IPPROTO_SCTP:
    #endif  /* ENABLE_SCTP */
  diff_summary: |-
    bpf/lib/nat.h:
    - Inserted `asm volatile("" :: "r"(&tuple));` after building the IPv6 tuple.
    - Forced Clang to materialize the tuple on the stack instead of re-reading packet data through verifier-hostile ctx-pointer optimizations.
