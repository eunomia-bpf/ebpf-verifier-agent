    body_text: 'You are assigning zero to i but it is defined outside of the loop.
      for(i = 0; i < 4095; i++){. I suspect that i is not an unsigned number and thus
      can have a negative minimum value according to the verifier. Would define i
      as a u16 and see if that fixes the issue:

      for(u16 i = 0; i < 4095; i++){'
