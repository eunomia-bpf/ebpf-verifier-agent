  fixed_code: "// FILE: src/cc/usdt.h\n\nstruct bcc_usdt;\n\nnamespace USDT {\n\n\
    using std::experimental::optional;\nusing std::experimental::nullopt;\nclass ArgumentParser;\n\
    \nstatic const std::string USDT_PROGRAM_HEADER =\n    \"#include <uapi/linux/ptrace.h>\\\
    n\";\n\nstatic const std::string COMPILER_BARRIER =\n    \"__asm__ __volatile__(\\\
    \"\\\": : :\\\"memory\\\");\";\n\nclass Argument {\nprivate:\n  optional<int>\
    \ arg_size_;\n  optional<int> constant_;\n  optional<int> deref_offset_;\n  optional<std::string>\
    \ deref_ident_;\n  optional<std::string> base_register_name_;\n  optional<std::string>\
    \ index_register_name_;\n  optional<int> scale_;\n\n  bool get_global_address(uint64_t\
    \ *address, const std::string &binpath,\n                          const optional<int>\
    \ &pid) const;\n\n// FILE: src/cc/usdt_args.cc\n// CONTEXT: bool Argument::get_global_address(uint64_t\
    \ *address, const std::string &binpath,\n}\n\nbool Argument::assign_to_local(std::ostream\
    \ &stream,\n                               const std::string &local_name,\n  \
    \                             const std::string &binpath,\n                  \
    \             const optional<int> &pid) const {\n  if (constant_) {\n    tfm::format(stream,\
    \ \"%s = %d;\", local_name, *constant_);\n    return true;\n  }\n\n  if (!deref_offset_)\
    \ {\n    tfm::format(stream, \"%s = ctx->%s;\", local_name, *base_register_name_);\n\
    \    // Put a compiler barrier to prevent optimization\n    // like llvm SimplifyCFG\
    \ SinkThenElseCodeToEnd\n    // Volatile marking is not sufficient to prevent\
    \ such optimization.\n    tfm::format(stream, \" %s\", COMPILER_BARRIER);\n  \
    \  return true;\n  }\n\n  if (deref_offset_ && !deref_ident_) {\n    tfm::format(stream,\
    \ \"{ u64 __addr = ctx->%s + %d\",\n                *base_register_name_, *deref_offset_);\n\
    \    if (index_register_name_) {\n      int scale = scale_.value_or(1);\n    \
    \  tfm::format(stream, \" + (ctx->%s * %d);\", *index_register_name_, scale);\n\
    \    } else {\n      tfm::format(stream, \";\");\n    }\n    // Theoretically,\
    \ llvm SimplifyCFG SinkThenElseCodeToEnd may still\n    // sink bpf_probe_read\
    \ call, so put a barrier here to prevent sinking\n    // of ctx->#fields.\n  \
    \  tfm::format(stream, \" %s \", COMPILER_BARRIER);\n    tfm::format(stream,\n\
    \                \"%s __res = 0x0; \"\n                \"bpf_probe_read(&__res,\
    \ sizeof(__res), (void *)__addr); \"\n                \"%s = __res; }\",\n   \
    \             ctype(), local_name);\n    return true;\n  }\n\n  if (deref_offset_\
    \ && deref_ident_ && *base_register_name_ == \"ip\") {\n    uint64_t global_address;\n\
    \    if (!get_global_address(&global_address, binpath, pid))\n      return false;"
