  fixed_code: "// FILE: bpf/sockops/bpf_sockops.h\n// CONTEXT: struct bpf_elf_map\
    \ __section_maps SOCK_OPS_MAP = {\n\t.pinning        = PIN_GLOBAL_NS,\n\t.max_elem\
    \       = SOCKOPS_MAP_SIZE,\n};\n\nstatic __always_inline void sk_extract4_key(struct\
    \ bpf_sock_ops *ops,\n\t\t\t\t\t    struct sock_key *key)\n{\n\tkey->dip4 = ops->remote_ip4;\n\
    \tkey->sip4 = ops->local_ip4;\n\tkey->family = ENDPOINT_KEY_IPV4;\n\n\tkey->sport\
    \ = (bpf_ntohl(ops->local_port) >> 16);\n\t/* clang-7.1 or higher seems to think\
    \ it can do a 16-bit read here\n\t * which unfortunately most kernels (as of October\
    \ 2019) do not\n\t * support, which leads to verifier failures. Insert a READ_ONCE\n\
    \t * to make sure that a 32-bit read followed by shift is generated. */\n\tkey->dport\
    \ = READ_ONCE(ops->remote_port) >> 16;\n}\n\nstatic __always_inline void sk_msg_extract4_key(struct\
    \ sk_msg_md *msg,\n\t\t\t\t\t\tstruct sock_key *key)\n{\n\tkey->dip4 = msg->remote_ip4;\n\
    \tkey->sip4 = msg->local_ip4;\n\tkey->family = ENDPOINT_KEY_IPV4;\n\n\tkey->sport\
    \ = (bpf_ntohl(msg->local_port) >> 16);\n\t/* clang-7.1 or higher seems to think\
    \ it can do a 16-bit read here\n\t * which unfortunately most kernels (as of October\
    \ 2019) do not\n\t * support, which leads to verifier failures. Insert a READ_ONCE\n\
    \t * to make sure that a 32-bit read followed by shift is generated. */\n\tkey->dport\
    \ = READ_ONCE(msg->remote_port) >> 16;\n}\n\nstatic __always_inline void sk_lb4_key_v2(struct\
    \ lb4_key_v2 *lb4,\n\t\t\t\t\t  struct sock_key *key)\n{\n\t/* SK MSG is always\
    \ egress, so use daddr */\n\tlb4->address = key->dip4;\n\tlb4->dport = key->dport;\n\
    }\n\nstatic __always_inline bool redirect_to_proxy(int verdict)\n{"
