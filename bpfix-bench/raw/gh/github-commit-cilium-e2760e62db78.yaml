  fixed_code: "// FILE: bpf/lib/egress_gateway.h\n#define EGRESS_GATEWAY_NO_GATEWAY\
    \ (0)\n#define EGRESS_GATEWAY_EXCLUDED_CIDR bpf_htonl(1)\n\nstatic __always_inline\n\
