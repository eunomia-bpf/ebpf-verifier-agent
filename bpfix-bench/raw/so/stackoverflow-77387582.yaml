  selected_answer:
    answer_id: 77397024
    url: https://stackoverflow.com/questions/77387582/extracting-udp-packet-payload-with-ebpf-tracepoints-using-libbpf#77397024
    is_accepted: true
    score: 2
    body_text: |-
      The UDP payload can be extracted successfully using bpf_probe_read_kernel(). At the receiver, navigate to the payload address (e.g. - skb_head + l4_offset + sizeof(udp header)) and then read the required number of bytes with the above function. Further processing can be done in the userspace.
      Method 1
      On sending the unsigned char *payload to userspace, I could see the complete payload as required. Seems bpf_printk() was not printing the whole data.
      Method 2
      Even on performing bound checks, the verifier complained of invalid mem access
      Method 3
      The payload offset was not calculated correctly previously. As mentioned above, skb_head + l4_offset + sizeof(udp header) is the way that worked, where:
      void *skb_head = BPF_CORE_READ(skb, head);
      __u16 l3_offset = BPF_CORE_READ(skb, network_header);
      __u16 l4_offset = l3_offset + BPF_CORE_READ_BITFIELD_PROBED(iph, ihl) * 4;
      __u16 payload_offset = skb_head + l4_offset + sizeof(struct udphdr);
    fix_description: The UDP payload can be extracted successfully using bpf_probe_read_kernel().
      At the receiver, navigate to the payload address (e.g. - skb_head + l4_offset
      + sizeof(udp header)) and then read the required number of bytes with the above
      function. Further processing can be done in the userspace. Method 1 On sending
      the unsigned char *payload to userspace, I could see the complete payload as
      required. Seems bpf_printk() was not printing the whole data.
