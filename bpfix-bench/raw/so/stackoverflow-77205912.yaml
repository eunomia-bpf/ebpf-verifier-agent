  selected_answer:
    answer_id: 77210096
    url: https://stackoverflow.com/questions/77205912/ebpf-tc-failed-calling-bpf-csum-diff-a-second-time#77210096
    is_accepted: true
    score: 2
    body_text: 'TL;DR. Helpers skb_store_bytes, l3_csum_replace, and l4_csum_replace
      are known to the verifier as helpers that modify the packet''s data. When such
      helpers are called, the verifier simply invalidates all packet pointers.

      Solutions. You will therefore have to rebuild the packet pointers from the context
      argument (skb). Or you could compute checksum diff in one go, before making
      all writes to the packet.

      Debugging

      By moving the second call to csum_diff up by a few lines, we can confirm that
      a call to skb_store_bytes is enough to reproduce the issue.

      Most of the static analysis of helper calls happens in function check_helper_call.
      That function checks if the analyzed helper is one of those known to modify
      packet data. If that is the case, it calls clear_all_pkt_pointers just before
      returning.

      clear_all_pkt_pointers goes over all packet pointers known to the verifier and
      clears them. That ends up calling __mark_reg_unknown, which simply marks the
      register as an unknown scalar.

      Putting it all together:

      static int check_helper_call(struct bpf_verifier_env *env, struct bpf_insn *insn,

      int *insn_idx_p)

      {

      [...]

      changes_data = bpf_helper_changes_pkt_data(fn->func);

      [...]

      if (changes_data)

      clear_all_pkt_pointers(env);

      return 0;

      }

      static void clear_all_pkt_pointers(struct bpf_verifier_env *env)

      {

      struct bpf_func_state *state;

      struct bpf_reg_state *reg;

      bpf_for_each_reg_in_vstate(env->cur_state, state, reg, ({

      if (reg_is_pkt_pointer_any(reg) || reg_is_dynptr_slice_pkt(reg))

      mark_reg_invalid(env, reg);

      }));

      }

      static void __mark_reg_unknown(const struct bpf_verifier_env *env,

      struct bpf_reg_state *reg)

      {

      /*

      * Clear type, off, and union(map_ptr, range) and

      * padding between ''type'' and union

      */

      memset(reg, 0, offsetof(struct bpf_reg_state, var_off));

      reg->type = SCALAR_VALUE;

      reg->id = 0;

      reg->ref_obj_id = 0;

      reg->var_off = tnum_unknown;

      reg->frameno = 0;

      reg->precise = !env->bpf_capable;

      __mark_reg_unbounded(reg);

      }'
