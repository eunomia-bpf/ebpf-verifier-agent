  question_body_text: 'I am trying to parse a simple gRPC payload in an eBPF program.
    The code below shows my eBPF program, which I am trying to attach at TC hook (ingress).

    SEC("classifier")

    int find_grpc(struct __sk_buff *skb){

    if(skb == NULL) {

    goto EXIT;

    }

    context_key_t key = CONTEXT_KEY;

    context_data_t * ctx = bpf_map_lookup_elem(&context_map,&key);

    void *data_end = (void*)(__u64)skb->data_end;

    void *data = (void *)(__u64)skb->data;

    if(ctx==NULL) {

    goto EXIT;

    }

    if(ctx->action_index >= MAX_ACTION_LIST) {

    goto EXIT;

    }

    find_grpc_t *args = (find_grpc_t*)&(ctx->action_argument[ctx->action_index].find_grpc_args);

    if(args==NULL) {

    goto EXIT;

    }

    unsigned int flag = 0;

    if (args->offset > 100)

    {

    goto EXIT;

    }

    if (ctx->payload_offset > MAX_PAYLOAD_OFFSET)

    {

    goto EXIT;

    }

    unsigned short field_offset = ctx->payload_offset + args->offset;

    char len = 0;

    uint16_t x;

    if (args->field_index > MAX_IDS)

    {

    goto EXIT;

    }

    unsigned short toBeFound = args->field_id[args->field_index];

    LOOK:

    if ((data + field_offset + sizeof(uint16_t)) > data_end)

    {

    goto EXIT;

    }

    x = *((uint16_t*) (data + field_offset));

    char y = (x & GRPC_ID_MASK) >> GRPC_ID_SHIFT;

    len = x & GRPC_LEN_MASK;

    if (len > 32)

    {

    goto EXIT;

    }

    if (y == toBeFound)

    {

    goto FOUND;

    }

    field_offset += len;

    goto LOOK;

    FOUND:

    // some logic on finding the required attribute in the payload

    EXIT:

    return TC_ACT_OK;

    }

    #endif

    In the above code, the verifier complains by saying that I am trying to access
    an offset which is outside the packet at the following line in code (where I try
    to dereference a pointer at an offset inside the packet)

    x = *((uint16_t*) (off));

    As can be seen in the code above, I do check for bounds just above that particular
    line. Any reason why I might be seeing this error even though I have check for
    packet bounds?

