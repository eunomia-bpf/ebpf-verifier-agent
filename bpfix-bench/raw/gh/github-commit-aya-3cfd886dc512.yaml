    // FILE: aya-log-common/src/lib.rs
    // CONTEXT: pub enum DisplayHint {
        /// `:x`
        LowerHex,
        /// `:X`
        UpperHex,
        /// `:i`
        Ip,
        /// `:mac`
        LowerMac,
