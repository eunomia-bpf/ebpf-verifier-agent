  diff_summary: 'bpf/lib/nodeport.h:

    - Strengthened the tunnel path guard from `if (tunnel_endpoint)` to `if (info
    && tunnel_endpoint)`.

    - Made the nullable relation explicit so the verifier no longer follows a bogus
    `info == NULL` dereference path on RHEL 8.6.'

