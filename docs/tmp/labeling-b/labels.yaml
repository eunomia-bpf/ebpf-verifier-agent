- case_id: kernel-selftest-async-stack-depth-async-call-root-check-tc-21513dda
  taxonomy_class: verifier_limit
  error_id: BPFIX-E018
  root_cause_description: The program's nested call frames allocate too much stack at once, so the combined verified stack depth exceeds the verifier's limit even before runtime safety is in question.
  fix_type: other
  fix_direction: Shrink the per-call stack footprint or refactor the call chain so the combined stack depth stays within the verifier limit.
  confidence: high
  reasoning: The rejection is about aggregate verifier resource limits, not a missing safety guard in the source logic.
