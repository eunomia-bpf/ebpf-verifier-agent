    score: 2
    body_text: 'I don''t think you can retrieve the syscall arguments in that way.
      Instead, you should be using the dedicated macros:

      PT_REGS_PARM3

      SEC("kprobe/sys_accept")

      int syscall__probe_entry_accept(struct pt_regs *ctx) {

      int sockfd = (int)PT_REGS_PARM1(ctx);

      struct sockaddr *addr = (struct sockaddr *)PT_REGS_PARM2(ctx);

      socklen_t *addrlen = (socklen_t *)PT_REGS_PARM3(ctx);

      Verifier Error Explanation. R3 !read_ok means register 3 hasn''t been initialized
      and therefore isn''t safe to read. It hasn''t been initialized because R3 in
      this case is addr which was not correctly declared.

      Note. It''s possible you saw BPF programs that are using bcc retrieve arguments
      in that way. That is only possible with bcc because it rewrites the program
      to a format the kernel understands before loading.'
