  fixed_code: "// FILE: bpf/lib/nat.h\n// CONTEXT: snat_v6_rev_nat_handle_icmp_pkt_toobig(struct\
    \ __ctx_buff *ctx,\n                return DROP_INVALID;\n\n        /* From the\
    \ embedded IP headers we should be able\n         * to determine corresponding\
