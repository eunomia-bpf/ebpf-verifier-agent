    - Added a direct bounds check before writing the IPv6 auth header.

    bpf/tests/pktgen.h:

    - Replaced opaque inline-asm range opening with explicit packet-end checks.

    - Widened packet-builder offsets from 16-bit to 64-bit values so copied offsets
    retain verifier-friendly range information.'

