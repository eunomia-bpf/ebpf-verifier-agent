  buggy_code: |-
    // FILE: bpf/lib/lb.h
    // CONTEXT: lb6_fill_key(struct lb6_key *key, struct ipv6_ct_tuple *tuple)
     */
    static __always_inline int
    lb6_extract_tuple(struct __ctx_buff *ctx, struct ipv6hdr *ip6, int l3_off,
                      int *l4_off, struct ipv6_ct_tuple *tuple)
    {
            int ret;

            tuple->nexthdr = ip6->nexthdr;
            ipv6_addr_copy(&tuple->daddr, (union v6addr *)&ip6->daddr);
            ipv6_addr_copy(&tuple->saddr, (union v6addr *)&ip6->saddr);

            ret = ipv6_hdrlen_offset(ctx, &tuple->nexthdr, l3_off);
            if (ret < 0)
                    return ret;

            *l4_off = l3_off + ret;

            switch (tuple->nexthdr) {
            case IPPROTO_TCP:
            case IPPROTO_UDP:
    #ifdef ENABLE_SCTP
            case IPPROTO_SCTP:
    #endif  /* ENABLE_SCTP */
                    if (l4_load_ports(ctx, *l4_off, &tuple->dport) < 0)
                            return DROP_CT_INVALID_HDR;
                    return 0;
  fixed_code: |-
    // FILE: bpf/lib/lb.h
    // CONTEXT: lb6_fill_key(struct lb6_key *key, struct ipv6_ct_tuple *tuple)
     */
    static __always_inline int
    lb6_extract_tuple(struct __ctx_buff *ctx, struct ipv6hdr *ip6, int l3_off,
                      int *l4_off, struct ipv6_ct_tuple *tuple)
    {
            int ret;

            tuple->nexthdr = ip6->nexthdr;
            ipv6_addr_copy(&tuple->daddr, (union v6addr *)&ip6->daddr);
            ipv6_addr_copy(&tuple->saddr, (union v6addr *)&ip6->saddr);

            ret = ipv6_hdrlen_offset(ctx, &tuple->nexthdr, l3_off);
            if (ret < 0) {
                    /* Make sure *l4_off is always initialized on return, because
                     * Clang can spill it from a register to the stack even in error
                     * flows where this value is no longer used, and this pattern is
                     * rejected by the verifier.
                     * Use a prominent value (-1) to highlight any potential misuse.
                     */
                    *l4_off = -1;
                    return ret;
            }

            *l4_off = l3_off + ret;

            switch (tuple->nexthdr) {
            case IPPROTO_TCP:
            case IPPROTO_UDP:
    #ifdef ENABLE_SCTP
            case IPPROTO_SCTP:
    #endif  /* ENABLE_SCTP */
                    if (l4_load_ports(ctx, *l4_off, &tuple->dport) < 0)
                            return DROP_CT_INVALID_HDR;
                    return 0;
  diff_summary: |-
    bpf/lib/lb.h:
    - Initialized `*l4_off = -1` on the `ipv6_hdrlen_offset()` error path in `lb6_extract_tuple()`.
    - Kept Clang 17 spills verifier-safe by ensuring the would-be spilled value is always initialized.
