  diff_summary: 'bpf/include/bpf/ctx/common.h, bpf/include/bpf/ctx/skb.h, bpf/include/bpf/ctx/xdp.h:

    - Replaced the generic ctx pointer helpers with inline-asm field loads in the
    skb/xdp backends.

    - Prevented LLVM from lowering packet-pointer reads into 32-bit assignments that
    the verifier could no longer track as packet pointers.'

