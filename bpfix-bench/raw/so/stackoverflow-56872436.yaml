    body_text: 'I write the following code, and it works.

      #pragma clang loop unroll(full)

      for (int i = 0; i < 128; i++)

      {

      if (bpf_map_lookup_elem(&conntrack_hash_tab, &reply_key) == NULL)

      {

      break;

      }

      reply_key.dport = reply_key.dport+1;

      }'
    fix_description: 'I write the following code, and it works. #pragma clang loop
