  question_body_text: "I'm trying to generate delay in acknowledgement using eBPF\
    \ kernel program for egress packet.\nI'm running the python+c program using bcc.\n\
    i tried mdelay/msleep/udelay etc functions with delay.h library in c, it gives\
    \ me LLVM error that \"Program using external function which can't be resolved\"\
    .\nThen I tried implementing sleep functionality :\nTaking 3 variables:\ntprev\
    \ (which get the current time at starting of prog)\ntnow(this gets current time\
    \ as the loop starts and gets updates in each iteration with current time)\ntimer:\
    \ this is the duration for which we want program to be delayed.\nthe while loop\
    \ is: while((tnow - tprev) \u2264 timer)\nbut ebpf prog treat it as n infinite\
    \ loop and gives error that infinite loop detected.\nWhereas it's not an infinite\
    \ loop.\nIs there a way to introduce delay in Ack or delay in general in eBPF\
    \ program and How?"
  selected_answer:
    answer_id: 72560284
