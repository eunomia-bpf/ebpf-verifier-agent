    \ counterpart of [Aya](https://docs.rs/aya)\n#![doc(\n    html_logo_url = \"https://aya-rs.dev/assets/images/crabby.svg\"\
    ,\n    html_favicon_url = \"https://aya-rs.dev/assets/images/crabby.svg\"\n)]\n\
    #![cfg_attr(unstable, feature(never_type))]\n#![cfg_attr(target_arch = \"bpf\"\
    , feature(asm_experimental_arch))]\n#![allow(clippy::missing_safety_doc)]\n#![no_std]\n\
    \npub use aya_bpf_bindings::bindings;\n\nmod args;\npub use args::PtRegs;\npub\
    \ mod helpers;\npub mod maps;\npub mod programs;\n\npub use aya_bpf_cty as cty;\n\
    \n// CONTEXT: pub unsafe extern \"C\" fn memset(s: *mut u8, c: c_int, n: usize)\
    \ {\n        *((base + i) as *mut u8) = c as u8;\n    }\n}\n\n#[no_mangle]\npub\
    \ unsafe extern \"C\" fn memcpy(dest: *mut u8, src: *mut u8, n: usize) {\n   \
    \ let dest_base = dest as usize;\n    let src_base = src as usize;\n    for i\
    \ in 0..n {\n        *((dest_base + i) as *mut u8) = *((src_base + i) as *mut\
    \ u8);\n    }\n}\n\n/// Check if a value is within a range, using conditional\
    \ forms compatible with\n/// the verifier.\n#[inline(always)]\npub fn check_bounds_signed(value:\
    \ i64, lower: i64, upper: i64) -> bool {\n    #[cfg(target_arch = \"bpf\")]\n\
    \    unsafe {\n        let mut in_bounds = 0u64;\n        core::arch::asm!(\n\
    \            \"if {value} s< {lower} goto +2\",\n            \"if {value} s> {upper}\
    \ goto +1\",\n            \"{i} = 1\",\n            i = inout(reg) in_bounds,\n\
    \            lower = in(reg) lower,\n            upper = in(reg) upper,\n    \
    \        value = in(reg) value,\n        );\n        in_bounds == 1\n    }\n \
    \   // We only need this for doc tests which are compiled for the host target\n\
    \    #[cfg(not(target_arch = \"bpf\"))]\n    {\n        let _ = value;\n     \
    \   let _ = lower;\n        let _ = upper;\n        unimplemented!()\n    }\n}"
