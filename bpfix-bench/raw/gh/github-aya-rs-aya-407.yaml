  issue_body_text: 'Hallo,

    I tried to adapt the example for tc-egress to work also with IPv6. Thus, I adapted
    the PackageLog structure to be the following:

    However, when running the program, I get a similar error to the following that
    happens when loading the eBPF program:

    I can though do to the following and it runs:

    It is just a minor thing (for me) as I have a workaround, but I wonder if it is
    intended to work only with u32/i32 for PerfEventArray, if this is a missing feature
    or some limitation in the Linux Kernel itself?

    Thanks a lot!'
  fix:
    summary: It is just a minor thing (for me) as I have a workaround, but I wonder
      if it is intended to work only with u32/i32 for PerfEventArray, if this is a
      missing feature or some limitation in the Linux Kernel itself?
    selected_comment:
      kind: comment
      url: https://github.com/aya-rs/aya/issues/407#issuecomment-1273250487
      author: dave-tucker
      author_association: MEMBER
      body_text: 'It is just a minor thing (for me) as I have a workaround, but I
        wonder if it is intended to work only with u32/i32 for PerfEventArray, if
        this is a missing feature or some limitation in the Linux Kernel itself?

        The eBPF VM doesn''t support 128-bit values - u128 - which is likely the issue
        that you''re seeing.

        u64 or i64 will work just fine in a PerfEventArray.

        In the case of IPv6 though you''ll be better served with [u16;8] or [u8;16]
        though since these can easily be converted to an std::net::Ipv6Addr.'

