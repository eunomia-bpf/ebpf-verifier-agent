    \    dest: &mut [u8],\n) -> Result<&[u8], c_long> {\n    let len = gen::bpf_probe_read_user_str(\n\
    \        dest.as_mut_ptr() as *mut c_void,\n        dest.len() as u32,\n     \
    \   src as *const c_void,\n    );\n\n    read_str_bytes(len, dest)\n}\n\nfn read_str_bytes(len:\
    \ i64, dest: &mut [u8]) -> Result<&[u8], c_long> {\n    // The lower bound is\
    \ 0, since it's what is returned for b\"\\0\". See the\n    // bpf_probe_read_user_[user|kernel]_bytes_empty\
    \ integration tests.  The upper bound\n    // check is not needed since the helper\
    \ truncates, but the verifier doesn't\n    // know that so we show it the upper\
    \ bound.\n    if !check_bounds_signed(len, 0, dest.len() as i64) {\n        return\
    \ Err(-1);\n    }\n\n    // len includes the NULL terminator but not for b\"\\\
