  - |-
    SEC("lsm/security_path_mknod")
    int BPF_PROG(check_new_file_create, const struct path *dir, struct dentry *dentry, umode_t mode, unsigned int dev)
    {
        struct FSEvent *newEvent = bpf_ringbuf_reserve(
            &FSEventMap,
            sizeof(struct FSEvent),
            0);
        if (newEvent == NULL)
        {
            bpf_printk("ERROR: check_new_file_create: Error reserving ringbuf event\n");
            return 0;
        }

        d_path_result = bpf_d_path(dir, newEvent->filepath, sizeof(newEvent->filepath));
        if (d_path_result > 0)
        {
            newEvent->filepathSize = d_path_result;
        }
        else
        {
            newEvent->filepathSize = 0;
        }

        bpf_ringbuf_submit(newEvent, 0);

        return 0;
    }
  question_body_text: "Can somebody help me with retrieving name of file using eBPF\
    \ when file is creating?\nWhat I\u2019ve done:\nWe have 2 funcs (helper and Kfunc)\
    \ for collecting filepath from struct path:\nbpf_d_path & bpf_path_d_path.\nWe\
    \ also have some points where we can attach bpf program: lsm/inode_create, lsm/path_mknod,\
    \ lsm/inode_mknod, tracepoints to kernel functions \xABsecurity_*\xBB related\
    \ to lsm hooks.\nUnlike other file-related lsm hooks (full list we can find in\
    \ https://elixir.bootlin.com/linux/v6.16/source/kernel/bpf/bpf_lsm.c#L286 to 384),\
    \ I can\u2019t use helper bpf_d_path in path_mknod hook, because this hook is\
    \ not sleepable. And Kfunc (which is better to use, than helper) is too new. And\
    \ I don't know how to use hooks, that uses inodes instead of path, to get the\
    \ full path of the file.\nI don\u2019t want to collect info about all files (but\
    \ this will be better). First, I want to learn how to get the path when creating\
    \ a regular file.\nlsm/inode_link hook isn\u2019t called when file is creating.\n\
    Any suggestions?\nbpf program:\nSEC(\"lsm/security_path_mknod\")\nint BPF_PROG(check_new_file_create,\
    \ const struct path *dir, struct dentry *dentry, umode_t mode, unsigned int dev)\n\
    {\nstruct FSEvent *newEvent = bpf_ringbuf_reserve(\n&FSEventMap,\nsizeof(struct\
    \ FSEvent),\n0);\nif (newEvent == NULL)\n{\nbpf_printk(\"ERROR: check_new_file_create:\
    \ Error reserving ringbuf event\\n\");\nreturn 0;\n}\nd_path_result = bpf_d_path(dir,\
    \ newEvent->filepath, sizeof(newEvent->filepath));\nif (d_path_result > 0)\n{\n\
    newEvent->filepathSize = d_path_result;\n}\nelse\n{\nnewEvent->filepathSize =\
    \ 0;\n}\nbpf_ringbuf_submit(newEvent, 0);\nreturn 0;\n}\nI use go library ebpf-go\
    \ to load and attach programs to tracepoints.\nI tried to use named helper in\
    \ lsm hook path_mknod. In other lsm hooks this helper works correctly (because\
    \ of this check), but I was surprised when I try to load my program in kernel\
    \ and verifier stops me with error \"check_new_file_create: load program: invalid\
    \ argument: helper call is not allowed in probe\"."
