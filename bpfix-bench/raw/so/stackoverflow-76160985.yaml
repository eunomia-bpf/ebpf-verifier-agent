  selected_answer:
    answer_id: 76165099
    url: https://stackoverflow.com/questions/76160985/invalid-access-to-memory-r3-min-value-is-outside-of-the-allowed-memory-range#76165099
    is_accepted: false
    score: 1
    body_text: 'The compiler generates a separate BPF function (aka subprog) for find_substring
      and attempts to validate it separately from the rest of your program. So the
      only thing it sees is a function that reads up to 50 bytes from a pointer, but
      it has no proof that that much memory is actually allocated since that is only
      evident if you regard the program as a whole.

      The "fix" in this case is quite simple. Add __always_inline to the find_substring
      function like so: bool __always_inline find_substring(const char *str, const
      char *search).

      This will inline the function, thus the verifier will always see that the pointers
      passed in are save to read from.'
    fix_description: 'The "fix" in this case is quite simple. Add __always_inline
      to the find_substring function like so: bool __always_inline find_substring(const
      char *str, const char *search).'

