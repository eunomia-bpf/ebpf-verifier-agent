  selected_answer:
    answer_id: 78937616
    url: https://stackoverflow.com/questions/78929469/ebpf-go-getting-load-program-permission-denied-0-bf-r6-r3-r3-read-ok#78937616
    is_accepted: false
    score: 4
    body_text: |-
      The root of the issue is due to your eBPF program not passing the verifier. The error 0: (bf) r6 = r3: R3 !read_ok indicates that you are reading from register R3 while it isn't initialized. In eBPF, function arguments are always stored in R1-R5.
      However, the "entrypoint" program (the program that is attached to a hook point) is always called with exactly 1 argument, the context. So only R1 is set.
      Your function signature is therefor incorrect:
      SEC("kprobe/sys_read")
      int syscall__probe_entry_read(struct pt_regs* ctx, int fd, char* buf, int count)
      It should be:
      SEC("kprobe/sys_read")
      int syscall__probe_entry_read(struct pt_regs* ctx)
      You are normally expected to cast the proper fields of the context into the function arguments you are after depending on the calling convention. libbpf provides a header with a bunch of macros to make this task easier: https://github.com/libbpf/libbpf/blob/master/src/bpf_tracing.h
      You can use the BPF_KSYSCALL macro to get a result similar to what you were doing:
      SEC("kprobe/sys_read")
      int BPF_KSYSCALL(syscall__probe_entry_read, int fd, char* buf, int count)
      BPF_KSYSCALL is specifically for syscalls, it deals with a few syscall specific quirks in addition to the argument casting. For non-syscall functions the BPF_KPROBE macro is recommended to do just the argument casting.
    fix_description: 'It should be: You can use the BPF_KSYSCALL macro to get a result
      similar to what you were doing:'
