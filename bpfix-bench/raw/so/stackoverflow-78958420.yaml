    answer_id: 78960532
    url: https://stackoverflow.com/questions/78958420/ebpf-xdp-program-r2-offset-is-outside-of-the-packet#78960532
    is_accepted: false
    score: 0
    body_text: 'Starting at the verifier error

      ; if (!qname) {

      80: (15) if r2 == 0x0 goto pc+7 ; R2_w=pkt(off=62,r=63,imm=0)

      ; if (bpf_map_lookup_elem(&domain_denylist, qname))

      81: (18) r1 = 0xffff93604d4c2400 ; R1_w=map_ptr(off=0,ks=254,vs=1,imm=0)

      83: (85) call bpf_map_lookup_elem#1

      invalid access to packet, off=62 size=254, R2(id=0,off=62,r=63)

      I will translate the relevant bits:

      R2_w=pkt(off=62,r=63,imm=0) - Register 2 points to the packet at offset 62,
      and you have bounds checked up to 63, so you can access 1 byte of data safely.

      R1_w=map_ptr(off=0,ks=254,vs=1,imm=0) - Register 1 is a pointer to a map with
      a key size of 254 bytes, and a value size of 1 byte

      call bpf_map_lookup_elem - Calling map lookup helper, where R1 is a pointer
      to the map, and R2 the value of the map.

      The bpf_map_lookup_elem expects to be able to read 254 bytes from R2, but you
      did not bounds check that amount. That is what the code snipped does

      if (qname + MAX_DOMAIN_SIZE + 1 > c.end)

      return XDP_ABORTED;

      It asserts that there must at least be 254 bytes bytes in the packet after offset
      62. So if you encounter a packet that is smaller than 316 bytes, the program
      gets aborted. This satisfies the verifier, because when the packet is larger,
      it can read all 254 bytes and compare with the map.

      What you will likely want to do is to record the length of the domain name returned
      by parse_dname and use it to perform the bounds check. Then prepare a zeroed
      out buffer of MAX_DOMAIN_SIZE bytes and copy the domain name into the buffer,
      up to the length of the domain name. You should end up with a buffer the size
      of you map key padded with zeroes. You can use the buffer to do the lookup.'
