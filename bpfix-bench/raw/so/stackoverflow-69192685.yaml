    is_accepted: true
    score: 3
    body_text: "Did you omit to put your programs in a dedicated ELF section? Something\
      \ like:\nSEC(\"xdp\")\nint my_prog(struct xdp_md *ctx)\n{\n...\n}\n(Where SEC()\
      \ is a macro defined in libbpf's bpf_helpers.h header.)\nIf you do not specify\
      \ any ELF section name, clang/LLVM defaults to .text, as in your error message.\
      \ When you attempt to load a program with libbpf, the library usually guesses\
      \ the program type from the name of the ELF section into which the program was\
      \ put. If you do not use a dedicated section name, and do not otherwise specify\
      \ the program type (for example, in libbpf with bpf_program__set_type()), then\
      \ libbpf is unable to pick the relevant type for your program.\nThis could lead\
      \ to some of your programs to fail to load. From the error message above, it\
      \ looks like you use function calls in your program (instead of declaring, for\
      \ example, your functions as static inline). When your main program passes the\
      \ verifier, some parts will be missing: The \u201Cfunctions\u201D may not be\
      \ loaded, so the verifier complains that the expected number of functions/subprograms\
      \ inferred from the main program (env->subprog_cnt) is different from the number\
      \ of functions collected by your loader application (attr->func_info_cnt) and\
      \ passed down to the kernel when loading the program with the bpf() system call.\n\
      If this is the case, you can probably fix the issue either by placing your code\
      \ in dedicated ELF functions, or by declaring your functions as static inline\
      \ if you do not require function calls in the generated bytecode."
    fix_description: If you do not specify any ELF section name, clang/LLVM defaults
