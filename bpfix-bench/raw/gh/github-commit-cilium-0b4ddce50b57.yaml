  fixed_code: |-
    // FILE: bpf/lib/common.h
     */
    #ifndef __LIB_COMMON_H_
    #define __LIB_COMMON_H_

    #include <bpf_features.h>
    #include <bpf/api.h>
    #include <linux/if_ether.h>
    #include <linux/ipv6.h>
    #include <linux/in.h>
    #include <stdint.h>
    #include <stdbool.h>

    #if defined DISABLE_NAT46
    #undef ENABLE_NAT46
    #elif defined LXC_NAT46 && defined LXC_IP
    #define ENABLE_NAT46
    #endif

    #if defined DISABLE_IPV4
    #undef ENABLE_IPV4
    #elif !defined ENABLE_IPV4
    #define ENABLE_IPV4
    #endif

    #if defined DISABLE_IPV6
    #undef ENABLE_IPV6
    #elif !defined ENABLE_IPV6
    #define ENABLE_IPV6
    #endif

    // FIXME: GH-3239 LRU logic is not handling timeouts gracefully enough
    // #ifndef HAVE_LRU_MAP_TYPE
    // #define NEEDS_TIMEOUT 1
    // #endif
    #define NEEDS_TIMEOUT 1

    #ifndef EVENT_SOURCE
    #define EVENT_SOURCE 0
    #endif

    #define __inline__ __attribute__((always_inline))

    // FILE: bpf/netdev_config.h
     *  You should have received a copy of the GNU General Public License
     *  along with this program; if not, write to the Free Software
     *  Foundation, Inc., 51 Franklin St, Fifth Floor, Boston, MA  02110-1301  USA
     */
    /*
     * This is just a dummy header with dummy values to allow for test
     * compilation without the full code generation engine backend.
     */
    #define DROP_NOTIFY
    #ifndef SKIP_DEBUG
    #define DEBUG
    #endif
    #define HANDLE_NS
    #define FROM_HOST
    #define ENCAP_IFINDEX 1
    #define POLICY_MAP cilium_policy_foo
