  fix:
    summary: Indeed issues like this are often highly related to the kernel version.
      I would also strongly suggest using a version newer than v1.16.0. There have
      been six subsequent patch releases since that version in the v1.16.x series,
      and now v1.17.0 is out. While I do not know whether a newer bugfix release of
      Cilium will fix this particular issue (since it's probably more to do with the
      kernel), it is helpful for us to understand whether the issue impacts users
      on the latest bugfix release.
    selected_comment:
      kind: comment
      url: https://github.com/cilium/cilium/issues/37478#issuecomment-2648171889
