  fix:
    summary: 'You are trying to access a static item, which is not supported in BPF.
      You will need to maintain state in a BPF map: There is no access to heap space
      and data must instead be written to maps.'
    selected_comment:
      kind: comment
      url: https://github.com/aya-rs/aya/issues/1002#issuecomment-2351953098
      author: harry-xm
      author_association: NONE
      body_text: 'only read from bpf_array is supported

        You are trying to access a static item, which is not supported in BPF. You
        will need to maintain state in a BPF map:

        The eBPF Virtual Machine, where our eBPF programs will be run, is a constrained
        runtime environment:

        There is only 512 bytes of stack (or 256 bytes if we are using tail calls).

        There is no access to heap space and data must instead be written to maps.

        https://aya-rs.dev/book/#ebpf-program-constraints'

