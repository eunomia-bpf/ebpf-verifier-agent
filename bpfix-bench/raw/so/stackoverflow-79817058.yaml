      The main problem in the original code is you compare i + j <= plen which makes no sense: it restricts matches to those occurring at the beginning of the string.
      The final code uses some magical value MAX_ITERS_FOR_STRSTR to try and get around this problem, but it passes the verifier by chance. If the match starts beyond MAX_ITERS_FOR_STRSTR in the filename that can be as large as MAX_CHAR_LEN, the c_strstr would fail to locate it.
      Here is a modified version of your code:
      static int c_strstr(cosnt char str[MAX_CHAR_LEN], const char *pattern)
      {
      // compute the length of the pattern
      int plen = 0;
      while (plen < MAX_PATTERN_LEN && pattern[plen] != '\0') {
      plen++;
      }
      // empty pattern always matches
      if (plen == 0)
      return 1;
      for (int i = 0; i <= MAX_CHAR_LEN - plen && str[i] != '\0'; i++) {
      // check for a match at offset i
      if (str[i] == *pattern) {
      for (int j = 1;; j++) {
      if (j == plen)
      return 1;
      if (str[i + j] != pattern[j])
      break;
      }
      }
      }
      return 0;
      }
