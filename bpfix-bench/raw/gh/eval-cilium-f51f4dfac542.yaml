  fixed_code: "// FILE: bpf/lib/nat.h\n// CONTEXT: snat_v6_nat_handle_icmp_error(struct\
    \ __ctx_buff *ctx, __u64 off, bool has_l4_hea\nstatic __always_inline int\n__snat_v6_nat(struct\
    \ __ctx_buff *ctx, struct ipv6_ct_tuple *tuple, fraginfo_t fraginfo,\n       \
    \       int l4_off, bool update_tuple, const struct ipv6_nat_target *target,\n\
