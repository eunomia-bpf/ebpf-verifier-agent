  selected_answer:
    answer_id: 68535541
    url: https://stackoverflow.com/questions/68460177/register-errors-when-trying-to-separate-strings-and-print-them-using-bcc#68535541
    is_accepted: true
    score: 0
    body_text: 'You are using bcc''s bpf_trace_print function which expects different
      arguments from the kernel helper.

      In bcc, bpf_trace_print is a sort of wrapper around the corresponding BPF helper.
      If you check its documentation, it expects a single mandatory argument, a string
      and several optional arguments:

      Syntax: int bpf_trace_printk(const char *fmt, ...)

      So you can write things like:

      bpf_trace_printk("remote-port: %d, local-port: %d\\n", skk.remote_port,

      skk.local_port);

      In contrast, the BPF helper expects the first argument to be the string and
      the second to be the size of the string:

      static const struct bpf_func_proto bpf_trace_printk_proto = {

      .func = bpf_trace_printk,

      .gpl_only = true,

      .ret_type = RET_INTEGER,

      .arg1_type = ARG_PTR_TO_MEM,

      .arg2_type = ARG_CONST_SIZE,

      };'
    fix_description: 'You are using bcc''s bpf_trace_print function which expects
      different arguments from the kernel helper. In bcc, bpf_trace_print is a sort
      of wrapper around the corresponding BPF helper. If you check its documentation,
      it expects a single mandatory argument, a string and several optional arguments:
      Syntax: int bpf_trace_printk(const char *fmt, ...)'

