  question_body_text: 'I am trying to follow the Learning eBPF book by Liz Rice along
    with code samples at https://github.com/lizrice/learning-ebpf. I have problem
    with chapter 7 example - hello.bpf.c. The code builds but at runtime the verifier
    fails it.

    # ./hello

    libbpf: prog ''fentry_execve'': failed to find kernel BTF type ID of ''execve'':
    -3

    libbpf: prog ''fentry_execve'': failed to prepare load attributes: -3

    libbpf: prog ''fentry_execve'': failed to load: -3

    libbpf: failed to load object ''hello_bpf''

    libbpf: failed to load BPF skeleton ''hello_bpf'': -3

    processed 54 insns (limit 1000000) max_states_per_insn 0 total_states 4 peak_states
    4 mark_read 4

    I commented out the fentry/do_execve section, compiled and ran again. This time
    I see this error.

    libbpf: prog ''kprobe_do_execve'': failed to create kprobe ''do_execve+0x0'' perf
    event: No such file or directory

    libbpf: prog ''kprobe_do_execve'': failed to auto-attach: -2

    Failed to attach BPF skeleton: -2

    Now the do_execve function does exist, as I see it in kernel sources (unless I
    have the version wrong). So this error due the possibility that this function
    do_execve might have actually been inlined during compilation?

    I did not build that kernel. I am on Ubuntu 20.04 (5.15.0-88-generic #98~20.04.1-Ubuntu).

    clang & bpftool versions -

    $ clang -v

    clang version 10.0.0-4ubuntu1

