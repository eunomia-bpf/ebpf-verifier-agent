    body_text: "So there were few confusion i had and it explain why i could not fix\
      \ this problem. I'll give more details below.\nI think the error invalid mem\
      \ access 'scalar' means that the verifier can't determine the size of a char\
      \ pointer to check that the size of all variables stay in 512 bytes. Basically\
      \ to fix this was just to fix the size of my variable from char **argv; to char[8][50].\
      \ I have noticed that the length of ctx->argv was always 8 so i took this value.\
      \ Then the second mistake was to make sure the value was safe using bpf_probe_read\
      \ before bpf_probe_read_str\nSo the final code look like this.\nstruct sys_enter_execve\n\
      {\n// ...\nchar **argv;\n};\nstruct data_t\n{\n// ...\nchar argv[8][50]; //\
      \ Fix the size here is critical for the verifier\n};\nSEC(\"tp/syscalls/sys_enter_execve\"\
      )\nint tp_sys_enter_execve(struct sys_enter_execve *ctx)\n{\nstruct data_t data\
      \ = {};\n// ...\nfor (int i = 0; i < sizeof(ctx->argv); i++)\n{\nchar *tmp;\n\
      bpf_probe_read(&tmp, sizeof(tmp), &ctx->argv[i]);\nbpf_probe_read_str(data.argv[i],\
      \ sizeof(data.argv[i]), tmp);\n}\nbpf_perf_event_output(ctx, &output, BPF_F_CURRENT_CPU,\
      \ &data, sizeof(data));\nreturn 0;\n}\nI hope it could help for your code.\n\
      Happy coding \u270C\uFE0F"
