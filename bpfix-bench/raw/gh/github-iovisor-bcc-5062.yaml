    \ {\r\n                 /* pass non-TCP untouched */\r\n                 rec2stat(STAT_NONTCP);\r\
    \n                 rc = XDP_PASS;\r\n         } else {\r\n                 int\
    \ done = process_tcp(&nh_pos, l4_off, data_end);\r\n                 if (done\
    \ == -1) {\r\n                         rc = XDP_DROP;\r\n                 } else\
    \ if (done == 0) {\r\n                         rec2stat(STAT_NONTS);\r\n     \
    \                    rc = XDP_PASS;\r\n                 } else {\r\n         \
    \                rec2stat(STAT_TS_INCREMENTED);\r\n                         rc\
    \ = XDP_PASS;\r\n                 }\r\n         }\r\n         return rc;\r\n}\r\
    \n```"
  comments:
  - url: https://github.com/iovisor/bcc/issues/5062#issuecomment-2238150041
    author: yonghong-song
    author_association: COLLABORATOR
    created_at: '2024-07-19T04:45:03Z'
    body_text: "I didn't try reproducer, but from your description. This is not a\
      \ clang optimizer bug. The generated code should be correct but the verifier\
      \ cannot properly derive the value range properly due to verifier limitation.\
      \ See bpf selftests where barrier_var() macro has been used in various bpf progs\
      \ to workaround verification issue.\r\n\r\n"
  - url: https://github.com/iovisor/bcc/issues/5062#issuecomment-2240173502
    author: nuclight
    author_association: NONE
    created_at: '2024-07-19T21:26:08Z'
    body_text: "Yes, I was able to workaround with `barrier_var()` macro in this particular\
      \ program, but I'm afraid this way is too fragile for more complex programs\
      \ in production. Also, about verifier limitation - is it even possible to be\
      \ changed in verifier? If not, then problem is not on the kernel side, i.e.\
      \ only clang could solve this. And:\r\n\r\n> This is not a clang optimizer bug\r\
      \n\r\nPlease take a closer look to instructions 249-256 in disassembler output\
      \ (second paste in this issue, searchable on this web page by \"nuc_ts_prog_kern.c:190\"\
      \ substring). You'll see that `r9` is not only thrown away after comparison,\
      \ the sequence\r\n```c\r\nr0 = 300\r\nif r9 > r2 goto <LBB0_103>\r\n```\r\n\
      is repeated twice! But there is no some label to jump in between so that such\
      \ repetition could be justified... So this code, while formally being correct\
      \ in the sense of \"produced output\" (if we ignore verifier), is clearly **not\
      \ optimal** - it does unnecessary actions, which will negatively affect performance.\
      \ Thus, it may be for other cases where \"it's verifier problem, not clang\"\
      , but for this particular case I insist that this is optimizer bug."
