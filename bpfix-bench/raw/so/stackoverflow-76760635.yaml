    body_text: 'I wanted to debug it, but I found that when running with Go, I would
      report an error and couldn''t find the symbols used in the cilium library.

      Your project uses bpf2go a tool provided by cilium/ebpf that generates types
      and functions based on your BPF code. The bpfObjects and loadBpfObjects symbols
      are located in separate go files.

      When you call go run main.go it only includes your main.go file, not the generated
      files, go run . should solve your issue.

      2023/07/25 00:58:31 loading objects: field XdpNatInner2outerFunc: program xdp_nat_inner2outer_func:
      load program: permission denied: 554: (71) r1 = *(u8 *)(r8 +17): R8 invalid
      mem access '' inv'' (506 line(s) omitted)

      This indicates your BPF program doesn''t pass the verifier. You can dump the
      omitted lines with the following error check:

      if err != nil {

      var verr *ebpf.VerifierError

      if errors.As(err, &verr) {

      fmt.Printf("%+v\n", verr)

      }

      }

      Reading the verifier log can be tricky, if you get stuck I recommend opening
      another question, make sure to post at least the last 50-100 lines of the log
      and the sources if you can.'
    fix_description: When you call go run main.go it only includes your main.go file,
      not the generated files, go run . should solve your issue.

