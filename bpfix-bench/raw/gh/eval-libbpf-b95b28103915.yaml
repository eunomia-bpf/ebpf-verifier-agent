    \ {\n\t\tcase 0x19ee: /* Netronome specific */\n\t\t\tres = res && !grep(buf,\
    \ \"not supported by FW\") &&\n\t\t\t\t!grep(buf, \"unsupported function id\"\
    );\n\t\t\tbreak;\n\t\tdefault:\n\t\t\tbreak;\n\t\t}\n\t}\n\n\treturn res;\n}"
  fixed_code: "// FILE: src/libbpf.h\n// CONTEXT: bpf_prog_linfo__lfind(const struct\
    \ bpf_prog_linfo *prog_linfo,\n * Probe for supported system features\n *\n *\
    \ Note that running many of these probes in a short amount of time can cause\n\
    \ * the kernel to reach the maximal size of lockable memory allowed for the\n\
    \ * user, causing subsequent probes to fail. In this case, the caller may want\n\
    \ * to adjust that limit with setrlimit().\n */\nLIBBPF_API bool bpf_probe_prog_type(enum\
    \ bpf_prog_type prog_type,\n\t\t\t\t    __u32 ifindex);\nLIBBPF_API bool bpf_probe_map_type(enum\
    \ bpf_map_type map_type, __u32 ifindex);\nLIBBPF_API bool bpf_probe_helper(enum\
    \ bpf_func_id id,\n\t\t\t\t enum bpf_prog_type prog_type, __u32 ifindex);\nLIBBPF_API\
    \ bool bpf_probe_large_insn_limit(__u32 ifindex);\n\n/*\n * Get bpf_prog_info\
    \ in continuous memory\n *\n * struct bpf_prog_info has multiple arrays. The user\
    \ has option to choose\n * arrays to fetch from kernel. The following APIs provide\
    \ an uniform way to\n * fetch these data. All arrays in bpf_prog_info are stored\
    \ in a single\n * continuous memory region. This makes it easy to store the info\
    \ in a\n * file.\n *\n * Before writing bpf_prog_info_linear to files, it is necessary\
    \ to\n * translate pointers in bpf_prog_info to offsets. Helper functions\n\n\
    // FILE: src/libbpf_probes.c\n// CONTEXT: bool bpf_probe_helper(enum bpf_func_id\
    \ id, enum bpf_prog_type prog_type,\n\t\tswitch (get_vendor_id(ifindex)) {\n\t\
    \tcase 0x19ee: /* Netronome specific */\n\t\t\tres = res && !grep(buf, \"not supported\
    \ by FW\") &&\n\t\t\t\t!grep(buf, \"unsupported function id\");\n\t\t\tbreak;\n\
    \t\tdefault:\n\t\t\tbreak;\n\t\t}\n\t}\n\n\treturn res;\n}\n\n/*\n * Probe for\
    \ availability of kernel commit (5.3):\n *\n * c04c0d2b968a (\"bpf: increase complexity\
    \ limit and maximum program size\")\n */\nbool bpf_probe_large_insn_limit(__u32\
    \ ifindex)\n{\n\tstruct bpf_insn insns[BPF_MAXINSNS + 1];\n\tint i;\n\n\tfor (i\
    \ = 0; i < BPF_MAXINSNS; i++)\n\t\tinsns[i] = BPF_MOV64_IMM(BPF_REG_0, 1);\n\t\
    insns[BPF_MAXINSNS] = BPF_EXIT_INSN();\n\n\terrno = 0;\n\tprobe_load(BPF_PROG_TYPE_SCHED_CLS,\
    \ insns, ARRAY_SIZE(insns), NULL, 0,\n\t\t   ifindex);\n\n\treturn errno != E2BIG\
    \ && errno != EINVAL;\n}"
