  buggy_code: "// FILE: bpf/bpf_sock.c\n// CONTEXT: sock4_wildcard_lookup_full(struct\
    \ lb4_key *key __maybe_unused,\n#endif /* ENABLE_NODEPORT */\n\treturn svc;\n\
    }\n\n/* Service translation logic for a local-redirect service can cause packets\
    \ to\n * be looped back to a service node-local backend after translation. This\
    \ can\n * happen when the node-local backend itself tries to connect to the service\n\
    \ * frontend for which it acts as a backend. There are cases where this can break\n\
    \ * traffic flow if the backend needs to forward the redirected traffic to the\n\
    \ * actual service frontend. Hence, allow service translation for pod traffic\n\
    \ * getting redirected to backend (across network namespaces), but skip service\n\
    \ * translation for backend to itself or another service backend within the same\n\
    \ * namespace. Currently only v4, but neither v4-in-v6 nor plain v6 supported.\n\
    \ *\n * For example, in EKS cluster, a local-redirect service exists with the\
    \ AWS\n * metadata IP, port as the frontend <169.254.169.254, 80> and kiam proxy\
    \ as a\n * backend Pod. When traffic destined to the frontend originates from\
    \ the kiam\n * Pod in namespace ns1 (host ns when the kiam proxy Pod is deployed\
    \ in\n * hostNetwork mode or regular Pod ns) and the Pod is selected as a backend,\
    \ the\n * traffic would get looped back to the proxy Pod. Identify such cases\
    \ by doing\n * a socket lookup for the backend <ip, port> in its namespace, ns1,\
    \ and skip\n * service translation.\n */\n#ifdef BPF_HAVE_SOCKET_LOOKUP\nstatic\
    \ __always_inline __maybe_unused bool\nsock4_skip_xlate_if_same_netns(struct bpf_sock_addr\
    \ *ctx,\n\t\t\t       const struct lb4_backend *backend)\n{\n\tstruct bpf_sock_tuple\
    \ tuple = {\n\t\t.ipv4.daddr = backend->address,\n\t\t.ipv4.dport = backend->port,\n\
    \t};\n\tstruct bpf_sock *sk = NULL;\n\n\tswitch (ctx->protocol) {\n\tcase IPPROTO_TCP:\n\
    \t\tsk = sk_lookup_tcp(ctx, &tuple, sizeof(tuple.ipv4),\n\t\t\t\t   BPF_F_CURRENT_NETNS,\
    \ 0);\n\t\tbreak;\n\tcase IPPROTO_UDP:\n\t\tsk = sk_lookup_udp(ctx, &tuple, sizeof(tuple.ipv4),\n\
    \t\t\t\t   BPF_F_CURRENT_NETNS, 0);\n\t\tbreak;\n\tdefault:\n\t\tbreak;\n\t}\n\
    \n\tif (sk) {\n\t\tsk_release(sk);\n\t\treturn true;\n\t}\n\n\treturn false;\n\
    }\n#endif /* BPF_HAVE_SOCKET_LOOKUP */\n\nstatic __always_inline int __sock4_xlate_fwd(struct\
    \ bpf_sock_addr *ctx,\n\t\t\t\t\t     struct bpf_sock_addr *ctx_full,\n\t\t\t\t\
    \t     const bool udp_only)\n{\n\tunion lb4_affinity_client_id id;\n\tconst bool\
    \ in_hostns = ctx_in_hostns(ctx_full, &id.client_cookie);\n\tstruct lb4_backend\
    \ *backend;\n\tstruct lb4_service *svc;\n\tstruct lb4_key key = {\n\t\t.address\t\
    = ctx->user_ip4,\n\t\t.dport\t\t= ctx_dst_port(ctx),\n\n// CONTEXT: static __always_inline\
    \ int __sock4_xlate_fwd(struct bpf_sock_addr *ctx,\n\t\t\treturn -ENOENT;\n\t\t\
    }\n\n\t\tbackend_id = backend_slot->backend_id;\n\t\tbackend = __lb4_lookup_backend(backend_id);\n\
    \t}\n\n\tif (!backend) {\n\t\tupdate_metrics(0, METRIC_EGRESS, REASON_LB_NO_BACKEND);\n\
    \t\treturn -ENOENT;\n\t}\n\n#ifdef BPF_HAVE_SOCKET_LOOKUP\n\tif (lb4_svc_is_localredirect(svc)\
    \ && ctx_full == ctx &&\n\t    sock4_skip_xlate_if_same_netns(ctx_full, backend))\n\
    \t\treturn 0;\n#endif\n\tif (lb4_svc_is_affinity(svc) && !backend_from_affinity)\n\
    \t\tlb4_update_affinity_by_netns(svc, &id, backend_id);\n\n\tif (sock4_update_revnat(ctx_full,\
    \ backend, &orig_key,\n\t\t\t\tsvc->rev_nat_index) < 0) {\n\t\tupdate_metrics(0,\
    \ METRIC_EGRESS, REASON_LB_REVNAT_UPDATE);\n\t\treturn -ENOMEM;\n\t}\n\n\tctx->user_ip4\
    \ = backend->address;\n\tctx_set_port(ctx, backend->port);"
