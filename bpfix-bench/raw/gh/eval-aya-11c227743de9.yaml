    \ Err(-1).\n#[inline]\npub unsafe fn bpf_probe_read_kernel_str_bytes(\n    src:\
    \ *const u8,\n    dest: &mut [u8],\n) -> Result<&[u8], c_long> {\n    let len\
    \ = gen::bpf_probe_read_kernel_str(\n        dest.as_mut_ptr() as *mut c_void,\n\
    \        dest.len() as u32,\n        src as *const c_void,\n    );\n\n    read_str_bytes(len,\
    \ dest)\n}\n\n/// Write bytes to the _user space_ pointer `src` and store them\
    \ as a `T`.\n///\n/// # Examples\n///\n/// ```no_run\n/// # #![allow(dead_code)]\n\
    /// # use aya_bpf::{\n/// #     cty::{c_int, c_long},\n/// #     helpers::bpf_probe_write_user,\n\
    /// #     programs::ProbeContext,\n\n// FILE: bpf/aya-bpf/src/lib.rs\n//! [![](https://aya-rs.dev/assets/images/aya_logo_docs.svg)](https://aya-rs.dev)\n\
    //!\n//! A library to write eBPF programs.\n//!\n//! Aya-bpf is an eBPF library\
