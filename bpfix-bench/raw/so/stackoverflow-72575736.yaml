    answer_id: 72622305
    url: https://stackoverflow.com/questions/72575736/linux-kernel-5-10-verifier-rejects-ebpf-xdp-program-that-is-fine-for-kernel-5-13#72622305
    is_accepted: true
    score: 1
    body_text: 'TL;DR. You are missing bug fix 2fa7d94afc1a for the BPF verifier.
      It was backported to the v5.13 kernel you are using as commit e7a61f15beea,
      but not to the v5.10 kernel.

      You might want to try a newer Android kernel if possible, or to ask them to
      carry the bugfix if they don''t on v5.10.

      Verifier Error Explanation

      I removed parts of the output that were irrelevant here.

      R1=pkt(id=2,off=14,r=0,umax_value=120,var_off=(0x0; 0x7c),s32_max_value=124,u32_max_value=124)
      R2=invP(id=0,umax_value=60,var_off=(0x0; 0x3c)) R3=invP(id=0,umax_value=60,var_off=(0x0;
      0x3c)) R6=pkt_end(id=0,off=0,imm=0) R7=pkt(id=0,off=0,r=34,imm=0) R10=fp0

      29: (bf) r8 = r1

      30: (3d) if r1 >= r6 goto pc+17

      R1=pkt(id=2,off=14,r=13,umax_value=120,var_off=(0x0; 0x7c),s32_max_value=124,u32_max_value=124)
      R2=invP(id=0,umax_value=60,var_off=(0x0; 0x3c)) R3=invP(id=0,umax_value=60,var_off=(0x0;
      0x3c)) R6=pkt_end(id=0,off=0,imm=0) R7=pkt(id=0,off=0,r=34,imm=0) R8_w=pkt(id=2,off=14,r=13,umax_value=120,var_off=(0x0;
      0x7c),s32_max_value=124,u32_max_value=124) R10=fp0

      [...]

      34: (b7) r9 = 0

      35: (bf) r1 = r8

      36: (0f) r1 += r9

      37: (3d) if r7 >= r1 goto pc+10

      R1=pkt(id=2,off=14,r=13,umax_value=120,var_off=(0x0; 0x7c),s32_max_value=124,u32_max_value=124)
      R2=invP(id=0,umax_value=60,var_off=(0x0; 0x3c)) R3=invP(id=0,umax_value=60,var_off=(0x0;
      0x3c)) R6=pkt_end(id=0,off=0,imm=0) R7=pkt(id=0,off=0,r=34,imm=0) R8=pkt(id=2,off=14,r=13,umax_value=120,var_off=(0x0;
      0x7c),s32_max_value=124,u32_max_value=124) R9=invP0 R10=fp0

      38: (3d) if r1 >= r6 goto pc+9

      R1=pkt(id=2,off=14,r=13,umax_value=120,var_off=(0x0; 0x7c),s32_max_value=124,u32_max_value=124)
      R2=invP(id=0,umax_value=60,var_off=(0x0; 0x3c)) R3=invP(id=0,umax_value=60,var_off=(0x0;
      0x3c)) R6=pkt_end(id=0,off=0,imm=0) R7=pkt(id=0,off=0,r=34,imm=0) R8=pkt(id=2,off=14,r=13,umax_value=120,var_off=(0x0;
      0x7c),s32_max_value=124,u32_max_value=124) R9=invP0 R10=fp0

      39: (71) r3 = *(u8 *)(r1 +0)

      invalid access to packet, off=14 size=1, R1(id=2,off=14,r=13)

      R1 offset is outside of the packet

      The verifier tells us that we are trying to access the packet at offset 14 (off=14)
      with an access size of 1 byte when the packet is only known to be at least 13
      bytes long (r=13). The known packet length here is incorrect somehow because
      you checked that address >= end.

      Going up, we can check where that packet range (r=13) is coming from. It is
      assigned from R8 at instruction 35, itself assigned from R1 at instruction 29.

      At instruction 30, we find the address >= end check in its bytecode form. We
      see that both R1 and R8''s ranges are updated from r=0 to r=13 after this check.
      That is however incorrect and should be updated to off+1, hence r=15.

      Checking the Verifier Sources

      In the verifier, this update of the range is implemented in find_good_pkt_pointers.
      The update logic looks fine and shouldn''t cause this issue.

      But if we git blame those lines, we can see they were changed in commit 2fa7d94afc1a.
      The commit describes the off-by-two error you are hitting:

      This commit fixes the off-by-two error by adjusting new_range in the

      right direction and fixes the tests by changing the range into the

      one that should actually fail.

      This commit was released upstream in v5.16. Checking the Ubuntu sources for
      Ubuntu-hwe-5.13-5.13.0-48.54_20.04.1, we find this same commit backported as
      e7a61f15beea, which explains why it works on your v5.13 kernel.'
    fix_description: TL;DR. You are missing bug fix 2fa7d94afc1a for the BPF verifier.
      It was backported to the v5.13 kernel you are using as commit e7a61f15beea,
      but not to the v5.10 kernel. You might want to try a newer Android kernel if
      possible, or to ask them to carry the bugfix if they don't on v5.10. The verifier
      tells us that we are trying to access the packet at offset 14 (off=14) with
      an access size of 1 byte when the packet is only known to be at least 13 bytes
      long (r=13). The known packet length here is incorrect somehow because you checked
      that address >= end.

