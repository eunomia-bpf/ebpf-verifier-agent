  - url: https://github.com/iovisor/bcc/issues/2463#issuecomment-512503958
    author: yonghong-song
    author_association: COLLABORATOR
    created_at: '2019-07-17T18:01:06Z'
    body_text: "Note that I am using latest clang and latest bpf-next repo for the\
      \ above experiments.\r\n\r\nIn the original code, there are three verifier related\
      \ issues:\r\n  1. scalar with a variable range spilled to stack and when restored,\
      \ the range is gone\r\n  2. packet pointer is refined later with a different\
      \ id=1 due to variable udp length, but due\r\n      to compiler optimization,\
      \ id=0 packet pointer is still used for later bpf_csum_diff. The\r\n      id=0\
      \ packet pointer is less precise than id=1 one.\r\n  3. fundamentally, for bpf_csum_diff(),\
      \ the verifier needs to verify the udp + udp_size. but\r\n      udp has definite\
      \ range (42, up to end of udp header, and optional max range to 511)\r\n   \
      \   and udp_size has maximum length to 511. But all these variable length won't\
      \ play well\r\n      in verifier, it is possible actual udp_len = 100 and packet\
      \ range is 50. This will cause\r\n      issues.\r\n\r\nImproving verifier, esp.\
      \ for 2 and 3 will be complex."
  - url: https://github.com/iovisor/bcc/issues/2463#issuecomment-512514014
    author: yonghong-song
    author_association: COLLABORATOR
    created_at: '2019-07-17T18:28:45Z'
    body_text: So, considering all such complexity comes from calculating checksum
      for udp payload. After discussing with @4ast,  one idea is to just implement
      a new helper to calculate checksum for the packet in xdp environment, similar
      to `bpf_l4_csum_replace()` but in xdp environment.
  - url: https://github.com/iovisor/bcc/issues/2463#issuecomment-512812898
    author: sbernard31
    author_association: NONE
    created_at: '2019-07-18T13:21:03Z'
    body_text: "@yonghong-song, as you explained I faced those issue when I tried\
      \ to calculate UDP checksum.\r\n\r\nMy first idea was to just recalculate all\
      \ checksum from scratch because this seemed more straightforward. But handling\
      \ \"dynamic payload size\" triggered all this \"bpf verifier vs clang compilation\"\
      \ issues.\r\n\r\nAs I didn't find any good solution/workaround to do that, I\
      \ finally explored a more efficient way to calculate checksum which didn't need\
      \ to handle \"dynamic payload size\" :  **Computation of the Internet Checksum\
      \ via Incremental Update** ([RFC 1624](https://tools.ietf.org/html/rfc1624)).\
      \ This way I only manage data with \"static size\".\r\nHere is [my code](https://github.com/AirVantage/sbulb)\
      \ which is not finished but functional for now. You can have a look at the [checksum\
      \ calculation part](https://github.com/AirVantage/sbulb/blob/326163d814c0fa38deffccbd206c466c39b54e6e/ulb.c#L82)\r\
      \n\r\nAbout `bpf_l4_csum_replace()`, I looked at [the documentation](https://manpages.debian.org/testing/manpages/bpf-helpers.7.en.html)\
      \ and finally it seems it does something like my  `update_csum` function but\
      \ more generic : \r\n```C\r\nstatic inline void update_csum(__u64 *csum, __be32\
      \ old_addr,__be32 new_addr ) {\r\n```\r\nAs calculating checksum seems to be\
      \ a common use case for XDP. I think it makes totally sense to provide a function\
      \ like this!\r\n\r\nAbout the real issues you exposed in https://github.com/iovisor/bcc/issues/2463#issuecomment-512503958,\
      \ finally the solution is maybe more at compilation time, maybe a specific \"\
      compilation profile\" should be created to produce more \"verifier compliant\"\
      \ code ? (I didn't know so much about that so maybe my remark is not so pertinent\
      \ :grin:)\r\n\r\nLast point, my feedback about bcc, I know that bcc was not\
      \ really advised(https://github.com/facebookincubator/katran/issues/29#issuecomment-475114910)\
      \ for creating a loadbalancer but currently I really appreciate to use it :+1:\
      \  ! The main limitation for my use case is https://github.com/iovisor/bcc/issues/2223\
      \ which limit me to handle all my need in only 1 script but this is clearly\
      \ out of topic."
