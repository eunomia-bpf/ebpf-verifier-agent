  question_body_text: |-
    I am trying to understand why kprobe and fentry eBPF programs that I think should be doing the same thing, are not.
    The following two programs compile and load just fine. They are kprobe programs.
    Program 1 prints the third argument passed via the context.
    SEC("kprobe/vfs_unlink")
    int BPF_KPROBE(vfs_unlink, struct mnt_idmap *arg0, struct inode *arg1, struct dentry *arg2, struct inode **arg3)
    {
    bpf_printk("arg3: %p\n", arg3);
    }
    Program 2: Does the same thing as program 1 but access the ctx arguments via the PT_REGS_PARMX macros.
    SEC("kprobe/vfs_unlink")
    int vfs_unlink(struct pt_regs *ctx)
    {
    struct pt_regs *regs = (struct pt_regs *) ctx;
    struct mnt_idmap *arg0 = (struct mnt_idmap *)PT_REGS_PARM1(regs);
    struct inode *arg1 = (struct inode *)PT_REGS_PARM2(regs);
    struct dentry *arg2 = (struct dentry *)PT_REGS_PARM3(regs);
    struct inode **arg3 = (struct inode **)PT_REGS_PARM4(regs);
    bpf_printk("arg3: %p\n", arg3);
    }
    However, programs 3 and 4 below get a verifier error. The use fentry instead and (I think) access the same ctx argument.
    Program 3
    SEC("fentry/vfs_unlink")
    int BPF_PROG(vfs_unlink, struct mnt_idmap *arg0, struct inode *arg1, struct dentry *arg2, struct inode **arg3)
    {
    bpf_printk("arg3: %p\n", arg3);
    }
    Program 4
    SEC("fentry/vfs_unlink")
    int vfs_unlink(__u64 *ctx)
    {
    struct mnt_idmap *arg0 = (struct mnt_idmap *)ctx[0];
    struct inode *arg1 = (struct inode *)ctx[1];
    struct dentry *arg2 = (struct dentry *)ctx[2];
    struct inode **arg3 = (struct inode **)ctx[3];
    bpf_printk("arg3: %p\n", arg3);
    }
    Programs 3 and 4 get the same verifier error:
    libbpf: prog 'vfs_unlink': BPF program load failed: -EACCES
    libbpf: prog 'vfs_unlink': -- BEGIN PROG LOAD LOG --
    0: R1=ctx() R10=fp0
    ; struct inode **arg3 = (struct inode **)ctx[3];
    0: (79) r3 = *(u64 *)(r1 +24)
    func 'vfs_unlink' arg3 type PTR is not a struct
    invalid bpf_context access off=24 size=8
    processed 1 insns (limit 1000000) max_states_per_insn 0 total_states 0 peak_states 0 mark_read 0
    -- END PROG LOAD LOG --
    libbpf: prog 'vfs_unlink': failed to load: -EACCES
    libbpf: failed to load object 'filelife_bpf'
    libbpf: failed to load BPF skeleton 'filelife_bpf': -EACCES
    failed to load BPF object: -13
    Note that program 5 below compiles and loads just fine. Instead of accessing arg3, it accesses arg2. So it seems there's something I'm doing wrong with the last argument but I'm not sure what that is and would like to understand why it is wrong.
    Program 5
    SEC("fentry/vfs_unlink")
    int vfs_unlink(__u64 *ctx)
    {
    struct mnt_idmap *arg0 = (struct mnt_idmap *)ctx[0];
    struct inode *arg1 = (struct inode *)ctx[1];
    struct dentry *arg2 = (struct dentry *)ctx[2];
    bpf_printk("arg2: %p\n", arg2);
    }
    Linux version:
    > uname -r
    6.8.0-87-generic
  selected_answer:
    answer_id: 79879452
    url: https://stackoverflow.com/questions/79878809/inconsistent-verifier-behavior-for-fentry-and-kprobe-ctx#79879452
    is_accepted: true
    score: 0
    body_text: |-
      TL;DR. Pointers of pointers don't seem to be supported in the BTF type checking of fentry BPF programs.
      Verifier Error Explanation
      ; struct inode **arg3 = (struct inode **)ctx[3];
      0: (79) r3 = *(u64 *)(r1 +24)
      func 'vfs_unlink' arg3 type PTR is not a struct
      invalid bpf_context access off=24 size=8
      As you noticed, the verifier is rejecting the access to the ctx. But more importantly, the before-last line tells us its doing so because the type of that third argument is unexpected. This error message is outputted by the BTF type checking and refers to the inner type of arg3.
      Root Cause
      If we look at the corresponding logic, we can see that only pointers to void, int, and struct are supported:
      /*
      * If it's a pointer to void, it's the same as scalar from the verifier
      * safety POV. Either way, no futher pointer walking is allowed.
      */
      if (is_void_or_int_ptr(btf, t))
      return true;
      [...]
      if (!btf_type_is_struct(t)) {
      bpf_log(log,
      "func '%s' arg%d type %s is not a struct\n",
      tname, arg, btf_type_str(t));
      return false;
      }
      Pointers to pointers simply don't seem to be supported by the BTF type checking.
      Solution
      One solution here would be to avoid the type checking on the inner type by declaring the third argument as void *inode. Then you'll have to rely on the bpf_probe_read helper calls to access its value.
