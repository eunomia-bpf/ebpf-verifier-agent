    answer_id: 67679291
    url: https://stackoverflow.com/questions/67679109/keep-getting-bpf-failed-to-load-program-permission-denied-when-trying-to-run-e#67679291
    is_accepted: true
    score: 2
    body_text: 'From the verifier''s logs, you have some invalid access here:

      ; crc ^= *current++;

      48: (71) r3 = *(u8 *)(r8 +0)

      R8 invalid mem access ''inv''

      This is likely caused by your pointer being initialised at 0 (the pointer itself,
      not the value it points to!), and then trying to dereference it without having
      ever initialized its content (which wouldn''t be possible anyway for a null
      pointer).

      unsigned char* current = 0; // current is 0

      [...]

      while (maxVal--) {

      crc ^= *current++; // read at address 0 and increment this value??

      ...

      }

      Why not use a regular variable for current, instead of a pointer?'
    fix_description: Why not use a regular variable for current, instead of a pointer?

