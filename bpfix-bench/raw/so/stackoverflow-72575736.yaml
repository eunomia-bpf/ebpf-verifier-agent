  question_body_text: 'I am writing some eBPF programs in Rust using redBPF and I''ve
    encountered some issue with the verifier that only appears on some kernels.

    This is a minimal reproducer XDP probe that shows the issue:

    #[xdp]

    unsafe fn xdp_test(ctx: XdpContext) -> XdpResult {

    let data = ctx.data()?;

    let start = ctx.data_start();

    let off = data.offset();

    let end = ctx.data_end();

    /* Ensuring an upper bound for off doesn''t make any difference

    if off > 50 {

    return XdpResult::Err(OutOfBounds);

    }

    */

    let mut address = start + off;

    for i in 0..500 {

    address = start + off + i;

    if address <= start || address >= end {

    break;

    }

    // This line (packet access) fails on kernel 5.10, but works fine on 5.13

    let byte = *(address as *const u8);

    // Just so the packet read above doesn''t get optimized away

    printk!("%u", byte as u32);

    }

    Ok(XdpAction::Pass)

    }

    Compiling this into eBPF bytecode and loading it into an Ubuntu 5.13 kernel (5.13.0-48-generic
    #54~20.04.1-Ubuntu SMP Thu Jun 2 23:37:17 UTC 2022 x86_64 x86_64 x86_64 GNU/Linux)
    works without issues. The verifier accepts the program.

    However, trying to load the exact same bytecode into an Android emulator kernel
    5.10.66-android12-9-00041-gfa9c9074531e-ab7914766 #1 SMP PREEMPT Fri Nov 12 11:36:25
