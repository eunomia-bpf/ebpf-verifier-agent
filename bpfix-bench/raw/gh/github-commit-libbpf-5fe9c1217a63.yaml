    \t\tbpf_program__set_expected_attach_type(prog,\n\t\t\t\tprog->sec_def->expected_attach_type);\n\
    \n\t\tif (prog->sec_def->prog_type == BPF_PROG_TYPE_TRACING ||\n\t\t    prog->sec_def->prog_type\
    \ == BPF_PROG_TYPE_EXT)\n\t\t\tprog->attach_prog_fd = OPTS_GET(opts, attach_prog_fd,\
    \ 0);\n\t}"
