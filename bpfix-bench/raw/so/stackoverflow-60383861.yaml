      functions from the libc. Your second example probably works because the compiler
      is able to optimize it and remove the call to strcmp. Since both arguments are
      known at compile-time, there's no need to use strcmp to know if they are equal.
      As pointed out by @Qeole in comments, you can use __builtin_memcmp() instead,
      since you know the size of one of your strings and are only trying to know if
      they are equal.
