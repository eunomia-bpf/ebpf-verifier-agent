  question_body_text: 'I am trying to write some bpf probes that keep some sort of
    state required for runtime verification. I am using iovisor/BCC for this purpose.
    I have created a pinned map so this value can be used across several bpf programs.
    Whenever I read the value from the state_store map, I get a valid pointer which
    I can dereference and print value of. To get the value for next state, I invoke
    the matrix function provided in automaton_s.

    #include <bcc/proto.h>

    struct automaton_s {

    int initial_state;

    int function[4][4];

    };

    typedef struct automaton_s automaton_t;

    BPF_STACK(automaton, automaton_t, 1);

    BPF_TABLE_PINNED("hash", int, int, state_store, 1, "/sys/fs/bpf/state");

    int trace_connect_v4_return(struct pt_regs *ctx)

    {

    int key = 0, init_val = 0;

    int *curr_state;

    curr_state = state_store.lookup_or_try_init(&key, &init_val);

    if (!curr_state) {

    bpf_trace_printk("State store is full");

    return -1;

    }

    bpf_trace_printk("curr state: %d", *curr_state);

    automaton_t aut;

    if (automaton.peek(&aut) < 0) {

    bpf_trace_printk("automaton init");

    aut = (automaton_t) {

    .initial_state = 0,

    .function = {

    { 1, -1, -1, -1 },

    { -1, 2, -1, -1 },

    { -1, -1, 3, -1 },

    { -1, -1, -1, 0 }

    }

    };

    automaton.push(&aut, BPF_EXIST);

    }

    int next = aut.function[*curr_state][0];

    bpf_trace_printk("next val: %d", next);

    state_store.update(&key, &next);

    return 0;

    }

    The error occurs whenever I try to use this next value, for either printing or
    updating state_store (see last two lines before return 0;). I get the error math
    between fp pointer and register with unbounded min value is not allowed. Commenting
    out these two lines makes the program compile at least, but I still need to update
    the state_store.

    Googling the issue has led me to believe that this is some sort of register offset
    error, rejected by the verifier.

