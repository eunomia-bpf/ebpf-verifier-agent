  buggy_code: |-
    // FILE: bpf/bpf_sock.c
    // CONTEXT: int cil_sock6_pre_bind(struct bpf_sock_addr *ctx)

    static __always_inline int __sock6_xlate_fwd(struct bpf_sock_addr *ctx,
                                                 const bool udp_only,
                                                 const bool is_connect)
    {
    #ifdef ENABLE_IPV6
            union lb6_affinity_client_id id;
            const bool in_hostns = ctx_in_hostns(ctx, &id.client_cookie);
            const struct lb6_backend *backend;
            const struct lb6_service *svc;
            __u16 dst_port = ctx_dst_port(ctx);
            __u8 protocol = ctx_protocol(ctx);
            struct lb6_key key = {
                    .dport          = dst_port,
                    .proto          = protocol,
            }, orig_key;
            const struct lb6_service *backend_slot;
            bool backend_from_affinity = false;
            __u32 backend_id = 0;
    #ifdef ENABLE_L7_LB
            struct lb6_backend l7backend;
    #endif

            if (is_defined(ENABLE_SOCKET_LB_HOST_ONLY) && !in_hostns)
                    return -ENXIO;

            if (!udp_only && !sock_proto_enabled(protocol))
                    return -ENOTSUP;
  fixed_code: |-
    // FILE: bpf/bpf_sock.c
    // CONTEXT: int cil_sock6_pre_bind(struct bpf_sock_addr *ctx)

    static __always_inline int __sock6_xlate_fwd(struct bpf_sock_addr *ctx,
                                                 const bool udp_only,
                                                 const bool is_connect)
    {
    #ifdef ENABLE_IPV6
            union lb6_affinity_client_id id;
            const bool in_hostns = ctx_in_hostns(ctx, &id.client_cookie);
            const struct lb6_backend *backend;
            const struct lb6_service *svc;
            __u16 dst_port = ctx_dst_port(ctx);
            __u8 protocol = ctx_protocol(ctx);
            struct lb6_key key __align_stack_8 = {
                    .dport          = dst_port,
                    .proto          = protocol,
            }, orig_key __align_stack_8;
            const struct lb6_service *backend_slot;
            bool backend_from_affinity = false;
            __u32 backend_id = 0;
    #ifdef ENABLE_L7_LB
            struct lb6_backend l7backend;
    #endif

            if (is_defined(ENABLE_SOCKET_LB_HOST_ONLY) && !in_hostns)
                    return -ENXIO;

            if (!udp_only && !sock_proto_enabled(protocol))
                    return -ENOTSUP;
  diff_summary: |-
    bpf/bpf_sock.c:
    - Added `__align_stack_8` to `lb6_key` stack variables in `__sock6_xlate_fwd()`.
    - Left logic unchanged while forcing 8-byte-aligned stack slots for LLVM-emitted 64-bit loads.
