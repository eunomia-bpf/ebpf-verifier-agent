  commit_message: 'libbpf: Avoid inline hint definition from ''linux/stddef.h'''
  commit_date: '2021-03-14'
  fix_type: inline_hint
  buggy_code: "// FILE: src/bpf_helpers.h\n\tchar ____fmt[] = fmt;\t\t\t\t\\\n\tbpf_trace_printk(____fmt,\
    \ sizeof(____fmt),\t\\\n\t\t\t ##__VA_ARGS__);\t\t\\\n})\n\n/*\n * Helper macro\
    \ to place programs, maps, license in\n * different sections in elf_bpf file.\
    \ Section names\n * are interpreted by elf_bpf loader\n */\n#define SEC(NAME)\
    \ __attribute__((section(NAME), used))\n\n#ifndef __always_inline\n#define __always_inline\
    \ inline __attribute__((always_inline))\n#endif\n#ifndef __noinline\n#define __noinline\
    \ __attribute__((noinline))\n#endif\n#ifndef __weak\n#define __weak __attribute__((weak))\n\
    #endif\n\n/*\n * Helper macro to manipulate data structures\n */\n#ifndef offsetof\n\
    #define offsetof(TYPE, MEMBER)\t((unsigned long)&((TYPE *)0)->MEMBER)"
  fixed_code: "// FILE: src/bpf_helpers.h\n\tchar ____fmt[] = fmt;\t\t\t\t\\\n\tbpf_trace_printk(____fmt,\
    \ sizeof(____fmt),\t\\\n\t\t\t ##__VA_ARGS__);\t\t\\\n})\n\n/*\n * Helper macro\
    \ to place programs, maps, license in\n * different sections in elf_bpf file.\
    \ Section names\n * are interpreted by elf_bpf loader\n */\n#define SEC(NAME)\
    \ __attribute__((section(NAME), used))\n\n/* Avoid 'linux/stddef.h' definition\
    \ of '__always_inline'. */\n#undef __always_inline\n#define __always_inline inline\
    \ __attribute__((always_inline))\n\n#ifndef __noinline\n#define __noinline __attribute__((noinline))\n\
    #endif\n#ifndef __weak\n#define __weak __attribute__((weak))\n#endif\n\n/*\n *\
    \ Helper macro to manipulate data structures\n */\n#ifndef offsetof\n#define offsetof(TYPE,\
    \ MEMBER)\t((unsigned long)&((TYPE *)0)->MEMBER)"
  diff_summary: |-
    src/bpf_helpers.h:
    - Changed inlining annotations so verifier-visible state stays in a form older kernels accept.
    - Affected context: the touched section.
    - Commit subject: libbpf: Avoid inline hint definition from 'linux/stddef.h'.
