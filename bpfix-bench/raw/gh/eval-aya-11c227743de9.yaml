    \ for b\"\\0\" we return the\n    // empty slice, for all other cases we omit\
    \ the terminator.\n    Ok(&dest[..(len as usize).saturating_sub(1)])\n}\n\n///\
    \ Read a null-terminated string from _kernel space_ stored at `src` into `dest`.\n\
    ///\n/// In case the length of `dest` is smaller then the length of `src`, the\
