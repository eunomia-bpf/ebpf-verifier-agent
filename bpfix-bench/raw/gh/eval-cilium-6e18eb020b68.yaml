  diff_summary: 'bpf/lib/lb.h:

    - Copied `client_cookie` or `client_ip` depending on which union field is actually
    active.

    - Ensured the affinity-map key is fully initialized so Clang 17 no longer leaves
    verifier-visible stack bytes undefined.'

