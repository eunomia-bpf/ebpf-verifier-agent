  diff_summary: 'bpf/tests/ipv6_test.c, bpf/tests/pktgen.h:

    - Cached `ctx_data()` and `ctx_data_end()` results in locals.

    - Reused those locals for packet construction and validation so inline-asm-based
    context access does not reset verifier packet-pointer tracking.'

