            plen++;
        }

        if (plen == 0)
            return 0;

        char match = c_strstr(ctx->filename, pattern_ptr);

        if (match == 1)
        {
            ctx->match_found = 1;
            return 1; // stop loop
        }

        return 0; // continue
    }
