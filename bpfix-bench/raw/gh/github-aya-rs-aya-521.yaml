  fix:
    summary: I was of the impression that loops aren't allowed at all by the verifier.
      Are there any examples of clever ways to get around the verifier for this? (bounded
      small for i in 0..5 has no issues for me though, I guess they're being unrolled).
      My use case for a loop at this point is to walk over each fixed chunk of a packet
      and do some parsing. Yeah I've done this many times. Loops are not unrolled,
      but you need to minimize the branching factor of the loop body in order not
      to run out of instructions.
