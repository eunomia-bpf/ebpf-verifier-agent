  source_snippets: []
  issue_body_text: |-
    Is there an existing issue for this?
    [x] I have searched the existing issues
    Version
    equal or higher than v1.18.2 and lower than v1.19.0
    What happened?
    After upgrading to Cilium version 1.18.x, pods lose network connectivity due to unexpected BPF program removal. Cilium health endpoints are lost and pods cannot reach external addresses despite the node having connectivity.
    How can we reproduce the issue?
    1.) Install Cilium with Helm
    2.) Helm flags 'helm install --bpf.masquerade=true --nodePort.enabled=true --kubeProxyReplacement=true
    Cilium Version
    Commencing from 1.18.0 and all subsequent releases on 1.18
    Kernel Version
    4.18.0-553.76.1.el8_10.x86_64
    Kubernetes Version
    v1.33.4+rke2r1
    Regression
    1.17.8
    Sysdump
    _No response_
    Relevant log output
    ```
    root@grxxxworker0X:/home/cilium# cilium endpoint get 1511
    [
    {
    }
    ]
    Anything else?
    Issue only occurs after a worker node is rebooted. I.e the upgrade appears to be ok and all worker nodes are fine until a node has been rebooted. After reboot, all pods especially the ones requiring external connectivity ends up in crashloopback.
    Cilium Users Document
    [ ] Are you a user of Cilium? Please add yourself to the Users doc
    Code of Conduct
    [x] I agree to follow this project's Code of Conduct
  fix:
    summary: 'I have fixed the issue. Upgrade the kernel version to 6.8.x, the steps:
      apt upgrade -y'
    selected_comment:
      kind: comment
      url: https://github.com/cilium/cilium/issues/41996#issuecomment-3858546103
      author: baopei
      author_association: NONE
      body_text: |-
        Facing same issue with Ubuntu 22 , kernel version = 5.15.0-67-generic . cilium pod logs : level=info msg="generating BPF for endpoint failed, keeping stale directory" ciliumEndpointName=/ containerID="" k8sPodName=/ identity=1 datapathPolicyRevision=0 ipv4="" containerInterface="" endpointID=143 ipv6="" desiredPolicyRevision=0 subsys=endpoint error="attaching cilium_host: loading eBPF collection into the kernel: program tail_nodeport_nat_egress_ipv4: load program: permission denied: 1058: (71) r1 = *(u8 *)(r2 +23): R2 invalid mem access 'inv' (664 line(s) omitted)" file-path=143_next_fail Is this issue affects kernel version = 5.15.0-67-generic ?
        I have fixed the issue.
        Upgrade the kernel version to 6.8.x, the steps:
        apt update
        apt upgrade -y
        apt install -y linux-generic-hwe-22.04
        update-grub
        reboot
