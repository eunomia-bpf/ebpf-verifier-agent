  question_body_text: 'I''m trying to loop over part of a TCP payload in an eBPF program,
    and I''m running into the invalid access to packet error.

    I thought I was taking measures to prevent the error -- guarding the access with
    pointer + offset > data_end, while ensuring that offset is less than or equal
    to the max u16 value (MAX_PACKET_OFF) (as indicated in the eBPF verifier docs).
    But apparently I''m doing this wrong or it''s not enough.

    The program:

    #include "vmlinux.h"

    #include <bpf/bpf_helpers.h>

    #include <bpf/bpf_core_read.h>

    #include <bpf/bpf_endian.h>

    #define MAX_PACKET_OFF 0xFFFF

    #define ETH_P_IP 0x0800

    #define TC_ACT_OK 0

    #define TC_ACT_SHOT 2

    SEC("tc")

    int handle_tc_ingress(struct __sk_buff *skb) {

    void *data_end = (void *)(long) skb->data_end;

    void *data = (void *)(long) skb->data;

    struct ethhdr *eth_hdr = data;

    if ((void *) (eth_hdr + 1) > data_end) {

    return TC_ACT_OK;

    }

    if (eth_hdr->h_proto != bpf_htons(ETH_P_IP)) {

    return TC_ACT_OK;

    }

    struct iphdr *ipv4_hdr = (struct iphdr *) (eth_hdr + 1);

    if ((void *) (ipv4_hdr + 1) > data_end) {

    return TC_ACT_OK;

    }

    struct tcphdr *tcp_hdr = (struct tcphdr *) ((__u8 *) ipv4_hdr + 4 * ipv4_hdr->ihl);

    if ((void *) (tcp_hdr + 1) > data_end) {

    return TC_ACT_OK;

    }

    __u8 *tcp_data = (__u8 *) tcp_hdr + 4 * tcp_hdr->doff;

    if ((void *) tcp_data > data_end) {

    return TC_ACT_OK;

    }

    // Ignore that this loop has too many iterations.

    // Reducing `MAX_PACKET_OFF` doesn''t help.

    for (int i = 0; i < MAX_PACKET_OFF && tcp_data + i <= data_end; ++i) {

    if (tcp_data[i] == '' '') {

    bpf_printk("space");

    return TC_ACT_SHOT;

    }

    }

    return TC_ACT_OK;

    }

