  issue_body_text: |-
    Hi, I'm doing small side project to get some knowledge regarding kernel development/eBPF/Rust. I had everything setuped with basic project generated from aya template and it worked like a charm. BTF was generated with aya-tool. I was on commit #1394. After update to newest master or any commit close to that it seems like I get errors when loading BTF and its related to MaybeUninit and aya logs. Is it not properly translated(???) Not entirely sure if it's aya-tool problem or something else, but after downgrading to earlier commits everything was loading properly and working as expected. As I wrote I don't have enough knowledge to be sure. Just an observation...
