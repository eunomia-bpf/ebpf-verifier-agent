    is_accepted: false
    score: 0
    body_text: "I also encountered the same problem, and the solution is as follows\uFF0C\
      Add the compile option -O2 and use LLVM_STRIP\n$(Q)$(CLANG) -g -O2 -target bpf\
      \ -D__TARGET_ARCH_$(ARCH) $(INCLUDES) $(CLANG_BPF_SYS_INCLUDES) -c $(filter\
      \ %.bpf.c,$^) -o $@\n$(Q)$(LLVM_STRIP) -g $@ # strip useless DWARF info"
