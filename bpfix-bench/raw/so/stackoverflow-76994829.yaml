    body_text: 'how about change

      struct {

      __uint(type, BPF_MAP_TYPE_ARRAY);

      __uint(max_entries, 8);

      __type(key, u32);

      __type(value, sizeof(struct target_d_name));

      } map_d_name_tgts SEC(".maps");

      to

      struct {

      __uint(type, BPF_MAP_TYPE_ARRAY);

      __uint(max_entries, 8);

      __type(key, u32);

      __type(value, struct target_d_name); // changed

      } map_d_name_tgts SEC(".maps");'
