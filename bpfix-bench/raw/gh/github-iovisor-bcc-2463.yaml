  - url: https://github.com/iovisor/bcc/issues/2463#issuecomment-807440085
    author: gamemann
    author_association: NONE
    created_at: '2021-03-25T20:36:26Z'
    body_text: "@FedeParola Thank you for this! I found this issue earlier today and\
      \ have been trying to get things to work with the original code you provided.\
      \ I then came back to this issue again and saw you just updated the code five\
      \ hours ago. Great timing, haha!\r\n\r\nThe new code you provided works for\
      \ me when calculating the UDP checksum plus payload from scratch and I made\
      \ it into a function for anybody interested. I also believe it should work with\
      \ the TCP checksums as well if you change `struct udphdr *udph` to `struct tcphdr\
      \ *tcph` for example and modify the rest of the function.\r\n\r\n```C\r\n#define\
      \ MAX_UDP_SIZE 1480\r\n\r\n...\r\n\r\n/* All credit goes to FedeParola from\
      \ https://github.com/iovisor/bcc/issues/2463 */\r\n__attribute__((__always_inline__))\r\
      \nstatic inline __u16 caludpcsum(struct iphdr *iph, struct udphdr *udph, void\
      \ *data_end)\r\n{\r\n    __u32 csum_buffer = 0;\r\n    __u16 *buf = (void *)udph;\r\
      \n\r\n    // Compute pseudo-header checksum\r\n    csum_buffer += (__u16)iph->saddr;\r\
      \n    csum_buffer += (__u16)(iph->saddr >> 16);\r\n    csum_buffer += (__u16)iph->daddr;\r\
      \n    csum_buffer += (__u16)(iph->daddr >> 16);\r\n    csum_buffer += (__u16)iph->protocol\
      \ << 8;\r\n    csum_buffer += udph->len;\r\n\r\n    // Compute checksum on udp\
      \ header + payload\r\n    for (int i = 0; i < MAX_UDP_SIZE; i += 2) \r\n   \
      \ {\r\n        if ((void *)(buf + 1) > data_end) \r\n        {\r\n         \
      \   break;\r\n        }\r\n\r\n        csum_buffer += *buf;\r\n        buf++;\r\
      \n    }\r\n\r\n    if ((void *)buf + 1 <= data_end) \r\n    {\r\n        //\
      \ In case payload is not 2 bytes aligned\r\n        csum_buffer += *(__u8 *)buf;\r\
      \n    }\r\n\r\n    __u16 csum = (__u16)csum_buffer + (__u16)(csum_buffer >>\
      \ 16);\r\n    csum = ~csum;\r\n\r\n    return csum;\r\n}\r\n\r\n...\r\n\r\n\
      udph->check = 0;\r\nudph->check = caludpcsum(iph, udph, data_end);\r\n```"
