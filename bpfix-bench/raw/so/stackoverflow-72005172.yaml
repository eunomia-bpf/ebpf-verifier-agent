    static inline int classification(struct __sk_buff *skb) {
        void *data_end = (void *)(long)skb->data_end;
        void *data = (void *)(long)skb->data;
        struct ethhdr *eth = data;

        __u16 h_proto;
        __u64 nh_off = 0;
        nh_off = sizeof(*eth);

