  question_body_text: |-
    I am trying to create an eBPF program using the ebpg-go package from cilium. I have had some minor success recreating this tutorial using the "accept4" system call instead of XDP as seen in the tutorial. I was getting a counter that increased everytime I sent a request to an API I had running localy. I've also been cross-referencing this tutorial from Datadog.
    The cilium package has a 'ebpf2go' function that auto-generates a go file based on the ebpf c file you pass it.
    I've now been attempting to modify the program to hook into the "read" system call instead of "accept4" and to load the details from that read system call into a hash table map instead of loading just a count into an array map. It should be said that I am still quite new to C and eBPF in general.
    The eBPF program I have written (logger.c)...
