  issue_body_text: "Hi there,\nFirst: thanks for this great project! It's highly appreciated\
    \ to finally see end-to-end Rust support to write eBPF programs \U0001F680\nNow,\
    \ the context for my issue is the BPF perfbuf example by Andrii Nakryiko where\
    \ he uses a BPF_MAP_TYPE_PERCPU_ARRAY as a heap to get around the eBPF stack size\
    \ constraint. I need to implement that using Aya as part of a real-world project,\
    \ but I just can't get it done.\nI tried using a single-element PerCpuArray for\
    \ that purpose and using get_ptr_mut(0) to obtain write access to that element\
    \ to change its value (to 42 in the example below), but it doesn't work, despite\
    \ being suggested otherwise. Whenever I try that the eBPF verifier complains about\
    \ R0 invalid mem access 'map_value_or_null' which means the result of bpf_map_lookup_elem()\
    \ isn't first compared against NULL, at least as far as the verifier is concerned\
    \ (despite the use of NonNull::new()):\ntl;dr: does PerCpuArray support writing\
    \ to its elements from within eBPF code at all? If so, how? Maybe my entire approach\
    \ is wrong?\nThanks in advance!"
