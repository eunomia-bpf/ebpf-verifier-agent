    Fallbacks
    "magic number" #define MAX_ITERS_FOR_STRSTR 163
    - If it exceeds this value, too many instructions -> does not pass the verifier
    define MAX_CHAR_LEN 256
    - If maybe the filename is bigger, getting truncated and cannot copy all of it ( i'd say pretty good tradeoff , 128+ chars are enough)
    Also modified LITTLE_MAP_SIZE from 64 to as low as possible. In my case i do not need very much pattern matching so i put 4. I think it works with a little more, i will try and come back with answers
