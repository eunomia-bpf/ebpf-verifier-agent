    body_text: |-
      TL;DR. Your program prototype is incorrect as BPF programs can only take one argument.
      Verifier Error Explanation
      permission denied: 0: (bf) r3 = r2: R2 !read_ok
      This error message means that you're trying to access register R2 even though it has never been initialized.
      As you mentioned in your post, that instruction corresponds to your access to cstate, the second argument of your program. That's the issue. BPF programs can only take a single argument, R1. So any access to R2-R9 at the beginning of the program is going to be rejected because those registers haven't been initialized yet.
      BPF Programs with Multiple Arguments
      I'm guessing that'll come as a surprise to you because you've seen examples of BPF programs taking multiple arguments. Well, not really.
      You may have seen two things:
      bcc programs where some C-to-C rewriting is happening behind the curtain to turn your function prototype into a correct BPF program with a single argument.
      Programs using the BPF_PROG macro to define BPF programs. That also gets rewritten into a proper BPF program with a single argument.
      Possible Solutions
      I think you have two solutions here:
      You could use BPF_PROG. The simplest example of a program that does that is probably fentry_recursive.c. That would require you to include bpf_tracing.h.
      You could manually rewrite your function/program to have a single argument. That would look something as below:
