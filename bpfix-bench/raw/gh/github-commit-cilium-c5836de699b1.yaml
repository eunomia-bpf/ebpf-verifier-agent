  fixed_code: "// FILE: bpf/lib/pcap.h\n// CONTEXT: static __always_inline void __cilium_capture_in(struct\
    \ __ctx_buff *ctx,\n\t */\n\tcilium_capture(ctx, CAPTURE_INGRESS, rule_id,\n\t\
    \t       bpf_ktime_cache_set(boot_ns));\n}\n\nstatic __always_inline void __cilium_capture_out(struct\
    \ __ctx_buff *ctx,\n\t\t\t\t\t\t __u16 rule_id)\n{\n\tcilium_capture(ctx, CAPTURE_EGRESS,\
    \ rule_id,\n\t\t       bpf_ktime_cache_get());\n}\n\n/* The capture_enabled integer\
    \ ({0,1}) is enabled/disabled via BPF based ELF\n * templating. Meaning, when\
    \ disabled, the verifier's dead code elimination\n * will ensure that there is\
    \ no overhead when the facility is not used. The\n * below is a fallback definition\
    \ for when the templating var is not defined.\n */\n#ifndef capture_enabled\n\
    # define capture_enabled (__ctx_is == __ctx_xdp)\n#endif /* capture_enabled */\n\
    \nstatic __always_inline bool\ncilium_capture_candidate(struct __ctx_buff *ctx\
    \ __maybe_unused, __u16 *rule_id)\n{\n\tif (capture_enabled) {\n\t\t*rule_id =\
    \ 0;\n\t\treturn true;\n\t}\n\treturn false;\n}\n\nstatic __always_inline void\n\
    cilium_capture_in(struct __ctx_buff *ctx __maybe_unused)\n{\n#ifdef ENABLE_CAPTURE\n\
    \t__u16 rule_id;\n\n\tif (cilium_capture_candidate(ctx, &rule_id))\n\t\t__cilium_capture_in(ctx,\
    \ rule_id);\n#endif /* ENABLE_CAPTURE */\n}"
