  question_body_text: 'I would like to separate some strings and print them out one
    by one but it seems almost impossible due to these errors. Trying to change const
    char str[] to const char *str seems to just net me an opcode 00 error. It seems
    like I am heading down the right path but just need help to print these lines
    out one by one. Here is the code running on an online compiler to see what its
    output looks like String Parser online IDE

    from bcc import BPF

    # BPF PROGRAM

    bpfprogram = """

    int helloworld2(void *ctx)

    {

    const char str[] = "here are some words";

    int length = sizeof(str);

    int start = 0;

    //#pragma unroll Tried using this but does not really fix the issue.

    for (int i = 0; i < sizeof(str); i++) {

    if (str[i] == '' '') {

    bpf_trace_printk("%s\\n", i - start, str + start);

    start = i + 1;

    }

    }

    bpf_trace_printk("%s\\n", length - start, str + start);

    return 0;

    }

    """

    # This compiles the program defined by the bpfprogram string into bpf bytecode
    and

    #loads it to the kernel BPF verifier.

    b = BPF(text=bpfprogram)

    # This attaches the compiled BPF program to a kernel event of your choosing,

    #in this case to the sys_clone syscall which will cause the BPF program to run

    #everytime the sys_clone call occurs.

    b.attach_kprobe(event=b.get_syscall_fnname("clone"), fn_name="helloworld2")

    # Capture and print the BPF program''s trace output

    b.trace_print()

    Here is the error that I am seeing, Trying a pointer instead of a char array just
    nets me an opcode 00 error. Trying #pragma unroll does not seem to really fix
