  fixed_code: |-
    // FILE: bpf/lib/proxy.h
    // CONTEXT: assign_socket_tcp(struct __ctx_buff *ctx,
            struct bpf_sock *sk;
            __u32 dbg_ctx;

            sk = skc_lookup_tcp(ctx, tuple, len, BPF_F_CURRENT_NETNS, 0);
            if (!sk)
                    goto out;

            if (established && sk->state == BPF_TCP_TIME_WAIT)
                    goto release;
            if (established && sk->state == BPF_TCP_LISTEN)
                    goto release;

            dbg_ctx = READ_ONCE(sk)->family << 16 | ctx->protocol;
            result = sk_assign(ctx, sk, 0);
            cilium_dbg(ctx, DBG_SK_ASSIGN, -result, dbg_ctx);
            if (result == 0)
                    result = CTX_ACT_OK;
            else
                    result = DROP_PROXY_SET_FAILED;
    release:
            sk_release(sk);
    out:
            return result;
    }


    // CONTEXT: static __always_inline int
    assign_socket_udp(struct __ctx_buff *ctx,
                      struct bpf_sock_tuple *tuple, __u32 len,
                      bool established __maybe_unused)
    {
            int result = DROP_PROXY_LOOKUP_FAILED;
            struct bpf_sock *sk;
            __u32 dbg_ctx;

            sk = sk_lookup_udp(ctx, tuple, len, BPF_F_CURRENT_NETNS, 0);
            if (!sk)
                    goto out;

            dbg_ctx = READ_ONCE(sk)->family << 16 | ctx->protocol;
            result = sk_assign(ctx, sk, 0);
            cilium_dbg(ctx, DBG_SK_ASSIGN, -result, dbg_ctx);
            if (result == 0)
                    result = CTX_ACT_OK;
            else
                    result = DROP_PROXY_SET_FAILED;
            sk_release(sk);
    out:
            return result;
    }

    static __always_inline int
  diff_summary: |-
    bpf/lib/proxy.h:
    - Wrapped `sk->family` dereferences in `READ_ONCE(sk)` in both TCP and UDP socket assignment helpers.
    - Prevented Clang 17 from merging two verifier-incompatible pointer-typed paths into one shared instruction sequence.
