    body_text: 'trace_printk isn''t actually the issue here. It just seems that way
      because once you comment that statement, the verifier optimizes out the call
      to is_http(); it''s not needed anymore.

      What''s going on?

      The verifier is rejecting your BPF program with the following error:

      invalid access to packet, off=23 size=1, R1(id=0,off=23,r=15)

      R1 offset is outside of the packet

      That means you are trying to access the packet at offset 23 even though you
      only verified that it is 15 bytes long.

      Where the bug?

      I suspect the bug is in those lines:

      if ((void*)iph + 1 > data_end) {

      return 0;

      }

      Here, you are checking that data_end is larger or equal to iph plus one byte.
      We can see it in the verifier output:

      3: (bf) r3 = r1

      4: (07) r3 += 14

      5: (2d) if r3 > r2 goto pc+50

      R1_w=pkt(id=0,off=0,r=14,imm=0) R2_w=pkt_end(id=0,off=0,imm=0) R3_w=pkt(id=0,off=14,r=14,imm=0)
      R6_w=ctx(id=0,off=0,imm=0) R10=fp0

      6: (bf) r3 = r1

      7: (07) r3 += 15

      8: (2d) if r3 > r2 goto pc+47

      R1_w=pkt(id=0,off=0,r=15,imm=0) R2_w=pkt_end(id=0,off=0,imm=0) R3_w=pkt(id=0,off=15,r=15,imm=0)
      R6_w=ctx(id=0,off=0,imm=0) R10=fp0

      The first comparison is for data + nh_off > data_end, the second is for (void*)iph
      + 1 > data_end. As you can see there''s only one byte in difference.

      What''s the fix?

      I think you want:

      if ((void*)(iph + 1) > data_end) {

      return 0;

      }

      And the same for the next packet bounds check (tcp).'
    fix_description: trace_printk isn't actually the issue here. It just seems that
      way because once you comment that statement, the verifier optimizes out the
      call to is_http(); it's not needed anymore. What's the fix?

