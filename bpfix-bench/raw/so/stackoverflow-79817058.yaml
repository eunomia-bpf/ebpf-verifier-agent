    I am trying to implement a manual implementation of strstr in eBPF but cannot get past verifier.
    Before starting, I know there is an existing bpf_strstr() implementation, but it's on 6.17+ linux version. I am sitting on 6.8.0 ish (Ubuntu 24.04.3 LTS).
    Here is my implementation:
    userspace side
    // MACRO VALUES
    #define MAX_PATTERN_LEN 16
    #define MAX_CHAR_LEN 256
    #define LITTLE_MAP_SIZE 64
    eBPF side
    static __always_inline int c_strstr(char str[MAX_CHAR_LEN], const char *pattern)
    {
    int plen = 0;
    for (int k = 0; k < MAX_PATTERN_LEN; k++) {
    if (pattern[k] == '\0')
    break;
    plen++;
    }
    if (plen == 0)
    return 0;
    for (int i = 0; i < MAX_CHAR_LEN; i++) {
    if (str[i] == '\0')
    break;
    int match = 1;
    for (int j = 0; j < MAX_PATTERN_LEN; j++) {
    if (j >= plen)
    break;
    if (str[i + j] == '\0' || str[i + j] != pattern[j]) {
    match = 0;
    break;
    }
    }
    if (match)
    return 1;
    }
    return 0;
    }
    static __always_inline int iterate_cb(u64 i, void *data)
    {
    struct iterate_ctx *ctx = data;
    char *pattern_ptr = bpf_map_lookup_elem(&blocked_patterns, &i);
    if (!pattern_ptr)
    return 0; // continue
    char pattern[MAX_PATTERN_LEN];
    __builtin_memcpy(pattern, pattern_ptr, MAX_PATTERN_LEN);
    if (c_strstr(ctx->filename, pattern) == 1) {
    ctx->match_found = 1;
    return 1; // stop loop
    }
    return 0; // continue
    }
    // Wrapper to call bpf_loop
    static __always_inline __u8 iterate(char str[MAX_CHAR_LEN]) {
    struct iterate_ctx ctx = {};
    ctx.match_found = 0;
    ctx.filename = str;
    bpf_loop(MAX_MAP_ELEMS, iterate_cb, &ctx, 0);
    return ctx.match_found;
    }
