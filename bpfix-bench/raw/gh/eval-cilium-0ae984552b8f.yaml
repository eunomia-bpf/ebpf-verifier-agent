  buggy_code: "// FILE: bpf/lib/ipv6.h\n// CONTEXT: static __always_inline int ipv6_hdrlen(struct\
    \ __ctx_buff *ctx, __u8 *nexthdr)\n\t\t\t*nexthdr = nh;\n\t\t\treturn len;\n\t\
    \t}\n\t}\n\n\t/* Reached limit of supported extension headers */\n\treturn DROP_INVALID_EXTHDR;\n\
    }\n\nstatic __always_inline void ipv6_addr_copy(union v6addr *dst,\n\t\t\t\t\t\
    \   const union v6addr *src)\n{\n\tdst->d1 = src->d1;\n\tdst->d2 = src->d2;\n\
    }\n\nstatic __always_inline __u64 ipv6_addrcmp(const union v6addr *a,\n\t\t\t\t\
    \t  const union v6addr *b)\n{\n\t__u64 tmp;\n\n\ttmp = a->d1 - b->d1;\n\tif (!tmp)\n\
    \t\ttmp = a->d2 - b->d2;\n\treturn tmp;\n}"
  fixed_code: "// FILE: bpf/lib/ipv6.h\n// CONTEXT: static __always_inline int ipv6_hdrlen(struct\
    \ __ctx_buff *ctx, __u8 *nexthdr)\n\t\t\t*nexthdr = nh;\n\t\t\treturn len;\n\t\
    \t}\n\t}\n\n\t/* Reached limit of supported extension headers */\n\treturn DROP_INVALID_EXTHDR;\n\
    }\n\nstatic __always_inline void ipv6_addr_copy(union v6addr *dst,\n\t\t\t\t\t\
    \   const union v6addr *src)\n{\n\tmemcpy(dst, src, sizeof(*dst));\n}\n\nstatic\
