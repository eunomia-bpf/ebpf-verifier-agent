  issue_body_text: 'Is there an existing issue for this?

    [x] I have searched the existing issues

    Version

    equal or higher than v1.18.1 and lower than v1.19.0

    What happened?

    We practice Cilium tests on Container-optimized OS. When trying with Cilium v1.18
    we found the new builtins.c test doesn''t pass there:

    The test was recently introduced in https://github.com/cilium/cilium/pull/38414
    by @gentoo-root.

    The failure seems the same across multiple COS versions (all tested - 109, 113,
    117, 121). Clang version used is 19.

    Upon manual test, we see:

    How can we reproduce the issue?

    On COS, using Clang 19,

    then

    Cilium Version

    v1.18.1

    Kernel Version

    Manual test took place in 6.6.97+

    https://cos.googlesource.com/third_party/kernel/+/deeeb8e797576b7e1e58e75b8b6d20d26d3ea7ab

    Clang 19.1.7 (++20250114103228+cd708029e0b2-1~exp1~20250114103334.78)

    Kubernetes Version

    Irrelevant

    Regression

    v1.17.7

    Sysdump

    _No response_

    Relevant log output

    Anything else?

    It''s found that after setting:

    (this is equivalent to sysctl -w net.core.bpf_jit_harden=0 but we happen to have
    no sysctl available there)

    the test loads fine, but I doubt if just setting it in test environment reduces
    the fidelity of the tests.

    It defaults to 2 in the COS images we''re using.

    I haven''t tried if setting it to 2 in other distros makes it fail too.

