  issue_body_text: 'Is there an existing issue for this?

    [x] I have searched the existing issues

    Version

    equal or higher than 1.19.0-pre.0

    What happened?

    Upgrading Cilium to 1.19.0-pre.0 causes failure to reload endpoint BPF program.

    This happens only on one node out of 8 in the Kubernetes cluster, although I couldn''t
    figure out the difference between them yet.

    How can we reproduce the issue?

    not sure

    Cilium Version

    1.19.0-pre.0

    Kernel Version

    Linux srv1host 6.11.5+bpo-amd64 #1 SMP PREEMPT_DYNAMIC Debian 6.11.5-1~bpo12+1
    (2024-11-11) x86_64 GNU/Linux

    Kubernetes Version

    v1.31.4

    Regression

    v1.18.0

    Sysdump

    cilium-sysdump-20250904-140244.zip

    cilium_log.txt

    Relevant log output

    Anything else?

    _No response_

    Cilium Users Document

    [x] Are you a user of Cilium? Please add yourself to the Users doc

    Code of Conduct

    [x] I agree to follow this project''s Code of Conduct'
  fix:
    summary: The sysdump is missing all node-specific information. I suspect it's
      because the node you tried to collect from (10.200.0.8) doesn't exist. At least,
      there are no references to that IP address in the sysdump. If it worked, you
      would see a directory named cilium-bugtool-cilium-xxxxxxx in the sysdump.
